// -------------------------------------------------------
// BOGAZ DIS PANEL (60'lık)
// -------------------------------------------------------
function drawBogazDis60(dxf, ox, oy, B, K, tip, kod, layer) {
  var ly = layer || '0';
  drawFoldDis(dxf, ox, oy, B, K, ly);
  // Vida konumlari (vidayla ayni hizaya gelen percin 13mm kayar; hiza tol. 1mm)
  var vidaXsAlt = []; // Mavi alt (sadece N)
  if (tip === 'N') {
    vidaXsAlt = [ox + 60, ox + B - 60];
    if (B >= 800 && B < 1600) vidaXsAlt.push(ox + B / 2);
    else if (B >= 1600) {
      vidaXsAlt.push(ox + 60 + (B - 120) / 3);
      vidaXsAlt.push(ox + 60 + 2 * (B - 120) / 3);
    }
  }
  var vidaXsUst = []; // Sari ust (N ve B)
  if (tip === 'N' || tip === 'B') {
    vidaXsUst = [ox + 60, ox + B - 60];
    if (B >= 800 && B < 1600) vidaXsUst.push(ox + B / 2);
    else if (B >= 1600) {
      vidaXsUst.push(ox + 60 + (B - 120) / 3);
      vidaXsUst.push(ox + 60 + 2 * (B - 120) / 3);
    }
  }
  var vidaYs = [];
  if (K >= 150) vidaYs.push(oy + 60, oy + K - 60);
  else vidaYs.push(oy + K / 2);
  if (K >= 800 && K < 1600) vidaYs.push(oy + K / 2);
  else if (K >= 1600) {
    vidaYs.push(oy + 60 + (K - 120) / 3);
    vidaYs.push(oy + 60 + 2 * (K - 120) / 3);
  }
  // Percin (SABIT ile ayni)
  addPH(dxf, ox, ox + B, oy, -51.7, 40.29, 40.70, ly, vidaXsAlt);
  addPH(dxf, ox, ox + B, oy + K, 51.7, 40.29, 40.70, ly, vidaXsUst);
  addPV(dxf, ox, oy, oy + K, -51.7, 40.29, 40.70, ly, vidaYs);
  addPV(dxf, ox + B, oy, oy + K, 51.7, 40.29, 40.70, ly, vidaYs);

  // Vida
  if (K >= 150) {
    dxf.addCircle(ox + 15, oy + K - 60, 8.1, ly);
    dxf.addCircle(ox + B - 15, oy + K - 60, 8.1, ly);
    dxf.addCircle(ox + 15, oy + 60, 8.1, ly);
    dxf.addCircle(ox + B - 15, oy + 60, 8.1, ly);
  } else {
    dxf.addCircle(ox + 15, oy + K / 2, 8.1, ly);
    dxf.addCircle(ox + B - 15, oy + K / 2, 8.1, ly);
  }
  // K ek vida
  if (K >= 800 && K < 1600) {
    dxf.addCircle(ox + 15, oy + K / 2, 8.1, ly);
    dxf.addCircle(ox + B - 15, oy + K / 2, 8.1, ly);
  } else if (K >= 1600) {
    dxf.addCircle(ox + 15, oy + 60 + (K - 120) / 3, 8.1, ly);
    dxf.addCircle(ox + 15, oy + 60 + 2 * (K - 120) / 3, 8.1, ly);
    dxf.addCircle(ox + B - 15, oy + 60 + (K - 120) / 3, 8.1, ly);
    dxf.addCircle(ox + B - 15, oy + 60 + 2 * (K - 120) / 3, 8.1, ly);
  }
  // Mavi alt (sadece N)
  if (tip === 'N') {
    dxf.addCircle(ox + 60, oy + 15, 8.1, ly);
    if (B >= 800 && B < 1600) dxf.addCircle(ox + B / 2, oy + 15, 8.1, ly);
    else if (B >= 1600) {
      dxf.addCircle(ox + 60 + (B - 120) / 3, oy + 15, 8.1, ly);
      dxf.addCircle(ox + 60 + 2 * (B - 120) / 3, oy + 15, 8.1, ly);
    }
    dxf.addCircle(ox + B - 60, oy + 15, 8.1, ly);
  }
  // Sari ust (N ve B)
  if (tip === 'N' || tip === 'B') {
    dxf.addCircle(ox + 60, oy + K - 15, 8.1, ly);
    if (B >= 800 && B < 1600) dxf.addCircle(ox + B / 2, oy + K - 15, 8.1, ly);
    else if (B >= 1600) {
      dxf.addCircle(ox + 60 + (B - 120) / 3, oy + K - 15, 8.1, ly);
      dxf.addCircle(ox + 60 + 2 * (B - 120) / 3, oy + K - 15, 8.1, ly);
    }
    dxf.addCircle(ox + B - 60, oy + K - 15, 8.1, ly);
  }
  addKod60(dxf, ox + B - 49.70, oy + K + 49.95, kod, ly);
}

// -------------------------------------------------------
// ANA FONKSIYON: 60'lık panel ciz
// -------------------------------------------------------
function draw60(dxf, panelList, satirN, gapCol, gapRow) {
  if (satirN === undefined) satirN = 4;
  if (gapCol === undefined) gapCol = 400;
  if (gapRow === undefined) gapRow = 300;

  var curX = 0, curY = 0, rowH = 0, colI = 0;

  for (var idx = 0; idx < panelList.length; idx++) {
    var panel = panelList[idx];
    var tip = panel.tip;
    var B = panel.B;
    var K = panel.K;
    var cam = panel.cam;
    var bogazTip = panel.bogazTip;
    var kod = panel.kod;
    var pairW = 0, pairH = 0;

    switch (tip) {
      case 'SABIT': {
        drawDis60(dxf, curX, curY, B, K, kod, '0');
        drawIc60(dxf, curX + B + 797, curY + 20.5, B, K, kod, '0');
        pairW = 2 * B + 917;
        pairH = K + 125;
        break;
      }
      case 'ACILIR': {
        var BI = B - 43, KI = K - 43;
        var oxIc = curX + B + 498.5;
        var oyIc = curY + (K - KI) / 2;
        drawDisAcilir60(dxf, curX, curY, B, K, kod, '0');
        drawIcAcilir60(dxf, oxIc, oyIc, B, K, kod, '0');
        if (cam === 'E') {
          addCam60(dxf, curX + B / 2, curY + K / 2, '0');
          addCam60(dxf, oxIc + BI / 2, curY + K / 2, '0');
        }
        pairW = 2 * B + 616.5;
        pairH = K + 125;
        break;
      }
      case 'UST': {
        drawUst60(dxf, curX, curY, B, K, kod, '0');
        pairW = B + 31;
        pairH = K + 31;
        break;
      }
      case 'BOGAZ': {
        var bt = (bogazTip || 'N').toUpperCase();
        drawBogazDis60(dxf, curX, curY, B, K, bt, kod, '0');
        drawIc60(dxf, curX + B + 797, curY + 20.5, B, K, kod, '0');
        pairW = 2 * B + 917;
        pairH = K + 125;
        break;
      }
    }

    if (pairH > rowH) rowH = pairH;
    curX += pairW + gapCol;
    colI++;

    if (colI >= satirN) {
      colI = 0;
      curX = 0;
      curY -= rowH + gapRow;
      rowH = 0;
    }
  }
}


// =====================================================================
// DXF URETIM VE INDIRME
// =====================================================================

function generateAndDownloadDxf(panelList, kalinlik, satirN, gapCol, gapRow, customDosyaAdi) {
  // Adet bazinda genislet
  var expanded = [];
  for (var i = 0; i < panelList.length; i++) {
    var p = panelList[i];
    var adet = p.adet || 1;
    for (var j = 0; j < adet; j++) {
      expanded.push({
        tip: p.tip,
        B: p.B,
        K: p.K,
        cam: p.cam,
        bogazTip: p.bogazTip,
        kod: p.kod
      });
    }
  }

  // Paslanmaz mi? ('50P' / '60P') -> taban kalinlik + paslanmaz bayragi
  var isPas = String(kalinlik).slice(-1) === 'P';
  var base = isPas ? String(kalinlik).slice(0, -1) : String(kalinlik);

  var dosyaAdiEl = base === '60' ? document.getElementById('dosyaAdi60')
                                 : document.getElementById('dosyaAdi50');
  var dosyaAdi = customDosyaAdi || (dosyaAdiEl && dosyaAdiEl.value.trim()) || (base + 'lik_panel');

  function _dl(dxf, fname) {
    var blob = new Blob([dxf.generate()], { type: 'application/dxf' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = fname;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  if (isPas) {
    // 2 ayri DXF: { ad } DIŞ.dxf  +  { ad } İÇ PASLANMAZ.dxf
    var drawFn = base === '60' ? draw60Paslanmaz : draw50Paslanmaz;
    var dxfDis = new DxfWriter();
    drawFn(dxfDis, expanded, gapCol, 'DIS');
    var adDis = dosyaAdi + ' DIŞ.dxf';
    _dl(dxfDis, adDis);

    var dxfIc = new DxfWriter();
    drawFn(dxfIc, expanded, gapCol, 'IC');
    var adIc = dosyaAdi + ' İÇ PASLANMAZ.dxf';
    _dl(dxfIc, adIc);

    return { success: true, count: expanded.length, filename: adDis + ' + ' + adIc };
  }

  // Normal akis (degismedi): tek DXF, DIS+IC yan yana
  var dxf = new DxfWriter();
  if (base === '50') {
    draw50(dxf, expanded, satirN, gapCol, gapRow);
  } else {
    draw60(dxf, expanded, satirN, gapCol, gapRow);
  }
  var ad = dosyaAdi + '.dxf';
  _dl(dxf, ad);
  return { success: true, count: expanded.length, filename: ad };
}

// Panel listesi
var panels = [];

// DOM elemanlari
var elKalinlik = document.getElementById('kalinlik');
var elTip = document.getElementById('tip');
var elBuyuk = document.getElementById('buyuk');
var elKucuk = document.getElementById('kucuk');
var elCam = document.getElementById('cam');
var elCamGroup = document.getElementById('cam-group');
var elBogazTip = document.getElementById('bogazTip');
var elBogazGroup = document.getElementById('bogaz-group');
var elKod = document.getElementById('kod');
var elAdet = document.getElementById('adet');
var elBtnAdd = document.getElementById('btn-add');
var elBtnExport = document.getElementById('btn-export');
var elTable = document.getElementById('panel-table');
var elEmpty = document.getElementById('empty-msg');
var elCount = document.getElementById('panel-count');
var elStatus = document.getElementById('status-msg');

var elGapCol = document.getElementById('gapCol');
var elGapRow = document.getElementById('gapRow');

// Tip degisince cam/bogaz alanlarini goster/gizle
elTip.addEventListener('change', function() {
  var tip = elTip.value;
  elCamGroup.classList.toggle('hidden', tip !== 'ACILIR');
  elBogazGroup.classList.toggle('hidden', tip !== 'BOGAZ');
});

// Baslangicta SABIT secili - cam ve bogaz gizli
elCamGroup.classList.add('hidden');
elBogazGroup.classList.add('hidden');

// Listeye ekle
elBtnAdd.addEventListener('click', addPanel);

// Enter tusu ile listeye ekle (sadece panel sidebar'ina ozgu alanlar)
['kalinlik','tip','buyuk','kucuk','cam','bogazTip','kod','adet'].forEach(function(id) {
  var el = document.getElementById(id);
  if (!el) return;
  el.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      e.preventDefault();
      addPanel();
    }
  });
});

var panelEditIndex = null;

function addPanel() {
  var v1 = parseFloat(elBuyuk.value);
  var v2 = parseFloat(elKucuk.value);
  var adet = parseInt(elAdet.value) || 1;

  if (!v1 || v1 < 1) {
    setStatus('Hata: Ölçü 1 giriniz!');
    elBuyuk.focus();
    return;
  }
  if (!v2 || v2 < 1) {
    setStatus('Hata: Ölçü 2 giriniz!');
    elKucuk.focus();
    return;
  }
  // Buyuk/kucuk otomatik ayrim: en buyuk = B, digeri = K
  var B = Math.max(v1, v2);
  var K = Math.min(v1, v2);
  if (B < 100) {
    setStatus('Hata: Büyük ölçü en az 100 mm olmalı!');
    elBuyuk.focus();
    return;
  }

  var panel = {
    kalinlik: elKalinlik.value,
    tip: elTip.value,
    B: B,
    K: K,
    cam: elTip.value === 'ACILIR' ? elCam.value : 'H',
    bogazTip: elTip.value === 'BOGAZ' ? elBogazTip.value : '-',
    kod: elKod.value.trim(),
    adet: adet
  };

  if (panelEditIndex !== null) {
    panels[panelEditIndex] = panel;
    setStatus('Panel güncellendi: ' + panel.tip + ' ' + panel.B + 'x' + panel.K);
    panelEditIndex = null;
    elBtnAdd.textContent = '+ Listeye Ekle';
  } else {
    panels.push(panel);
    setStatus('Panel eklendi: ' + panel.tip + ' ' + panel.B + 'x' + panel.K + ' mm (' + adet + ' adet)');
  }
  renderTable();

  // Buyuk olcu ve Kod, kullanici manuel degistirmedikce korunur (seri girist kolayligi).
  elKucuk.value = '';
  elAdet.value = '1';
  elKucuk.focus();
}

function editPanel(index) {
  var p = panels[index];
  if (!p) return;
  panelEditIndex = index;
  elKalinlik.value = p.kalinlik;
  elTip.value = p.tip;
  elTip.dispatchEvent(new Event('change'));
  elBuyuk.value = p.B;
  elKucuk.value = p.K;
  if (p.cam) elCam.value = p.cam;
  if (p.bogazTip && p.bogazTip !== '-') elBogazTip.value = p.bogazTip;
  elKod.value = p.kod || '';
  elAdet.value = p.adet;
  elBtnAdd.textContent = '\u2713 G\u00fcncelle';
  renderTable();
  elBuyuk.focus();
  setStatus('Düzenleme modu: #' + (index + 1));
}

function removePanel(index) {
  panels.splice(index, 1);
  if (panelEditIndex === index) {
    panelEditIndex = null;
    elBtnAdd.textContent = '+ Listeye Ekle';
  } else if (panelEditIndex !== null && index < panelEditIndex) {
    panelEditIndex--;
  }
  renderTable();
  setStatus('Panel silindi.');
}

// Kalinlik kodunu okunabilir etikete cevirir ('50P' -> &quot;50'lik Pas.&quot;)
function kalinlikLabel(k) {
  k = String(k || '');
  if (k.slice(-1) === 'P') return k.slice(0, -1) + &quot;'lik Pas.&quot;;
  return k + &quot;'lik&quot;;
}

function renderTable() {
  elTable.innerHTML = '';

  if (panels.length === 0) {
    elEmpty.style.display = 'block';
    elCount.textContent = '0 panel';
    updateBulkToolbar();
    return;
  }

  elEmpty.style.display = 'none';

  var totalAdet = 0;
  panels.forEach(function(p, i) {
    totalAdet += p.adet;
    var tr = document.createElement('tr');

function getCheckedIndices() {
  var chks = document.querySelectorAll('#panel-table .row-chk:checked');
  return Array.prototype.map.call(chks, function(c){ return parseInt(c.dataset.idx); });
}

function updateBulkToolbar() {
  var idxs = getCheckedIndices();
  var toolbar = document.getElementById('bulk-toolbar');
  var countEl = document.getElementById('bulk-sel-count');
  if(!toolbar) return;
  if(idxs.length > 0) {
    toolbar.style.display = 'flex';
    countEl.textContent = idxs.length + ' seçili';
  } else {
    toolbar.style.display = 'none';
  }
}

(function() {
  var chkAll = document.getElementById('chk-all');
  var bulkValKod = document.getElementById('bulk-val-kod');
  var bulkApply = document.getElementById('bulk-apply');
  var bulkClear = document.getElementById('bulk-clear');

  if(chkAll) {
    chkAll.addEventListener('change', function() {
      var chks = document.querySelectorAll('#panel-table .row-chk');
      chks.forEach(function(c){ c.checked = chkAll.checked; });
      updateBulkToolbar();
    });
  }

  if(bulkApply) {
    bulkApply.addEventListener('click', function() {
      var idxs = getCheckedIndices();
      if(idxs.length === 0) return;

        if(panels[i]) panels[i].kod = yeniKod;
      });
      renderTable();
      setStatus(idxs.length + ' panelin kodu güncellendi.');
    });
  }

  if(bulkClear) {
    bulkClear.addEventListener('click', function() {
      var chks = document.querySelectorAll('#panel-table .row-chk');
      chks.forEach(function(c){ c.checked = false; });
      var chkAll = document.getElementById('chk-all');
      if(chkAll) chkAll.checked = false;
      updateBulkToolbar();
    });

})();

// ===================================================================
// GECMIS TASARIMLAR - localStorage tabanli proje gecmisi
// ===================================================================
var HISTORY_KEY = 'pcp_history_v1';
var HISTORY_MAX = 200;

function historyLoad() {
  try {
    var raw = localStorage.getItem(HISTORY_KEY);
    if (!raw) return [];
    var arr = JSON.parse(raw);
    return Array.isArray(arr) ? arr : [];
  } catch (e) { return []; }
}
function historySave(list) {
  try { localStorage.setItem(HISTORY_KEY, JSON.stringify(list)); } catch (e) {}
}
function historyAdd(entry) {
  entry.id = 'h_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8);
  entry.date = Date.now();
  var list = historyLoad();
  list.unshift(entry);
  if (list.length > HISTORY_MAX) list.length = HISTORY_MAX;
  historySave(list);
}
function historyRemove(id) {
  var list = historyLoad().filter(function(x){ return x.id !== id; });
  historySave(list);
}
function historyClear() {
  historySave([]);
}
function historyFormatDate(ts) {
  var d = new Date(ts);
  var pad = function(n){ return n < 10 ? '0' + n : '' + n; };
  return pad(d.getDate()) + '.' + pad(d.getMonth()+1) + '.' + d.getFullYear() +
         ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes());
}
function historyBadgeLabel(mode) {
  return mode === 'panel' ? 'PANEL'
       : mode === 'bogaz' ? 'BOGAZ'
       : mode.toUpperCase();
}

function renderHistoryList(filter) {
  var list = historyLoad();
  if (filter) {
    var q = filter.toLowerCase();
    list = list.filter(function(x){
      return (x.name || '').toLowerCase().indexOf(q) >= 0
          || (x.mode || '').toLowerCase().indexOf(q) >= 0;
    });
  }
  var container = document.getElementById('history-list');
  var empty = document.getElementById('history-empty');
  if (!container) return;
  container.innerHTML = '';
  if (list.length === 0) {
    empty.classList.add('visible');
    container.style.display = 'none';
    return;
  }
  empty.classList.remove('visible');
  container.style.display = 'flex';
  list.forEach(function(entry) {
    var item = document.createElement('div');
    item.className = 'history-item';
    item.setAttribute('data-id', entry.id);
    var badge = document.createElement('div');
    badge.className = 'history-item-badge';
    badge.textContent = historyBadgeLabel(entry.mode);
    var main = document.createElement('div');
    main.className = 'history-item-main';
    var name = document.createElement('div');
    name.className = 'history-item-name';
    name.textContent = entry.name || '(isimsiz)';
    var meta = document.createElement('div');
    meta.className = 'history-item-meta';
    meta.innerHTML = '<span>' + historyFormatDate(entry.date) + '</span>'
                   + '<span class=&quot;dot&quot;>&middot;</span>'
                   + '<span>' + (entry.count || 0) + ' kayıt</span>';
    main.appendChild(name);
    main.appendChild(meta);
    var actions = document.createElement('div');
    actions.className = 'history-item-actions';
    var delBtn = document.createElement('button');
    delBtn.className = 'history-item-btn del';
    delBtn.title = 'Sil';
    delBtn.innerHTML = '&times;';
    delBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      if (confirm('Bu kaydi silmek istediginizden emin misiniz?')) {
        historyRemove(entry.id);
        renderHistoryList(document.getElementById('history-search').value);
      }
    });
    actions.appendChild(delBtn);
    item.appendChild(badge);
    item.appendChild(main);
    item.appendChild(actions);
    item.addEventListener('click', function() {
      restoreHistoryEntry(entry.id);
    });
    container.appendChild(item);
  });
}

function openHistoryModal() {
  var m = document.getElementById('history-modal');
  if (!m) return;
  var s = document.getElementById('history-search');
  if (s) s.value = '';
  renderHistoryList('');
  m.classList.add('active');
}
function closeHistoryModal() {
  var m = document.getElementById('history-modal');
  if (m) m.classList.remove('active');
}

function restoreHistoryEntry(id) {
  var entry = historyLoad().find(function(x){ return x.id === id; });
  if (!entry) return;
  var d = entry.data || {};
  if (entry.mode === 'panel') {
    panels.length = 0;
    (d.panels || []).forEach(function(p){ panels.push(p); });
    var el50 = document.getElementById('dosyaAdi50');
    var el60 = document.getElementById('dosyaAdi60');
    if (el50) el50.value = d.dosyaAdi50 || '';
    if (el60) el60.value = d.dosyaAdi60 || '';
    renderTable();
    setMode('combined');
  } else if (entry.mode === 'bogaz') {
    bogazList.length = 0;
    (d.bogazList || []).forEach(function(b){ bogazList.push(b); });
    var elb = document.getElementById('b-dosyaAdi');
    if (elb) elb.value = d.dosyaAdi || '';
    renderBogazTable();
    setMode('combined');
  }
  closeHistoryModal();
  setStatus('Geçmiş tasarım yüklendi: ' + (entry.name || ''));
}

// Modal olay baglari
(function initHistoryModal(){
  var closeBtn = document.getElementById('history-close');
  if (closeBtn) closeBtn.addEventListener('click', closeHistoryModal);
  var backdrop = document.querySelector('#history-modal .history-backdrop');
  if (backdrop) backdrop.addEventListener('click', closeHistoryModal);
  var search = document.getElementById('history-search');
  if (search) search.addEventListener('input', function(){ renderHistoryList(this.value); });
  var clearBtn = document.getElementById('history-clear-all');
  if (clearBtn) clearBtn.addEventListener('click', function(){
    if (historyLoad().length === 0) return;
    if (confirm('Tüm geçmiş kayıtları silmek istediğinizden emin misiniz?')) {
      historyClear();
      renderHistoryList('');
    }
  });
  document.addEventListener('keydown', function(e){
    if (e.key === 'Escape') {
      var m = document.getElementById('history-modal');
      if (m && m.classList.contains('active')) closeHistoryModal();
    }
  });
})();

var bogazList = [];
var elBYbp = document.getElementById('b-ybp');
var elBDbp = document.getElementById('b-dbp');
var elBAdet = document.getElementById('b-adet');
var elBBtnAdd = document.getElementById('b-btn-add');
var elBBtnExport = document.getElementById('b-btn-export');
var elBTable = document.getElementById('b-table');
var elBEmpty = document.getElementById('b-empty');
var elBCount = document.getElementById('b-count');
var elBDosyaAdi = document.getElementById('b-dosyaAdi');

var bogazEditIndex = null;

function addBogaz() {
  var ybp = parseFloat(elBYbp.value);
  var dbp = parseFloat(elBDbp.value);
  var adet = parseInt(elBAdet.value) || 1;

  if (!ybp || ybp < 50) {
    setStatus('Hata: YBP en az 50 mm olmalı!');
    elBYbp.focus();
    return;
  }
  if (!dbp || dbp < 14) {
    setStatus('Hata: DBP en az 14 mm olmalı!');
    elBDbp.focus();
    return;
  }

  var entry = { ybp: ybp, dbp: dbp, adet: adet };
  if (bogazEditIndex !== null) {
    bogazList[bogazEditIndex] = entry;
    setStatus('Boğaz güncellendi: YBP ' + ybp + ' / DBP ' + dbp);
    bogazEditIndex = null;
    elBBtnAdd.textContent = '+ Listeye Ekle';
  } else {
    bogazList.push(entry);
    setStatus('Boğaz eklendi: YBP ' + ybp + ' / DBP ' + dbp + ' (' + adet + ' adet)');
  }
  renderBogazTable();

  elBYbp.value = '';
  elBDbp.value = '';
  elBAdet.value = '1';
  elBYbp.focus();
}

function editBogaz(index) {
  var b = bogazList[index];
  if (!b) return;
  bogazEditIndex = index;
  elBYbp.value = b.ybp;
  elBDbp.value = b.dbp;
  elBAdet.value = b.adet;
  elBBtnAdd.textContent = '\u2713 G\u00fcncelle';
  renderBogazTable();
  elBYbp.focus();
  setStatus('Düzenleme modu: #' + (index + 1));
}

function removeBogaz(index) {
  bogazList.splice(index, 1);
  if (bogazEditIndex === index) {
    bogazEditIndex = null;
    elBBtnAdd.textContent = '+ Listeye Ekle';
  } else if (bogazEditIndex !== null && index < bogazEditIndex) {
    bogazEditIndex--;
  }
  renderBogazTable();
  setStatus('Boğaz silindi.');
}

function renderBogazTable() {
  elBTable.innerHTML = '';
  if (bogazList.length === 0) {
    elBEmpty.style.display = 'block';
    elBCount.textContent = '0 kayıt';
    return;
  }
  elBEmpty.style.display = 'none';

  var totalAdet = 0;
  bogazList.forEach(function(b, i) {
    totalAdet += b.adet;
    var tr = document.createElement('tr');
    tr.className = 'row-clickable' + (bogazEditIndex === i ? ' row-editing' : '');
    tr.title = 'Cift tikla: duzenle';
    tr.innerHTML =
      '<td>' + (i + 1) + '</td>' +
      '<td>' + b.ybp + '</td>' +
      '<td>' + b.dbp + '</td>' +
      '<td>' + b.adet + '</td>' +
      '<td class=&quot;td-actions&quot;>' +
        '<button class=&quot;b-btn-edit&quot; data-idx=&quot;' + i + '&quot; title=&quot;Düzenle&quot;>&#9998;</button>' +
        '<button class=&quot;b-btn-del&quot; data-idx=&quot;' + i + '&quot; title=&quot;Sil&quot;>Sil</button>' +
      '</td>';
    tr.addEventListener('dblclick', function(){ editBogaz(i); });
    elBTable.appendChild(tr);
  });
  elBCount.textContent = bogazList.length + ' kayıt / ' + totalAdet + ' boğaz';

  document.querySelectorAll('.b-btn-edit').forEach(function(btn) {
    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      editBogaz(parseInt(btn.dataset.idx));
    });
  });
  document.querySelectorAll('.b-btn-del').forEach(function(btn) {
    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      removeBogaz(parseInt(btn.dataset.idx));
    });
  });
}

if (elBBtnAdd) elBBtnAdd.addEventListener('click', addBogaz);

document.querySelectorAll('#sidebar-bogaz input').forEach(function(el) {
  el.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') addBogaz();
  });
});

// =====================================================================
// BOGAZ GEOMETRI CIZIMI (BOGAZ_OTOMATIK.lsp portu)
// =====================================================================
// DBP = Dikey Bogaz Parcasi (yukseklik degeri mm)
// YBP = Yatay Bogaz Parcasi (genislik degeri mm)
// Tum koordinatlar ox,oy alt-sol kosesine gore.

var BOGAZ_LAYER = 'BOGAZ';

function drawBogazDBP(dxf, ox, oy, DBP) {
  var LR = DBP - 13.6;
  var dY = LR - 586.4;
  var L = BOGAZ_LAYER;

  // ALT-KAPAK: 3 delik r=2.75
  dxf.addCircle(ox + 51.884,  oy + 12.500, 2.75, L);
  dxf.addCircle(ox + 81.884,  oy + 12.500, 2.75, L);
  dxf.addCircle(ox + 111.884, oy + 12.500, 2.75, L);

  // Govde alt koseler R5
  dxf.addArc(ox + 5.000,   oy + 30.242, 5.0, 180, 270, L);
  dxf.addArc(ox + 158.768, oy + 30.242, 5.0, 270, 360, L);

  // Dil alt koseler R5
  dxf.addArc(ox + 38.684,  oy + 5.000, 5.0, 180, 270, L);
  dxf.addArc(ox + 125.084, oy + 5.000, 5.0, 270, 360, L);

  // Gecis rolezi R0.8 (SW eksik = NE,NW,SE)
  dxf.addArc(ox + 33.684, oy + 25.242, 0.8,   0,  90, L);
  dxf.addArc(ox + 33.684, oy + 25.242, 0.8,  90, 180, L);
  dxf.addArc(ox + 33.684, oy + 25.242, 0.8, 270, 360, L);

  // Gecis rolezi sag R0.8 (SE eksik = NE,NW,SW)
  dxf.addArc(ox + 130.084, oy + 25.242, 0.8,   0,  90, L);
  dxf.addArc(ox + 130.084, oy + 25.242, 0.8,  90, 180, L);
  dxf.addArc(ox + 130.084, oy + 25.242, 0.8, 180, 270, L);

  // Govde yatay kenarlar (alt kapak)
  dxf.addLine(ox + 5.000,   oy + 25.242, ox + 32.884,  oy + 25.242, L);
  dxf.addLine(ox + 130.884, oy + 25.242, ox + 158.768, oy + 25.242, L);

  // Dil tabani (Y=0)
  dxf.addLine(ox + 38.684, oy + 0.000, ox + 125.084, oy + 0.000, L);

  // Dil dikey duvarlari
  dxf.addLine(ox + 33.684,  oy + 24.442, ox + 33.684,  oy + 5.000, L);
  dxf.addLine(ox + 130.084, oy + 5.000,  ox + 130.084, oy + 24.442, L);

  // Govde dikey kenarlar
  var yTop = 30.242 + LR;
  dxf.addLine(ox + 0.000,   oy + 30.242, ox + 0.000,   oy + yTop, L);
  dxf.addLine(ox + 163.768, oy + 30.242, ox + 163.768, oy + yTop, L);

  // UST-KAPAK
  var y616 = 616.642 + dY;
  var y621 = 621.642 + dY;
  var y622 = 622.442 + dY;
  var y634 = 634.384 + dY;
  var y641 = 641.884 + dY;
  var y646 = 646.884 + dY;

  // 3 delik r=2.75
  dxf.addCircle(ox + 51.884,  oy + y634, 2.75, L);
  dxf.addCircle(ox + 81.884,  oy + y634, 2.75, L);
  dxf.addCircle(ox + 111.884, oy + y634, 2.75, L);

  // Govde ust koseler R5
  dxf.addArc(ox + 5.000,   oy + y616, 5.0, 90, 180, L);
  dxf.addArc(ox + 158.768, oy + y616, 5.0,  0,  90, L);

  // Dil ust koseler R5
  dxf.addArc(ox + 38.684,  oy + y641, 5.0, 90, 180, L);
  dxf.addArc(ox + 125.084, oy + y641, 5.0,  0,  90, L);

  // Gecis rolezi ust-sol R0.8 (NW eksik = NE, SW, SE)
  dxf.addArc(ox + 33.684, oy + y621, 0.8,   0,  90, L);
  dxf.addArc(ox + 33.684, oy + y621, 0.8, 180, 270, L);
  dxf.addArc(ox + 33.684, oy + y621, 0.8, 270, 360, L);

  // Gecis rolezi ust-sag R0.8 (NE eksik = NW, SW, SE)
  dxf.addArc(ox + 130.084, oy + y621, 0.8,  90, 180, L);
  dxf.addArc(ox + 130.084, oy + y621, 0.8, 180, 270, L);
  dxf.addArc(ox + 130.084, oy + y621, 0.8, 270, 360, L);

  // Govde yatay kenarlar (ust kapak)
  dxf.addLine(ox + 32.884,  oy + y621, ox + 5.000,   oy + y621, L);
  dxf.addLine(ox + 158.768, oy + y621, ox + 130.884, oy + y621, L);

  // Dil tavani
  dxf.addLine(ox + 38.684, oy + y646, ox + 125.084, oy + y646, L);

  // Dil dikey duvarlari (ust)
  dxf.addLine(ox + 33.684,  oy + y641, ox + 33.684,  oy + y622, L);
  dxf.addLine(ox + 130.084, oy + y622, ox + 130.084, oy + y641, L);
}

function drawBogazYBP(dxf, ox, oy, YBP) {
  var L = BOGAZ_LAYER;
  var BW = YBP + 40;    // govde genislik
  var xR = 5.0 + BW;    // sag koselerin X merkezi
  var xW = 10.0 + BW;   // sag dikey kenar X
  var xC = xW - 12.5;   // sag delik sutunu X

  // SOL-UC
  dxf.addLine(ox + 0.000, oy + 5.000, ox + 0.000, oy + 158.768, L);
  dxf.addArc(ox + 5.000, oy + 5.000,   5.0, 180, 270, L);
  dxf.addArc(ox + 5.000, oy + 158.768, 5.0,  90, 180, L);

  // Sol 5 delik
  dxf.addCircle(ox + 12.500, oy + 20.942,  5.0,  L);
  dxf.addCircle(ox + 12.500, oy + 51.884,  2.75, L);
  dxf.addCircle(ox + 12.500, oy + 81.884,  2.75, L);
  dxf.addCircle(ox + 12.500, oy + 111.884, 2.75, L);
  dxf.addCircle(ox + 12.500, oy + 142.826, 5.0,  L);

  // Govde yatay kenarlar
  dxf.addLine(ox + 5.000, oy + 0.000,   ox + xR, oy + 0.000, L);
  dxf.addLine(ox + 5.000, oy + 163.768, ox + xR, oy + 163.768, L);

  // SAG-UC
  dxf.addLine(ox + xW, oy + 5.000, ox + xW, oy + 158.768, L);
  dxf.addArc(ox + xR, oy + 5.000,   5.0, 270, 360, L);
  dxf.addArc(ox + xR, oy + 158.768, 5.0,   0,  90, L);

  // Sag 5 delik
  dxf.addCircle(ox + xC, oy + 20.942,  5.0,  L);
  dxf.addCircle(ox + xC, oy + 51.884,  2.75, L);
  dxf.addCircle(ox + xC, oy + 81.884,  2.75, L);
  dxf.addCircle(ox + xC, oy + 111.884, 2.75, L);
  dxf.addCircle(ox + xC, oy + 142.826, 5.0,  L);

  // Orta delikler (YBP >= 1950)
  if (YBP >= 1950) {
    var xM = xW / 2.0;
    dxf.addCircle(ox + xM, oy + 51.884,  2.75, L);
    dxf.addCircle(ox + xM, oy + 81.884,  2.75, L);
    dxf.addCircle(ox + xM, oy + 111.884, 2.75, L);
  }
}

// Tek bir bogaz seti (2xDBP + 2xYBP, haci duzeni)
function drawBogazSet(dxf, ox, oy, YBP, DBP) {
  var G = 100.0;
  var wDBP = 163.768;
  var hDBP = DBP + 46.884;
  var wYBP = YBP + 50.0;
  var hYBP = 163.768;

  // Alt YBP
  drawBogazYBP(dxf, ox + wDBP + G, oy + 0.0, YBP);
  // Sol DBP
  drawBogazDBP(dxf, ox + 0.0, oy + hYBP + G, DBP);
  // Sag DBP
  drawBogazDBP(dxf, ox + wDBP + G + wYBP + G, oy + hYBP + G, DBP);
  // Ust YBP
  drawBogazYBP(dxf, ox + wDBP + G, oy + hYBP + G + hDBP + G, YBP);

  // Uzun durum: 3. DBP
  if (YBP >= 1950) {
    drawBogazDBP(dxf, ox + wDBP + G + wYBP + G + wDBP + 300.0, oy + hYBP + G, DBP);
  }

  // Toplam olcu
  var totalW = (YBP >= 1950)
    ? (wDBP + G + wYBP + G + wDBP + 300.0 + wDBP)
    : (wDBP + G + wYBP + G + wDBP);
  var totalH = hYBP + G + hDBP + G + hYBP;
  return { w: totalW, h: totalH };
}

function generateAndDownloadBogazDxf(list) {
  var dxf = new DxfWriter();
  var SET_GAP = 500.0; // setler arasi dusey bosluk
  var yCursor = 0;

  list.forEach(function(b) {
    for (var a = 0; a < b.adet; a++) {
      var dim = drawBogazSet(dxf, 0, yCursor, b.ybp, b.dbp);
      yCursor += dim.h + SET_GAP;
    }
  });

  var totalCount = 0;
  list.forEach(function(b) { totalCount += b.adet; });

  var rawName = (elBDosyaAdi.value || 'bogaz').trim();
  var name = (rawName || 'bogaz').replace(/[^a-zA-Z0-9_\-]/g, '_') + '.dxf';
  var blob = new Blob([dxf.generate()], { type: 'application/octet-stream' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = name;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  return { success: true, count: totalCount, filename: name };
}


// SVG WRITER (DxfWriter API uyumlu) - canli onizleme icin
// =====================================================================
function SvgWriter() { this.entities = []; }
SvgWriter.prototype.addLine   = function(x1,y1,x2,y2,layer){ this.entities.push({t:'L',x1:x1,y1:y1,x2:x2,y2:y2}); };
SvgWriter.prototype.addCircle = function(cx,cy,r,layer){ this.entities.push({t:'C',cx:cx,cy:cy,r:r}); };
SvgWriter.prototype.addArc    = function(cx,cy,r,sa,ea,layer){ this.entities.push({t:'A',cx:cx,cy:cy,r:r,sa:sa,ea:ea}); };
SvgWriter.prototype.addText   = function(){};
SvgWriter.prototype.addSpline = function(pts){
  // Spline'i basit bir polyline olarak onizlemede goster
  var e = this.entities;
  for (var i = 1; i < pts.length; i++) {
    e.push({t:'L', x1:pts[i-1][0], y1:pts[i-1][1], x2:pts[i][0], y2:pts[i][1]});
  }
};
SvgWriter.prototype.bbox = function() {
  var minX=Infinity,maxX=-Infinity,minY=Infinity,maxY=-Infinity;
  this.entities.forEach(function(e){
    if (e.t==='L') {
      if (e.x1<minX)minX=e.x1; if (e.x2<minX)minX=e.x2;
      if (e.x1>maxX)maxX=e.x1; if (e.x2>maxX)maxX=e.x2;
      if (e.y1<minY)minY=e.y1; if (e.y2<minY)minY=e.y2;
      if (e.y1>maxY)maxY=e.y1; if (e.y2>maxY)maxY=e.y2;
    } else if (e.t==='C' || e.t==='A') {
      if (e.cx-e.r<minX)minX=e.cx-e.r;
      if (e.cx+e.r>maxX)maxX=e.cx+e.r;
      if (e.cy-e.r<minY)minY=e.cy-e.r;
      if (e.cy+e.r>maxY)maxY=e.cy+e.r;
    }
  });
  return {minX:minX,maxX:maxX,minY:minY,maxY:maxY};
};
SvgWriter.prototype.toSvg = function(width, height) {
  if (this.entities.length === 0) return '';
  var bb = this.bbox();
  var w = bb.maxX - bb.minX;
  var h = bb.maxY - bb.minY;
  var pad = Math.max(w, h) * 0.04 + 10;
  var vbX = bb.minX - pad;
  var vbY = -bb.maxY - pad;
  var vbW = w + 2*pad;
  var vbH = h + 2*pad;
  var sw = Math.max(vbW, vbH) / 180;
  var parts = [];
  parts.push('<svg xmlns=&quot;http://www.w3.org/2000/svg&quot; viewBox=&quot;'+vbX+' '+vbY+' '+vbW+' '+vbH+'&quot; width=&quot;'+width+'&quot; height=&quot;'+height+'&quot; preserveAspectRatio=&quot;xMidYMid meet&quot; style=&quot;stroke:currentColor;fill:none;stroke-width:'+sw+';stroke-linecap:round;stroke-linejoin:round;&quot;>');
  this.entities.forEach(function(e){
    if (e.t==='L') {
      parts.push('<line x1=&quot;'+e.x1+'&quot; y1=&quot;'+(-e.y1)+'&quot; x2=&quot;'+e.x2+'&quot; y2=&quot;'+(-e.y2)+'&quot;/>');
    } else if (e.t==='C') {
      parts.push('<circle cx=&quot;'+e.cx+'&quot; cy=&quot;'+(-e.cy)+'&quot; r=&quot;'+e.r+'&quot;/>');
    } else if (e.t==='A') {
      var sa = e.sa * Math.PI / 180;
      var ea = e.ea * Math.PI / 180;
      var sx = e.cx + e.r * Math.cos(sa);
      var sy = -(e.cy + e.r * Math.sin(sa));
      var ex = e.cx + e.r * Math.cos(ea);
      var ey = -(e.cy + e.r * Math.sin(ea));
      var diff = e.ea - e.sa;
      while (diff < 0) diff += 360;
      while (diff > 360) diff -= 360;
      var la = diff > 180 ? 1 : 0;
      parts.push('<path d=&quot;M '+sx+' '+sy+' A '+e.r+' '+e.r+' 0 '+la+' 1 '+ex+' '+ey+'&quot;/>');
    }
  });
  parts.push('</svg>');
  return parts.join('');
};

var previewState = {
  'p-preview-svg': { zoom: 1, tx: 0, ty: 0 },
  'b-preview-svg': { zoom: 1, tx: 0, ty: 0 },
  'a-preview-svg': { zoom: 1, tx: 0, ty: 0 },
  'e-preview-svg': { zoom: 1, tx: 0, ty: 0 }
};

function setPreviewSvg(boxId, svgHtml) {
  var box = document.getElementById(boxId);
  if (!box) return;
  var st = previewState[boxId] || { zoom: 1, tx: 0, ty: 0 };
  var content = svgHtml || '<span style=&quot;color:var(--text-muted);font-size:12px&quot;>Ölçü girin...</span>';
  var zoomText = '<span class=&quot;preview-zoom-badge&quot;>' + st.zoom.toFixed(1) + 'x</span>';
  box.innerHTML = zoomText + content;
  box.style.setProperty('--preview-zoom', st.zoom);
  box.style.setProperty('--preview-tx', st.tx + 'px');
  box.style.setProperty('--preview-ty', st.ty + 'px');
  box.classList.toggle('zoomed', st.zoom > 1.001 || st.zoom < 0.999 || st.tx !== 0 || st.ty !== 0);
}

function attachPreviewZoom(boxId) {
  var box = document.getElementById(boxId);
  if (!box) return;
  var st = previewState[boxId];

  box.addEventListener('wheel', function(e) {
    e.preventDefault();
    var delta = e.deltaY > 0 ? 0.85 : 1.18;
    var newZoom = Math.max(0.4, Math.min(12, st.zoom * delta));
    st.zoom = newZoom;
    if (newZoom <= 1.001) { st.tx = 0; st.ty = 0; }
    box.style.setProperty('--preview-zoom', st.zoom);
    box.style.setProperty('--preview-tx', st.tx + 'px');
    box.style.setProperty('--preview-ty', st.ty + 'px');
    var badge = box.querySelector('.preview-zoom-badge');
    if (badge) badge.textContent = st.zoom.toFixed(1) + 'x';
    box.classList.toggle('zoomed', st.zoom > 1.001 || st.zoom < 0.999 || st.tx !== 0 || st.ty !== 0);
  }, { passive: false });

  // Cift tik: zoom sifirla
  box.addEventListener('dblclick', function() {
    st.zoom = 1; st.tx = 0; st.ty = 0;
    box.style.setProperty('--preview-zoom', 1);
    box.style.setProperty('--preview-tx', '0px');
    box.style.setProperty('--preview-ty', '0px');
    var badge = box.querySelector('.preview-zoom-badge');
    if (badge) badge.textContent = '1.0x';
    box.classList.remove('zoomed');
  });

  // Zoomluyken tutup kaydirma (pan)
  var panning = false, startX = 0, startY = 0, baseTx = 0, baseTy = 0;
  box.addEventListener('mousedown', function(e) {
    if (st.zoom <= 1.001) return;
    panning = true;
    startX = e.clientX; startY = e.clientY;
    baseTx = st.tx; baseTy = st.ty;
    e.preventDefault();
  });
  window.addEventListener('mousemove', function(e) {
    if (!panning) return;
    var scale = st.zoom;
    st.tx = baseTx + (e.clientX - startX) / scale;
    st.ty = baseTy + (e.clientY - startY) / scale;
    box.style.setProperty('--preview-tx', st.tx + 'px');
    box.style.setProperty('--preview-ty', st.ty + 'px');
  });
  window.addEventListener('mouseup', function() { panning = false; });
}

function updateBogazPreview() {
  var ybpRaw = parseFloat(elBYbp.value);
  var dbpRaw = parseFloat(elBDbp.value);
  var box = document.getElementById('b-preview-svg');
  var dim = document.getElementById('b-preview-dim');
  if (!box || !dim) return;

  var ybp = (!isNaN(ybpRaw) && ybpRaw >= 50) ? ybpRaw : 1350;
  var dbp = (!isNaN(dbpRaw) && dbpRaw >= 14) ? dbpRaw : 600;

  var sw = new SvgWriter();
  try { drawBogazSet(sw, 0, 0, ybp, dbp); } catch(e){}
  setPreviewSvg('b-preview-svg', sw.toSvg(260, 130));

  var totalW = (ybp >= 1950) ? (163.768*3 + 100*2 + (ybp+50) + 300) : (163.768*2 + 100*2 + (ybp+50));
  var totalH = 163.768*2 + 100*2 + (dbp + 46.884);

// Panel onizleme: gercek cizim fonksiyonlarini kullanir (DIS + IC cifti)
function updatePanelPreview() {
  var box = document.getElementById('p-preview-svg');
  var dim = document.getElementById('p-preview-dim');
  if (!box || !dim) return;

  var v1 = parseFloat(elBuyuk.value);
  var v2 = parseFloat(elKucuk.value);
  var tip = elTip.value;
  var kalinlik = elKalinlik.value;
  var cam = elCam ? elCam.value : 'H';
  var bogazTip = elBogazTip ? elBogazTip.value : 'N';
  var kod = elKod ? (elKod.value || '') : '';

  // Otomatik buyuk/kucuk ayrim: max -> B, min -> K
  var Braw = (!isNaN(v1) && !isNaN(v2)) ? Math.max(v1, v2) : (!isNaN(v1) ? v1 : v2);
  var Kraw = (!isNaN(v1) && !isNaN(v2)) ? Math.min(v1, v2) : (!isNaN(v1) ? v1 : v2);

  // Varsayilan degerler (form bosken)
  var B = (!isNaN(Braw) && Braw >= 100) ? Braw : 1200;
  var K = (!isNaN(Kraw) && Kraw >= 1)   ? Kraw : 800;

  var sw = new SvgWriter();
  try {
    if (kalinlik === '50') {
      var Wdis = B + 98;
      switch (tip) {
        case 'SABIT': {
          var pN = drawDisSabit(sw, 0, 0, B, K, kod);
          drawIcSabit(sw, Wdis + 400, 33.5, B, K, kod, pN);
          break;
        }
        case 'ACILIR':
          drawDisAcilir(sw, 0, 0, B, K, cam || 'H', kod);
          drawIcAcilir(sw, Wdis + 400, 34.5, B, K, cam || 'H', kod);
          break;
        case 'UST':
          drawUst(sw, 0, 0, B, K, kod);
          break;
        case 'BOGAZ': {
          var pN = drawBogazDis(sw, 0, 0, B, K, bogazTip || 'N', kod);
          drawIcSabit(sw, Wdis + 400, 33.5, B, K, kod, pN);
          break;
        }
      }
    } else {
      switch (tip) {
        case 'SABIT':
          drawDis60(sw, 0, 0, B, K, kod, '0');
          drawIc60(sw, B + 797, 20.5, B, K, kod, '0');
          break;
        case 'ACILIR':
          var BI = B - 43, KI = K - 43;
          var oxIc = B + 498.5;
          var oyIc = (K - KI) / 2;
          drawDisAcilir60(sw, 0, 0, B, K, kod, '0');
          drawIcAcilir60(sw, oxIc, oyIc, B, K, kod, '0');
          if (cam === 'E') {
            addCam60(sw, B / 2, K / 2, '0');
            addCam60(sw, oxIc + BI / 2, K / 2, '0');
          }
          break;
        case 'UST':
          drawUst60(sw, 0, 0, B, K, kod, '0');
          break;
        case 'BOGAZ':
          drawBogazDis60(sw, 0, 0, B, K, (bogazTip || 'N').toUpperCase(), kod, '0');
          drawIc60(sw, B + 797, 20.5, B, K, kod, '0');
          break;
      }
    }
  } catch(e) {
    console.error('Panel preview error:', e);
  }

  setPreviewSvg('p-preview-svg', sw.toSvg(260, 130));
  dim.textContent = kalinlik + '\'lik ' + tip + ' | ' + Math.round(B) + ' x ' + Math.round(K) + ' mm';
}

  // 429 (kota), 500/503 (sunucu yogunlugu) gibi gecici hatalarda otomatik tekrar dener.
  // Ana model yogunsa daha hafif Flash modeline gecer.
  var FOTO_RETRY_MODELS = ['gemini-2.5-flash', 'gemini-2.0-flash', 'gemini-2.5-flash-lite'];

  function fotoSleep(ms) { return new Promise(function(r){ setTimeout(r, ms); }); }

  function fotoCallOnce(model, key, base64, mime) {
    var url = 'https://generativelanguage.googleapis.com/v1beta/models/' + model + ':generateContent?key=' + encodeURIComponent(key);
    var body = {
      contents: [{
        parts: [
          { text: fotoBuildPrompt() },
          { inline_data: { mime_type: mime, data: base64 } }
        ]
      }],
      generationConfig: {
        temperature: 0.1,
        responseMimeType: 'application/json'
      }
    };
    return fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    }).then(function(res) {
      return res.json().then(function(json) {
        if (!res.ok) {
          var rawMsg = (json && json.error && json.error.message) || '';
          var err = new Error(rawMsg || ('HTTP ' + res.status));
          err.status = res.status;
          err.rawMessage = rawMsg;
          throw err;
        }
        return json;
      });
    });
  }

  function fotoTrPretty(err) {
    var s = (err && err.rawMessage) || (err && err.message) || '';
    if (err && (err.status === 503 || /high demand|UNAVAILABLE|overloaded/i.test(s))) {
      return 'Gemini sunucuları şu anda çok yoğun. Birkaç saniye sonra otomatik tekrar denedik, yine olmadı. Lütfen 1-2 dakika sonra tekrar dene.';
    }
    if (err && err.status === 429) {
      return 'Günlük ücretsiz kota dolmuş görünüyor (~250 istek). Yarın sıfırlanır, ya da kişisel anahtarını kullan.';
    }
    if (err && (err.status === 400 || err.status === 401 || err.status === 403)) {
      return 'API anahtarı reddedildi (' + err.status + '). Anahtarı kontrol et ya da &quot;Kendi Gemini anahtarımı kullan&quot; ile yenisini gir.';
    }
    return s || 'Bilinmeyen hata.';
  }

  function fotoCallGemini(base64, mime) {
    var key = fotoGetKey();
    if (!key) return Promise.reject(new Error('API anahtarı yok.'));

    // Once ana modelde 3 deneme (2s, 4s backoff). Hala olmazsa fallback modellere gec.
    var attempts = [];
    FOTO_RETRY_MODELS.forEach(function(m, mi) {
      var perModel = mi === 0 ? 3 : 1; // ana modelde 3 deneme, fallback'larda 1
      for (var i = 0; i < perModel; i++) {
        attempts.push({ model: m, delay: i === 0 ? 0 : Math.min(8000, 2000 * Math.pow(2, i - 1)) });
      }
    });

    var lastErr = null;
    var p = Promise.resolve();
    attempts.forEach(function(att, idx) {
      p = p.then(function(result) {
        if (result) return result;
        return fotoSleep(att.delay).then(function() {
          fotoUpdateStatusRetry(idx + 1, attempts.length, att.model);
          return fotoCallOnce(att.model, key, base64, mime).catch(function(err) {
            lastErr = err;
            // sadece 429/500/503'de devam et; yetki/parametre hatasinda dur
            if (err.status === 401 || err.status === 403 || err.status === 400) throw err;
            return null;
          });
        });
      });
    });

    return p.then(function(json) {
      if (!json) throw lastErr || new Error('Tüm denemeler başarısız.');
      var text = '';
      try { text = json.candidates[0].content.parts[0].text; }
      catch (e) { throw new Error('Gemini yanıtı boş veya okunamadı.'); }
      var parsed;
      try { parsed = JSON.parse(text); }
      catch (e) {
        var m = text.match(/\{[\s\S]*\}/);
        if (!m) throw new Error('Gemini geçerli JSON döndürmedi.');
        parsed = JSON.parse(m[0]);
      }
      if (!parsed || !Array.isArray(parsed.panels)) {
        throw new Error('JSON içinde &quot;panels&quot; listesi bulunamadı.');
      }
      var dxfAdi = (parsed.dxfAdi == null ? '' : String(parsed.dxfAdi)).trim();
      // FORMAT B (basili tablo): model &quot;format&quot;:&quot;B&quot; doner ya da dxfAdi dolu olur.
      // Tablo gercek mm verdiginden cizim icin -1 mm kodda uygulanir.
      var fmt = String(parsed.format || '').trim().toUpperCase();
      var isFormatB = (fmt === 'B') || (!!dxfAdi);
      return { panels: fotoSanitize(parsed.panels, isFormatB), dxfAdi: dxfAdi };
    }).catch(function(err) {
      err.message = fotoTrPretty(err);
      throw err;
    });
  }

  function fotoUpdateStatusRetry(current, total, model) {
    var el = document.querySelector('#foto-body .foto-status');
    if (!el) return;
    if (current === 1) return; // ilk denemede orijinal mesaj kalsin
    el.innerHTML = '<span class=&quot;foto-spinner&quot;></span><b>Sunucu yoğun, tekrar deniyorum… (' + current + '/' + total + ')</b><br>' +
      '<span style=&quot;font-size:12px;color:var(--text-muted);&quot;>Model: ' + fotoEscapeHtml(model) + '</span>';
  }

  // applyMinus1: FORMAT B (basili tablo) icin true. Tablo gercek mm verir;
  // cizilecek olcu icin her iki boyuttan da 1 mm dusulur. FORMAT A'da -1 zaten
  // promptta (notasyon ile birlikte) yapildigindan burada tekrar yapilmaz.
  function fotoSanitize(arr, applyMinus1) {
    var validTip = { SABIT:1, ACILIR:1, BOGAZ:1, UST:1 };
    var validCam = { H:1, E:1 };
    var validBogaz = { '-':1, N:1, B:1, B2:1 };
    var out = [];
    arr.forEach(function(p) {
      if (!p) return;
      var kalinlik = String(p.kalinlik || '50');
      if (kalinlik !== '50' && kalinlik !== '60') kalinlik = '50';
      var tip = String(p.tip || 'SABIT').toUpperCase();
      if (!validTip[tip]) tip = 'SABIT';
      var B = Math.round(Number(p.B) || 0);
      var K = Math.round(Number(p.K) || 0);
      if (applyMinus1) { B -= 1; K -= 1; }
      if (B < 1 || K < 1) return;
      if (K > B) { var t = B; B = K; K = t; }
      var cam = String(p.cam || 'H').toUpperCase();
      if (!validCam[cam]) cam = 'H';
      var bogazTip = String(p.bogazTip || '-');
      if (!validBogaz[bogazTip]) bogazTip = '-';
      var adet = parseInt(p.adet, 10);
      if (!adet || adet < 1) adet = 1;
      var kodStr = p.kod == null ? '' : String(p.kod).trim();
      // Ust panellerde kod basina otomatik 'U' on eki ekle (UST tipi icin),
      // ama kullanici/Gemini zaten U ile baslattiysa ekleme.
      if (tip === 'UST' && kodStr && !/^U/i.test(kodStr)) {
        kodStr = 'U' + kodStr;
      }
      out.push({
        kalinlik: kalinlik,
        tip: tip,
        B: B, K: K,
        cam: tip === 'ACILIR' ? cam : 'H',
        bogazTip: tip === 'BOGAZ' ? (bogazTip === '-' ? 'B' : bogazTip) : '-',
        kod: kodStr,
        adet: adet
      });
    });
    return out;
  }

  function fotoTipLabel(p) {
    if (p.tip === 'SABIT') return 'Sabit';
    if (p.tip === 'UST') return 'Üst';
    if (p.tip === 'ACILIR') return p.cam === 'E' ? 'Açılır (Cam)' : 'Açılır';
    if (p.tip === 'BOGAZ') {
      if (p.bogazTip === 'B2') return 'Boğaz 2 Uzun';
      return 'Boğaz';
    }
    return p.tip;
  }

  function fotoShowResult(dataUrl, panelsArr, dxfAdi) {
    fotoLastResult = panelsArr;
    fotoLastDxfAdi = (dxfAdi || '').trim();
    if (!panelsArr.length) {
      fotoBody.innerHTML =
        '<div class=&quot;foto-preview-wrap&quot;>' +
          '<img src=&quot;' + fotoEscapeHtml(dataUrl) + '&quot; class=&quot;foto-preview-img&quot; alt=&quot;&quot;>' +
          '<div class=&quot;foto-preview-info&quot;>' +
            '<div class=&quot;foto-status error&quot;>Gemini fotoğrafta panel bulamadı. Daha net bir fotoğrafla tekrar dene.</div>' +
          '</div>' +
        '</div>' +
        '<div style=&quot;margin-top:14px;text-align:center;&quot;>' +
          '<button class=&quot;foto-btn&quot; id=&quot;foto-empty-retry&quot;>Başka Fotoğraf Seç</button>' +
        '</div>';
      document.getElementById('foto-empty-retry').onclick = fotoShowFilePicker;
      fotoFooter.style.display = 'none';
      return;
    }
    var totalAdet = 0;
    panelsArr.forEach(function(p){ totalAdet += p.adet; });
    var rowsHtml = panelsArr.map(function(p, i) {
      return '<tr>' +
        '<td>' + (i+1) + '</td>' +
        '<td>' + fotoEscapeHtml(p.kalinlik) + &quot;'lik</td>&quot; +
        '<td><span class=&quot;foto-tip-chip&quot;>' + fotoEscapeHtml(fotoTipLabel(p)) + '</span></td>' +
        '<td>' + p.B + '</td>' +
        '<td>' + p.K + '</td>' +
        '<td>' + fotoEscapeHtml(p.kod || '-') + '</td>' +
        '<td>' + p.adet + '</td>' +
      '</tr>';
    }).join('');
    var dxfAdiHtml = fotoLastDxfAdi
      ? '<div class=&quot;foto-status&quot; style=&quot;margin-top:8px;&quot;>📄 DXF adı: <b>' + fotoEscapeHtml(fotoLastDxfAdi) + '</b><br><span style=&quot;font-size:12px;color:var(--text-muted);&quot;>Listeye Ekle\'ye basınca dosya adı alanına otomatik yazılır.</span></div>'
      : '';
    fotoBody.innerHTML =
      '<div class=&quot;foto-preview-wrap&quot;>' +
        '<img src=&quot;' + fotoEscapeHtml(dataUrl) + '&quot; class=&quot;foto-preview-img&quot; alt=&quot;&quot;>' +
        '<div class=&quot;foto-preview-info&quot;>' +
          '<div class=&quot;foto-status&quot;><b>✓ Analiz tamam.</b> ' + panelsArr.length + ' satır, toplam ' + totalAdet + ' panel okundu. Aşağıdan kontrol et.</div>' +
          dxfAdiHtml +
          '<div style=&quot;margin-top:18px;display:flex;justify-content:center;&quot;>' +
          '</div>' +
        '</div>' +
      '</div>' +
      '<table class=&quot;foto-result-table&quot;>' +
        '<thead><tr><th>#</th><th>Profil</th><th>Tip</th><th>Yükseklik (mm)</th><th>Genişlik (mm)</th><th>Kod</th><th>Adet</th></tr></thead>' +
        '<tbody>' + rowsHtml + '</tbody>' +
      '</table>';
    fotoFooter.style.display = 'flex';
  }

  // Onaylanan paneller ana listeye eklenir
  fotoBtnConfirm.addEventListener('click', function() {
    if (!fotoLastResult || !fotoLastResult.length) return;
    fotoLastResult.forEach(function(p) { panels.push(p); });
    // FORMAT B (tablo): basligi ilgili kalinligin DXF dosya adi alanina yaz
    if (fotoLastDxfAdi) {
      var kalinliklarSet = {};
      fotoLastResult.forEach(function(p){ kalinliklarSet[p.kalinlik] = 1; });
      Object.keys(kalinliklarSet).forEach(function(k) {
        var el = k === '60' ? document.getElementById('dosyaAdi60')
                            : document.getElementById('dosyaAdi50');
        if (el) el.value = fotoLastDxfAdi;
      });
    }
    renderTable();
    setStatus(fotoLastResult.length + ' satır eklendi (fotoğraf analizi).');
    fotoCloseModal();
  });

  fotoBtnCancel.addEventListener('click', fotoCloseModal);
  fotoClose.addEventListener('click', fotoCloseModal);
  fotoBtnTrigger.addEventListener('click', fotoOpen);
  // ESC ile kapat
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape' && fotoModal.classList.contains('active')) fotoCloseModal();
  });
})();

// =====================================================================
// KAPAK HESABI AKTARIMI — URL hash veya postMessage (wrapper iframe)
// =====================================================================
// =====================================================================
// TOPLU DXF URETIMI
// =====================================================================
var elTopluExport = document.getElementById('btn-toplu-export');

function topluDxfUret() {
  var hasPanel = panels.length > 0;
  var hasBogaz = bogazList.length > 0;
  if (!hasPanel && !hasBogaz) {
    setStatus('Üretilecek kayıt yok — önce listeye ekleyin.');
    return;
  }

  setStatus('Toplu DXF üretiliyor...');
  var exportedNames = [];

  // 1) Panel — grup varsa (ANA / ALTUST) ayrı DXF, yoksa sadece kalınlığa göre ayır
  if (hasPanel) {
    var hasGrup = panels.some(function(p){ return p.grup; });
    var grupSirasi = hasGrup ? ['ANA', 'ALTUST'] : [null];
    grupSirasi.forEach(function(g) {
      var grupPanels = hasGrup ? panels.filter(function(p){ return (p.grup||'ANA') === g; }) : panels;
      if (!grupPanels.length) return;
      var groups = {};
      grupPanels.forEach(function(p) {
        if (!groups[p.kalinlik]) groups[p.kalinlik] = [];
        groups[p.kalinlik].push(p);
      });
      Object.keys(groups).forEach(function(kalinlik) {
        var customAd = null;
        if (g === 'ALTUST') {
          var base2 = String(kalinlik).replace('P','');
          var el2 = base2 === '60' ? document.getElementById('dosyaAdi60') : document.getElementById('dosyaAdi50');
          var baseAdi = (el2 && el2.value.trim()) || (base2 + 'lik_panel');
          customAd = baseAdi + ' — ALT-ÜST';
        }
        var result = generateAndDownloadDxf(groups[kalinlik], kalinlik, 1, 700, 1000, customAd);
        if (result && result.success) exportedNames.push(result.filename);
      });
    });
    try {
      var el50 = document.getElementById('dosyaAdi50');
      var el60 = document.getElementById('dosyaAdi60');
      historyAdd({ mode: 'panel', name: exportedNames.slice(-1)[0] || '', count: panels.length,
        data: { panels: JSON.parse(JSON.stringify(panels)), dosyaAdi50: el50?el50.value:'', dosyaAdi60: el60?el60.value:'' }
      });
    } catch(e) {}
    panels.length = 0;
    panelEditIndex = null;
    if (elBtnAdd) elBtnAdd.textContent = '+ Listeye Ekle';
    renderTable();
  }

  // 2) Boğaz
  if (hasBogaz) {
    var bRes = generateAndDownloadBogazDxf(bogazList);
    if (bRes && bRes.success) {
      exportedNames.push(bRes.filename);
      try { historyAdd({ mode: 'bogaz', name: bRes.filename, count: bogazList.length,
        data: { bogazList: JSON.parse(JSON.stringify(bogazList)), dosyaAdi: elBDosyaAdi?elBDosyaAdi.value:'' }
      }); } catch(e) {}
      bogazList.length = 0;
      bogazEditIndex = null;
      if (elBBtnAdd) elBBtnAdd.textContent = '+ Listeye Ekle';
      renderBogazTable();
    }
  }

  if (exportedNames.length > 0) {
    setStatus('✓ Toplu DXF tamamlandı: ' + exportedNames.join(' | '));
  } else {
    setStatus('Hata: Hiçbir DXF üretilemedi.');
  }
}

if (elTopluExport) {
  elTopluExport.addEventListener('click', topluDxfUret);
}


function applyKapakData(data) {
  try {

    var imported = data.panels || [];
    var importedBogaz = data.bogazList || [];
    var seri = data.seri || '60';
    var proje = data.proje || '';

    if (!imported.length && !importedBogaz.length) return;

    // Panel listesi
    if (imported.length) {
      imported.forEach(function(p) { panels.push(p); });
      if (elKalinlik) elKalinlik.value = seri;
      if (proje) {
        var el60 = document.getElementById('dosyaAdi60');
        var el50 = document.getElementById('dosyaAdi50');
        if (seri === '60' || seri === '60P') { if (el60) el60.value = proje; }
        else { if (el50) el50.value = proje; }
      }
      renderTable();
    }

    // Boğaz listesi
    if (importedBogaz.length) {
      importedBogaz.forEach(function(b) { bogazList.push(b); });
      if (elBDosyaAdi && proje && !elBDosyaAdi.value) elBDosyaAdi.value = proje;
      renderBogazTable();
    }


    // Durum mesajı
    var parts = [];
    if (imported.length)      parts.push(imported.length + ' panel');
    if (importedBogaz.length) parts.push(importedBogaz.length + ' boğaz seti');

    if (data.autoGenerate) {
      setStatus('✓ ' + parts.join(' + ') + ' aktarıldı' + (proje ? ' — ' + proje : '') + '. Otomatik DXF üretiliyor…');
      topluDxfUret();
    } else {
      setStatus('✓ ' + parts.join(' + ') + ' kapak hesabından aktarıldı'
        + (proje ? ' — ' + proje : '')
        + '. Kontrol edip &quot;Toplu DXF Üret&quot; butonuna basın.');
    }

  } catch (e) {
    console.warn('Kapak aktarım hatası:', e);
  }
}

// URL hash üzerinden (standalone açılış)
(function() {
  var hash = window.location.hash || '';
  if (!hash.startsWith('#kapak=')) return;
  try {
    var data = JSON.parse(decodeURIComponent(hash.slice(7)));
    applyKapakData(data);
  } catch (e) {
    console.warn('Hash aktarım hatası:', e);
  }
})();

// postMessage üzerinden (AHU Studio wrapper içinden)
window.addEventListener('message', function(e) {
  if (!e.data || e.data.type !== 'dxfInject') return;
  try { applyKapakData(e.data.payload); } catch(ex) { console.warn('dxfInject hatası:', ex); }
});

// Wrapper'a hazır olduğumuzu bildir (delay: parent listener'ın kurulmasını bekle)
setTimeout(function() {
  if (window.parent !== window) {
    window.parent.postMessage({ type: 'dxfReady' }, '*');
  }
}, 300);
</script>
