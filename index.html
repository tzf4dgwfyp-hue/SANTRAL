<!DOCTYPE html>
<html lang="tr">
<head>

<title>AHU Studio</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0d1b2a;display:flex;flex-direction:column;height:100vh;font-family:sans-serif;}
#toolbar{background:#111f2e;border-bottom:1px solid #1e3a52;padding:6px 12px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
#toolbar span{color:#7aa8c8;font-size:13px;font-weight:600;letter-spacing:.5px;}
.tab-btn{background:#1a2e42;color:#7aa8c8;border:1px solid #1e3a52;border-radius:5px;padding:4px 14px;font-size:12px;cursor:pointer;}
.tab-btn.active{background:#4fb8a8;color:#0d1b2a;border-color:#4fb8a8;font-weight:700;}
#frames{flex:1;position:relative;overflow:hidden;}
iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none;display:none;}
iframe.active{display:block;}
</style>
</head>
<body>

  <span>AHU Studio</span>
  <button class="tab-btn active" onclick="show(0)">Kapak Hesabı</button>
  <button class="tab-btn" onclick="show(1)">DXF Üretme</button>
</div>
<div id="frames">
  <iframe id="f0" class="active" srcdoc="<!DOCTYPE html>
<html lang=&quot;tr&quot;>
<head>
<meta charset=&quot;UTF-8&quot;>
<title>AHU KONFİGÜRATÖR | Cenk Altınay</title>
<link rel=&quot;preconnect&quot; href=&quot;https://fonts.googleapis.com&quot;>
<link rel=&quot;preconnect&quot; href=&quot;https://fonts.gstatic.com&quot; crossorigin>
<link href=&quot;https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap&quot; rel=&quot;stylesheet&quot;>
<script type=&quot;importmap&quot;>
{
  &quot;imports&quot;: {
    &quot;three&quot;: &quot;https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js&quot;,
    &quot;three/addons/&quot;: &quot;https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/&quot;
  }
}
</script>
<style>
  /* ---------- TEMALAR ---------- */
  :root{
    --bg:#0a0d10; --panel:#17191d; --panel2:#1f2226; --border:rgba(255,255,255,.09);
    --text:#f2f3f5; --muted:#95999f; --accent:#3ecab3; --accent-soft:rgba(62,202,179,.15); --accent-ring:rgba(62,202,179,.35); --accent-fg:#06231f;
    --warn:#ffb340; --bad:#ff453a; --bad-soft:rgba(255,69,58,.14); --good:#32d74b;
    --input-bg:#1b1e22; --canvas:#ffffff;
    --header-bg:rgba(23,25,29,.72);
    --shadow-card:0 1px 2px rgba(0,0,0,.5),0 12px 28px -10px rgba(0,0,0,.6);
    --shadow-pop:0 16px 44px -10px rgba(0,0,0,.65);
    --shadow-sm-el:0 1px 3px rgba(0,0,0,.4);
    --r-s:10px; --r-m:16px;
  }
  body[data-theme=&quot;celik&quot;]{
    --bg:#111214; --panel:#1a1c1f; --panel2:#222528; --border:rgba(255,255,255,.08);
    --text:#eceeef; --muted:#98999e; --accent:#5aa9e6; --accent-soft:rgba(90,169,230,.15); --accent-ring:rgba(90,169,230,.35); --accent-fg:#ffffff;
    --warn:#e0a541; --bad:#ff453a; --bad-soft:rgba(255,69,58,.14); --good:#5fc26a;
    --input-bg:#1c1e21; --canvas:#ffffff;
    --header-bg:rgba(26,28,31,.72);
    --shadow-card:0 1px 2px rgba(0,0,0,.5),0 12px 28px -10px rgba(0,0,0,.6);
    --shadow-pop:0 16px 44px -10px rgba(0,0,0,.65);
    --shadow-sm-el:0 1px 3px rgba(0,0,0,.4);
  }
  body[data-theme=&quot;aydinlik&quot;]{
    --bg:#f5f5f7; --panel:#ffffff; --panel2:#f7f8fa; --border:rgba(0,0,0,.08);
    --text:#1d1d1f; --muted:#6e6e73; --accent:#0071e3; --accent-soft:rgba(0,113,227,.08); --accent-ring:rgba(0,113,227,.28); --accent-fg:#ffffff;
    --warn:#c17f0a; --bad:#d70015; --bad-soft:rgba(215,0,21,.09); --good:#248a3d;
    --input-bg:#ffffff; --canvas:#ffffff;
    --header-bg:rgba(255,255,255,.72);
    --shadow-card:0 1px 3px rgba(0,0,0,.04),0 10px 24px -8px rgba(0,0,0,.10);
    --shadow-pop:0 18px 40px -10px rgba(0,0,0,.16);
    --shadow-sm-el:0 1px 2px rgba(0,0,0,.08);
  }
  body[data-theme=&quot;kehribar&quot;]{
    --bg:#141110; --panel:#1c1815; --panel2:#241f1a; --border:rgba(255,255,255,.08);
    --text:#f2ece3; --muted:#a89b89; --accent:#e5a53c; --accent-soft:rgba(229,165,60,.15); --accent-ring:rgba(229,165,60,.35); --accent-fg:#241a06;
    --warn:#e5a53c; --bad:#ff453a; --bad-soft:rgba(255,69,58,.14); --good:#8fbf5a;
    --input-bg:#1a1613; --canvas:#ffffff;
    --header-bg:rgba(28,24,21,.72);
    --shadow-card:0 1px 2px rgba(0,0,0,.5),0 12px 28px -10px rgba(0,0,0,.6);
    --shadow-pop:0 16px 44px -10px rgba(0,0,0,.65);
    --shadow-sm-el:0 1px 3px rgba(0,0,0,.4);
  }
  body[data-theme=&quot;nordik&quot;]{
    --bg:#0b0f16; --panel:#141b25; --panel2:#1b2431; --border:rgba(255,255,255,.08);
    --text:#e8eef7; --muted:#8a9bb5; --accent:#5bc9e0; --accent-soft:rgba(91,201,224,.14); --accent-ring:rgba(91,201,224,.34); --accent-fg:#04222a;
    --warn:#e0b04a; --bad:#ff5e5a; --bad-soft:rgba(255,94,90,.14); --good:#5fbf8f;
    --input-bg:#111826; --canvas:#ffffff;
    --header-bg:rgba(20,27,37,.72);
    --shadow-card:0 1px 2px rgba(0,0,0,.5),0 12px 28px -10px rgba(0,0,0,.6);
    --shadow-pop:0 16px 44px -10px rgba(0,0,0,.65);
    --shadow-sm-el:0 1px 3px rgba(0,0,0,.4);
  }

  /* ---------- TEMEL ---------- */
  *{box-sizing:border-box;}
  ::selection{background:var(--accent-soft);color:var(--text);}
  body{background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',Arial,sans-serif;
    font-size:14px;line-height:1.45;margin:0;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}
  h1{font-size:19px;font-weight:700;letter-spacing:-.2px;margin:0;color:var(--text);}
  .appsub{color:var(--muted);font-size:11px;display:block;margin-top:2px;}
  .appdev{color:var(--muted);font-size:10.5px;font-weight:600;letter-spacing:.2px;display:block;margin-top:4px;opacity:.8;}

  /* İnce kaydırma çubuğu */
  ::-webkit-scrollbar{width:10px;height:10px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:rgba(128,132,138,.35);border-radius:999px;border:2px solid transparent;background-clip:padding-box;}
  ::-webkit-scrollbar-thumb:hover{background:rgba(128,132,138,.5);background-clip:padding-box;}

  /* ---------- UYGULAMA ÇUBUĞU ---------- */
  .appbar{position:sticky;top:0;z-index:50;display:flex;justify-content:space-between;align-items:center;gap:14px;
    background:var(--header-bg);backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);
    border-bottom:1px solid var(--border);padding:14px 24px;}
  .appbar-right{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
  .appbar-right label{margin:0 4px 0 0;display:inline;color:var(--muted);font-size:13px;}

  /* ---------- YERLEŞİM ---------- */
  .app{display:grid;grid-template-columns:320px 1fr;gap:20px;padding:20px 24px;align-items:start;}
  .side{position:sticky;top:84px;display:flex;flex-direction:column;gap:14px;max-height:calc(100vh - 104px);overflow-y:auto;}
  .main{min-width:0;}
  @media(max-width:1150px){ .app{grid-template-columns:1fr;} .side{position:static;max-height:none;} }

  /* ---------- GÖRÜNÜM SEKMELERİ (segmented control) ---------- */
  .viewbar{position:relative;display:inline-flex;gap:2px;padding:4px;margin-bottom:20px;
    background:var(--panel2);border:1px solid var(--border);border-radius:999px;}
  .viewbar-thumb{position:absolute;top:4px;left:0;height:calc(100% - 8px);background:var(--panel);
    border-radius:999px;box-shadow:var(--shadow-sm-el);
    transition:transform .28s cubic-bezier(.4,0,.2,1),width .28s cubic-bezier(.4,0,.2,1);z-index:0;}
  .vbtn{position:relative;z-index:1;background:transparent;border:none;color:var(--muted);
    padding:9px 20px;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;letter-spacing:0;border-radius:999px;transition:color .2s ease;}
  .vbtn:hover{color:var(--text);}
  .vbtn.active{color:var(--text);}
  .view{display:none;}
  .view.active{display:block;}

  /* ---------- KARTLAR ---------- */
  .section{background:var(--panel);border:1px solid var(--border);border-radius:var(--r-m);padding:20px;margin-bottom:16px;box-shadow:var(--shadow-card);}
  .section h2{display:flex;align-items:center;gap:9px;font-size:13.5px;font-weight:600;letter-spacing:0;text-transform:none;color:var(--text);margin:0 0 14px;border-bottom:1px solid var(--border);padding-bottom:12px;}
  .section h2::before{content:'';width:6px;height:6px;flex:0 0 auto;border-radius:50%;background:var(--accent);}
  .side .section{margin-bottom:0;padding:16px;}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;}
  .grid > div{display:flex;flex-direction:column;justify-content:flex-end;}
  .side .grid{grid-template-columns:repeat(auto-fit,minmax(84px,1fr));gap:10px;}

  /* ---------- FORM ---------- */
  label{display:block;font-size:12.5px;color:var(--muted);margin-bottom:6px;font-weight:510;text-transform:none;letter-spacing:0;}
  label .lbl-1, label .lbl-2{display:block;white-space:nowrap;}
  label .lbl-2{margin-top:1px;}
  input, select{width:100%;background:var(--input-bg);border:1px solid var(--border);color:var(--text);
    padding:10px 12px;border-radius:var(--r-s);font-size:14px;font-family:inherit;font-variant-numeric:tabular-nums;
    transition:border-color .15s ease,box-shadow .15s ease;}
  input::placeholder{color:var(--muted);opacity:.65;}
  select{cursor:pointer;}
  input.readonly{color:var(--muted);background:var(--panel2);}
  input:focus, select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 4px var(--accent-ring);}

  /* ---------- BUTONLAR ---------- */
  .add-btn2{background:var(--accent);color:var(--accent-fg);border:none;padding:11px 22px;border-radius:999px;
    font-weight:600;font-size:13.5px;font-family:inherit;cursor:pointer;letter-spacing:0;white-space:nowrap;
    box-shadow:var(--shadow-sm-el);transition:transform .12s ease,filter .15s ease;}
  .add-btn2:hover{filter:brightness(1.08);}
  .add-btn2:active{transform:scale(.97);}
  .add-btn2.ghost{background:var(--accent-soft);color:var(--accent);box-shadow:none;}
  .add-btn2.ghost:hover{filter:brightness(1.05);}
  .del-btn{background:var(--bad-soft);color:var(--bad);border:none;padding:9px 16px;border-radius:999px;
    font-weight:600;font-size:12.5px;font-family:inherit;cursor:pointer;transition:filter .15s ease,transform .12s ease;}
  .del-btn:hover{filter:brightness(1.1);}
  .del-btn:active{transform:scale(.97);}
  .del-btn:disabled{background:var(--panel2);color:var(--muted);cursor:not-allowed;}

  /* ---------- SEKMELER (yüz + modül) ---------- */
  .tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;}
  .tab{padding:9px 16px;background:transparent;border:1px solid var(--border);border-radius:999px;cursor:pointer;
    font-size:13px;font-weight:600;color:var(--muted);transition:all .15s ease;}
  .tab:hover{color:var(--text);border-color:var(--muted);}
  .tab.active{background:var(--accent-soft);color:var(--accent);border-color:transparent;}

  /* ---------- TABLO ---------- */
  table{width:100%;border-collapse:collapse;font-size:13px;font-variant-numeric:tabular-nums;}
  th{background:var(--panel2);color:var(--muted);font-weight:600;padding:8px 10px;text-align:center;border:1px solid var(--border);font-size:11px;text-transform:uppercase;letter-spacing:.4px;}
  td{padding:7px 10px;border:1px solid var(--border);text-align:center;}
  tbody tr:hover td{background:var(--panel2);}
  .profil-table td:first-child, .profil-table th:first-child, .cut-table td:first-child{text-align:left;}

  /* ---------- DURUM & NOT ---------- */
  .status{font-size:13.5px;font-weight:600;padding:11px 16px;border-radius:12px;margin-top:14px;line-height:1.5;}
  .status.good{background:rgba(50,215,75,.12);color:var(--good);}
  .status.warn{background:rgba(255,179,64,.14);color:var(--warn);}
  .status.bad{background:var(--bad-soft);color:var(--bad);}
  .status.info{background:var(--accent-soft);color:var(--muted);}
  .note{font-size:12px;color:var(--muted);margin-top:6px;line-height:1.55;}
  .flex-between{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;}
  .badge{display:inline-block;background:var(--panel2);border:1px solid var(--border);border-radius:999px;padding:4px 10px;font-size:11px;color:var(--muted);font-weight:500;}
  .checkbox-row{display:flex;align-items:center;gap:8px;}
  .checkbox-row input[type=checkbox]{width:auto;accent-color:var(--accent);transform:scale(1.1);}
  .checkbox-row label{margin:0;text-transform:none;font-size:13px;color:var(--text);}
  .dim-readout{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:8px;}
  .dim-readout div{background:var(--panel2);border:1px solid var(--border);border-radius:12px;padding:9px 15px;}
  .dim-readout .val{font-size:16px;font-weight:700;color:var(--accent);font-variant-numeric:tabular-nums;}
  .dim-readout .lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;}
  .orient-select{max-width:230px;}

  /* ---------- ÇİZİM ALANLARI (tema bağımsız açık görünüm penceresi) ---------- */
  .canvas-wrap{background:#ffffff;border:1px solid var(--border);border-radius:var(--r-m);padding:16px;overflow-x:auto;box-shadow:var(--shadow-card);}
  #canvas3d{position:relative;width:100%;aspect-ratio:900/560;overflow:hidden;border-radius:8px;}
  #canvas3d canvas{display:block;width:100%;height:100%;}
  #canvas3d .label3d{position:absolute;pointer-events:none;font-family:inherit;white-space:nowrap;text-align:center;transform:translate(-50%,-50%);}
  #canvas3d .label3d .l1{font-size:13px;font-weight:700;color:#000000;text-shadow:0 1px 2px rgba(255,255,255,.85),0 0 3px rgba(255,255,255,.7);}
  #canvas3d .label3d .l3{font-size:11px;font-weight:600;color:#000000;text-shadow:0 1px 2px rgba(255,255,255,.85),0 0 3px rgba(255,255,255,.7);}
  #canvas3d .label3d .l2{font-size:12px;font-weight:700;color:#000000;text-shadow:0 1px 2px rgba(255,255,255,.85),0 0 3px rgba(255,255,255,.7);}
  #canvas3d .label3d .l1.bos,#canvas3d .label3d .l3.bos,#canvas3d .label3d .l2.bos{color:#ffffff;text-shadow:0 1px 2px rgba(0,0,0,.6);}
  #canvas3d .label3d.modname{font-size:13px;font-weight:700;color:#4fb8a8;text-shadow:0 1px 2px rgba(0,0,0,.5);}
  .app-footer{text-align:center;color:var(--muted);font-size:11px;font-weight:600;letter-spacing:.4px;padding:20px 20px 26px;opacity:.6;}
  svg{display:block;margin:0 auto;}
  .svg-panel{cursor:pointer;}
  .svg-panel:hover .panel-rect{stroke:#4fb8a8;stroke-width:2.5;}
  .panel-rect.selected{stroke:#4fb8a8;stroke-width:3;}
  .svg-addbtn, .svg-gap, .svg-innergap, .svg-addpanel, .svg-addrow, .svg-addcol{cursor:pointer;}
  .svg-addbtn:hover rect{fill:#2a4a44;}
  .svg-addpanel:hover rect, .svg-addrow:hover rect, .svg-addcol:hover rect{fill:#2a4a44;}
  .svg-gap:hover .gap-hint, .svg-innergap:hover .gap-hint{stroke:#4fb8a8;stroke-width:2;}
  .face-hit3{cursor:copy;}
  .face-hit3:hover{fill:rgba(79,184,168,0.12);stroke:#4fb8a8;stroke-width:2;}

  /* ---------- DÜZENLEYİCİ & LEJANT ---------- */
  .face-main-row{display:flex;gap:16px;align-items:flex-start;}
  .face-main-left{flex:1;min-width:0;}
  .face-side-editor{width:310px;flex-shrink:0;position:sticky;top:16px;}
  .editor{background:var(--panel2);border:1px solid var(--border);border-radius:var(--r-m);padding:18px 18px 18px 22px;display:block;box-shadow:var(--shadow-pop);position:relative;}
  .editor::before{content:'';position:absolute;left:0;top:14px;bottom:14px;width:3px;border-radius:3px;background:var(--accent);}
  .editor .grid{grid-template-columns:repeat(auto-fit,minmax(140px,1fr));}
  .editor-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:12px;}
  .editor-placeholder{color:var(--muted);font-size:12px;text-align:center;padding:24px 0;}
  .legend{display:flex;gap:16px;flex-wrap:wrap;margin-top:12px;font-size:11.5px;color:var(--muted);}
  .legend span{display:inline-flex;align-items:center;gap:6px;}
  .legend i{display:inline-block;width:13px;height:13px;border-radius:4px;border:1px solid var(--border);}

  /* ---------- ERİŞİLEBİLİRLİK ---------- */
  button:focus-visible, .tab:focus-visible, .vbtn:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:999px;}
  @media (prefers-reduced-motion: reduce){
    *{transition:none!important;animation:none!important;}
  }
</style>
</head>
<body>

<header class=&quot;appbar&quot;>
  <div>
    <h1>AHU Panel Konfigüratörü</h1>
    <span class=&quot;appdev&quot;>Cenk Altınay</span>
  </div>
  <div class=&quot;appbar-right&quot;>
    <div style=&quot;display:flex;align-items:center;gap:6px;&quot;>
      <label for=&quot;theme_sel&quot; style=&quot;margin:0;&quot;>Tema</label>
      <select id=&quot;theme_sel&quot; style=&quot;width:130px;&quot;>
        <option value=&quot;gece&quot; selected>Gece</option>
        <option value=&quot;celik&quot;>Çelik</option>
        <option value=&quot;aydinlik&quot;>Aydınlık</option>
        <option value=&quot;kehribar&quot;>Kehribar</option>
        <option value=&quot;nordik&quot;>Nordik</option>
      </select>
    </div>
    <button class=&quot;add-btn2&quot; id=&quot;btn_save_proj&quot; style=&quot;background:linear-gradient(135deg,#2a6496,#3a85c4);color:#fff;&quot; title=&quot;Projeyi .ahu.json dosyasına indir&quot;>💾 Projeyi Kaydet</button>
    <label class=&quot;add-btn2&quot; id=&quot;btn_load_proj_lbl&quot; style=&quot;background:linear-gradient(135deg,#3a5a3a,#4a7a4a);color:#fff;cursor:pointer;margin:0;&quot; title=&quot;Kaydedilmiş .ahu.json dosyasını yükle&quot;>
      📂 Proje Aç
      <input type=&quot;file&quot; id=&quot;btn_load_proj&quot; accept=&quot;.json&quot; style=&quot;display:none;&quot;>
    </label>
    <button class=&quot;add-btn2&quot; id=&quot;btn_excel&quot;>⬇ Excel Çıktısı</button>
    <button class=&quot;add-btn2&quot; id=&quot;btn_dxf&quot; style=&quot;background:linear-gradient(135deg,#1a9e6a,#27c47e);color:#fff;&quot;>⬇ DXF Üret</button>
  </div>
</header>

<div class=&quot;app&quot;>

<aside class=&quot;side&quot;>

  <div class=&quot;section&quot;>
    <h2>Proje Bilgisi</h2>
    <div class=&quot;grid&quot; style=&quot;grid-template-columns:1fr 1fr;&quot;>
      <div><label>İş Numarası</label><input type=&quot;text&quot; id=&quot;prj_isno&quot; placeholder=&quot;örn. 2026-041&quot;></div>
      <div><label>Santral Adı</label><input type=&quot;text&quot; id=&quot;prj_ad&quot; placeholder=&quot;örn. AHU-3 Mutfak&quot;></div>
    </div>
    <div class=&quot;grid&quot; style=&quot;grid-template-columns:1fr 1fr;margin-top:8px;&quot;>
      <div>
        <label>İç Sac <span style=&quot;color:var(--bad);font-size:12px;&quot;>* zorunlu</span></label>
        <select id=&quot;prj_icsac&quot; style=&quot;width:100%;&quot;>
          <option value=&quot;&quot;>— Seçiniz —</option>
          <option value=&quot;galvaniz&quot;>Galvaniz</option>
          <option value=&quot;paslanmaz&quot;>Paslanmaz</option>
        </select>
      </div>
      <div>
        <label>Profil Serisi <span style=&quot;color:var(--bad);font-size:12px;&quot;>* zorunlu</span></label>
        <select id=&quot;seri&quot; style=&quot;width:100%;&quot;></select>
      </div>
    </div>
    <div class=&quot;note&quot;>Excel dosya adında ve özet sayfasında kullanılır.</div>
  </div>

  <div class=&quot;section&quot; id=&quot;ahu-bar&quot; style=&quot;padding-bottom:8px;&quot;>
    <h2 style=&quot;margin-bottom:6px;&quot;>AHU Listesi</h2>
    <div class=&quot;tabs&quot; id=&quot;ahutabs&quot; style=&quot;margin-bottom:8px;flex-wrap:wrap;gap:4px;&quot;></div>

<script src=&quot;https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js&quot;></script>
<script>
const FACE_DEFS = [
  {name:&quot;ÖN YÜZ&quot;,  wKey:&quot;L&quot;, hKey:&quot;H&quot;},
  {name:&quot;ARKA YÜZ&quot;,wKey:&quot;L&quot;, hKey:&quot;H&quot;},
  {name:&quot;ÜST YÜZ&quot;, wKey:&quot;L&quot;, hKey:&quot;W&quot;},
  {name:&quot;ALT YÜZ&quot;, wKey:&quot;L&quot;, hKey:&quot;W&quot;},
  {name:&quot;SOL YÜZ&quot;, wKey:&quot;W&quot;, hKey:&quot;H&quot;},
  {name:&quot;SAĞ YÜZ&quot;, wKey:&quot;W&quot;, hKey:&quot;H&quot;}
];
const SABIT_TYPES = [&quot;Üst Panel&quot;,&quot;Normal Panel&quot;,&quot;Boğaz Uzun&quot;,&quot;Boğaz 2 Uzun&quot;];
const ACILIR_TYPES = [&quot;Camlı Açılır&quot;,&quot;Camsız Açılır&quot;];
const ELEMAN_TYPES = [&quot;Damper&quot;,&quot;Boğaz&quot;,&quot;Tava&quot;];               // panel değil: 0 tolerans, girilen ölçü = kesim ölçüsü
const BOS_TYPES = [&quot;Boş Alan&quot;];                             // bilinçli boşluk: yer kaplar, kesim listesine girmez
const BOGAZ_TYPES = [&quot;Boğaz Uzun&quot;,&quot;Boğaz 2 Uzun&quot;,&quot;Boğaz&quot;];
const isAcilir = t => ACILIR_TYPES.includes(t);
const isBogaz = t => BOGAZ_TYPES.includes(t);
const isEleman = t => ELEMAN_TYPES.includes(t);
const isBos = t => BOS_TYPES.includes(t);

const TYPE_COLORS = {
  &quot;Üst Panel&quot;:&quot;#a8bdd1&quot;, &quot;Normal Panel&quot;:&quot;#afc2d4&quot;,
  &quot;Boğaz Uzun&quot;:&quot;#e2cea2&quot;, &quot;Boğaz 2 Uzun&quot;:&quot;#e5c4a9&quot;,
  &quot;Camlı Açılır&quot;:&quot;#99cde0&quot;, &quot;Camsız Açılır&quot;:&quot;#a4cce0&quot;,
  &quot;Damper&quot;:&quot;#b7bcc2&quot;, &quot;Boğaz&quot;:&quot;#e2bfa1&quot;, &quot;Tava&quot;:&quot;#939ea9&quot;,
  &quot;Boş Alan&quot;:&quot;#7499be&quot;
};

/*
 IZGARA VERİ MODELİ
 face = {
   kapaksiz, orient ('H': bölümler soldan sağa | 'V': bölümler yukarıdan aşağıya),
   columns: [ { size, panels:[{size,type}], innerGaps:[bool] } ],
   colGaps: [bool],           // bölümler arası ANA takviye (orient H → dikey)
   selected: {col, idx} | null
 }
 column.size  = bölümün ana yöndeki ölçüsü (H orient → kapak genişliği w)
 panel.size   = kapağın dik yöndeki ölçüsü  (H orient → kapak yüksekliği h)
                Bölümde TEK kapak varsa ve size=0 → otomatik tam yükseklik.
 innerGaps[i] = bölüm içindeki i. ile i+1. kapak arasında ARA takviye (orient H → yatay)
*/
function newColumn(){ return { size:0, panels:[{size:0, type:&quot;Normal Panel&quot;}], innerGaps:[] }; }
function newFaceSet(){
  return FACE_DEFS.map(()=>({
    kapaksiz: false,
    orient: 'H',
    cont: 'ana',
    selected: null,
    columns: [ newColumn() ],
    colGaps: []
  }));
}
function newModule(){ return { L:0, H:0, W:0, pos:{x:0,y:0,z:0}, faces: newFaceSet() }; }
function newAhu(n){ return { ad:'AHU-'+(n||1), malzeme:'', active:0, modules:[newModule()], varsayimlar:{seri:'', tolW:3, tolH:3} }; }

const GLASS_R_MM = 75; // gözetleme camı: sabit Ø150 mm (katalog değeri)

const state = {
  dims: {},
  proje: { isNo:'', ad:'' },
  activeAhu: 0,
  ahus: [ newAhu(1) ]
};
// modules / active / varsayimlar → aktif AHU'ya yönlenir
Object.defineProperty(state, 'modules', { get(){ return state.ahus[state.activeAhu].modules; }, set(v){ state.ahus[state.activeAhu].modules = v; }, enumerable:true });
Object.defineProperty(state, 'active',  { get(){ return state.ahus[state.activeAhu].active;  }, set(v){ state.ahus[state.activeAhu].active  = v; }, enumerable:true });
Object.defineProperty(state, 'varsayimlar', { get(){ return state.ahus[state.activeAhu].varsayimlar; }, set(v){ state.ahus[state.activeAhu].varsayimlar = v; }, enumerable:true });
// Geriye uyumluluk: mevcut tüm yüz kodu aktif modül üzerinden çalışır
Object.defineProperty(state, 'faces', { get(){ return state.modules[state.active].faces; } });
// Ölçü setter'ları: değer değişince o eksende ilerideki TÜM modüller delta kadar kayar —
// bitişik montaj korunur: boşluk açılmaz, iç içe girme oluşmaz
['W','H','L'].forEach(k=>{
  const axis = {L:'x', H:'y', W:'z'}[k];
  Object.defineProperty(state.dims, k, {
    get(){ return state.modules[state.active][k]; },
    set(v){
      const md = state.modules[state.active];
      const oldExt = modExt(md, axis);
      md[k] = v;
      const delta = modExt(md, axis) - oldExt;
      if(delta !== 0){
        const plane = md.pos[axis] + oldExt;
        state.modules.forEach(B=>{
          if(B===md) return;
          if(B.pos[axis] >= plane - 0.5) B.pos[axis] += delta;
        });
      }
    }
  });
});
function withModule(m, fn){
  const prev = state.active; state.active = m;
  try{ return fn(); } finally{ state.active = prev; }
}
function addAhu(){
  const n = state.ahus.length + 1;
  state.ahus.push(newAhu(n));
  state.activeAhu = state.ahus.length - 1;
  renderAll();
}
function deleteAhu(i){
  if(state.ahus.length <= 1){ alert('En az 1 AHU olmalı.'); return; }
  if(!confirm('Bu AHU silinsin mi? İçindeki tüm modüller kaybolur.')) return;
  state.ahus.splice(i, 1);
  if(state.activeAhu >= state.ahus.length) state.activeAhu = state.ahus.length - 1;
  renderAll();
}
function renameAhu(i, newAd){
  if(newAd !== null && newAd.trim()) state.ahus[i].ad = newAd.trim();
  renderAhuTabs();
}

// Yüz → eksen/yön eşlemesi (modül ekleme ve birleşim tespiti için)
const FACE_ATT = [
  {axis:'z', dir:+1},  // ÖN
  {axis:'z', dir:-1},  // ARKA
  {axis:'y', dir:+1},  // ÜST
  {axis:'y', dir:-1},  // ALT
  {axis:'x', dir:-1},  // SOL
  {axis:'x', dir:+1}   // SAĞ
];
const EXT_KEY = {x:'L', y:'H', z:'W'};
function modExt(md, axis){ const v = md[EXT_KEY[axis]]; return v>0 ? v : PH3[EXT_KEY[axis]]; }

// Bir yüze tıklanınca o yönde yeni modül: ölçüler komşudan kopyalanır (sonradan düzenlenebilir), konum bitişik
function addModuleAt(m, fi){
  const nb = state.modules[m];
  const att = FACE_ATT[fi];
  const nm = newModule();
  nm.L = nb.L; nm.H = nb.H; nm.W = nb.W;
  nm.pos = {x:nb.pos.x, y:nb.pos.y, z:nb.pos.z};
  nm.pos[att.axis] += att.dir>0 ? modExt(nb, att.axis) : -modExt(nm, att.axis);
  nm.attAxis = att.axis; nm.attDir = att.dir;

  // Mevcut modüllerle çakışma varsa o yönde ilerlet (mıknatıs gibi bitişik ekle)
  const ax = att.axis;
  const eps = 0.5;
  let changed = true;
  while(changed){
    changed = false;
    state.modules.forEach(B=>{
      const bE = {x:modExt(B,'x'), y:modExt(B,'y'), z:modExt(B,'z')};
      const nE = {x:modExt(nm,'x'), y:modExt(nm,'y'), z:modExt(nm,'z')};
      const overlaps = ['x','y','z'].every(a=>
        nm.pos[a] < B.pos[a]+bE[a]-eps && B.pos[a] < nm.pos[a]+nE[a]-eps);
      if(overlaps){
        nm.pos[ax] = att.dir>0 ? B.pos[ax]+bE[ax] : B.pos[ax]-nE[ax];
        changed = true;
      }
    });
  }

  state.modules.push(nm);
  state.active = state.modules.length-1;
  renderAll();
}

// AABB çakışma denetimi: iki modül üç eksende de iç içe geçiyorsa (temas hariç) çakışmadır
function detectCollisions(){
  const out = [];
  const eps = 0.5;
  for(let i=0; i<state.modules.length; i++){
    for(let j=i+1; j<state.modules.length; j++){
      const A = state.modules[i], B = state.modules[j];
      const aE = {x:modExt(A,'x'), y:modExt(A,'y'), z:modExt(A,'z')};
      const bE = {x:modExt(B,'x'), y:modExt(B,'y'), z:modExt(B,'z')};
      const hit = ['x','y','z'].every(a=>
        A.pos[a] < B.pos[a]+bE[a]-eps && B.pos[a] < A.pos[a]+aE[a]-eps);
      if(hit) out.push([i,j]);
    }
  }
  return out;
}

// Yüz, başka bir modülün eş-düzlemli karşı yüzü tarafından TAM örtülüyorsa iç birleşimdir → çizilmez
function faceMated(m, fi){
  const A = state.modules[m];
  const att = FACE_ATT[fi];
  const aExt = {x:modExt(A,'x'), y:modExt(A,'y'), z:modExt(A,'z')};
  const plane = A.pos[att.axis] + (att.dir>0 ? aExt[att.axis] : 0);
  const tang = ['x','y','z'].filter(a=>a!==att.axis);
  const eps = 0.5;
  return state.modules.some((B,bi)=>{
    if(bi===m) return false;
    const bExt = {x:modExt(B,'x'), y:modExt(B,'y'), z:modExt(B,'z')};
    const bPlane = B.pos[att.axis] + (att.dir>0 ? 0 : bExt[att.axis]);
    if(Math.abs(bPlane-plane)>eps) return false;
    return tang.every(a=> B.pos[a] <= A.pos[a]+eps && B.pos[a]+bExt[a] >= A.pos[a]+aExt[a]-eps);
  });
}

// Yüz kısa kodları — kapak adlandırmasında yüz ayrımı için (örn. ÖN-B1K1)
const FACE_CODE = ['ÖN','AR','ÜS','AL','SO','SA'];

// Profil deposu: 50 ve 60 gömülü; özel profiller eklenebilir ve tarayıcıda kalıcıdır.
// takviyePlastik = 0 → takviye plastiği kullanılmaz (boy düşümü ve görsel başlıklar kalkar).
const PROFILES = {
  '50': { kenar:50, takviye:40, kose:70.5, takviyePlastik:22, acilirEk:1, builtin:true },
  '60': { kenar:60, takviye:60, kose:80, takviyePlastik:20, acilirEk:1, builtin:true }
};
try{
  const cp = JSON.parse(localStorage.getItem('kh_profiles')||'{}');
  Object.entries(cp).forEach(([k,v])=>{
    if(PROFILES[k]) Object.assign(PROFILES[k], v);   // gömülü profil: sayısal değerler üzerine yazılır, builtin bayrağı korunur
    else PROFILES[k] = {...v, builtin:false};         // özel profil: tamamen geri yüklenir
  });
}catch(_){}
function saveCustomProfiles(){
  try{
    const cp = {};
    Object.entries(PROFILES).forEach(([k,v])=>{ cp[k] = {kenar:v.kenar, takviye:v.takviye, kose:v.kose, takviyePlastik:v.takviyePlastik, acilirEk: v.acilirEk!=null?v.acilirEk:1}; });
    localStorage.setItem('kh_profiles', JSON.stringify(cp));
  }catch(_){}
}

function getV(){
  const seri = String(state.varsayimlar.seri);
  const p = PROFILES[seri] || PROFILES['60'];
  return {
    seri,
    kenar: p.kenar,
    takviye: p.takviye,
    kose: p.kose,
    takviyePlastik: p.takviyePlastik,
    acilirEk: p.acilirEk!=null ? p.acilirEk : 1,
    tolW: state.varsayimlar.tolW,
    tolH: state.varsayimlar.tolH
  };
}

function colHasBogaz(col){ return col.panels.some(p=>isBogaz(p.type)); }

function syncStructure(face){
  const needCG = Math.max(face.columns.length-1, 0);
  while(face.colGaps.length < needCG) face.colGaps.push(true);   // otomatik: yeni ara = takviyeli (boğaz bitişiği dahil)
  face.colGaps.length = needCG;
  face.columns.forEach(col=>{
    const needIG = Math.max(col.panels.length-1, 0);
    while(col.innerGaps.length < needIG) col.innerGaps.push(true); // otomatik: yeni ara = takviyeli
    col.innerGaps.length = needIG;
  });
}

function computeFace(fi){
  const def = FACE_DEFS[fi];
  const face = state.faces[fi];
  syncStructure(face);
  const V = getV();
  const faceW = Number(state.dims[def.wKey])||0;
  const faceH = Number(state.dims[def.hKey])||0;
  const orient = face.orient;

  const alongDim  = orient==='H' ? faceW : faceH;   // bölüm dizilim ekseni
  const acrossDim = orient==='H' ? faceH : faceW;   // bölüm içi dizilim ekseni
  const tolAlong  = orient==='H' ? V.tolW : V.tolH; // bölüm ölçüsü = genişlik (H) → tolW
  const tolAcross = orient==='H' ? V.tolH : V.tolW;
  const icAcross = acrossDim - 2*V.kenar;

  const profilBase = {
    ustAlt: { boy: faceW - 2*V.kose },
    dikey:  { boy: faceH - 2*V.kose }
  };

  if(face.kapaksiz){
    return {def, faceW, faceH, orient, V, icAcross, kapaksiz:true,
      status:{cls:&quot;info&quot;, text:&quot;Bu yüz kapaksız — dolu panel&quot;}, profil:profilBase,
      colResults:[], anaTakAdedi:0, icKullAlong:null, kalanAlong:null, toplamKapak:0, araTakToplam:0};
  }

  const anaTakAdedi = face.colGaps.filter(Boolean).length;
  const icKullAlong = alongDim - 2*V.kenar - anaTakAdedi*V.takviye;

  let toplamAlong = 0, toplamKapak = 0, araTakToplam = 0;
  const colResults = face.columns.map((col, ci)=>{
    // col.size = bölüm varsayılan genişliği (yeni kapaklar için); panel.colSize = bireysel kapak genişliği
    const colSizeDefault = Number(col.size)||0;

    const innerTakAdedi = col.innerGaps.filter(Boolean).length;
    araTakToplam += innerTakAdedi;
    const icColAcross = icAcross - innerTakAdedi*V.takviye; // bölüm içi kullanılabilir dik ölçü

    const single = col.panels.length===1;
    let toplamAcross = 0;
    const enteredList = col.panels.map(pp=>Number(pp.size)||0);
    const lastIdx = col.panels.length-1;
    let maxPanelColSize = 0;
    const panels = col.panels.map((p,pi)=>{
      const pColSize = Number(p.colSize)||0 || colSizeDefault; // bireysel kapak along-ekseni ölçüsü
      if(pColSize > maxPanelColSize) maxPanelColSize = pColSize;

      const eleman = isEleman(p.type);      // Damper/Boğaz: 0 tolerans
      const bos = isBos(p.type);            // Boş Alan: yer kaplar, kesime girmez
      if(!eleman && !bos) toplamKapak++;
      const entered = enteredList[pi];
      // Otomatik doldurma: tek hücre boş bırakılırsa VEYA son hücre &quot;Boş Alan&quot; ve ölçüsüzse kalan alanı alır
      const trailingBosAuto = bos && entered<=0 && pi===lastIdx && !single
        && enteredList.slice(0,lastIdx).every(v=>v>0);
      const auto = (single && entered<=0) || trailingBosAuto;
      const eff = auto
        ? (single ? Math.max(icColAcross,0)
                  : Math.max(icColAcross - enteredList.slice(0,lastIdx).reduce((a,b)=>a+b,0), 0))
        : entered;
      if(!auto && entered>0) toplamAcross += entered;
      const acilir = isAcilir(p.type);

      // Gerçek w/h eşleşmesi (pColSize: bireysel along)
      const panelW = orient==='H' ? pColSize : eff;
      const panelH = orient==='H' ? eff : pColSize;

      const sabitAlongV  = (pColSize>0 && !bos) ? (eleman ? pColSize : pColSize - (acilir?tolAlong+V.acilirEk:tolAlong)) : null;
      const sabitAcrossV = (eff>0 && !bos) ? (eleman ? eff : eff - (acilir?tolAcross+V.acilirEk:tolAcross)) : null;
      const sabitW = orient==='H' ? sabitAlongV : sabitAcrossV;
      const sabitH = orient==='H' ? sabitAcrossV : sabitAlongV;

      return {entered, auto, eff, pColSize, panelW, panelH, sabitW, sabitH, type:p.type, acilir, eleman, bos};
    });

    // Bölümün along katkısı = en büyük panel colSize (bölüm cursor'ı bu ölçüde ilerler)
    const colSize = maxPanelColSize || colSizeDefault;
    if(colSize>0) toplamAlong += colSize;

    const autoUsed = panels.some(pp=>pp.auto);
    const kalanAcross = autoUsed ? 0 : (icColAcross - toplamAcross);
    return {colSize, colSizeDefault, panels, innerTakAdedi, icColAcross, kalanAcross, autoUsed, hasBogaz: colHasBogaz(col)};
  });

  const kalanAlong = icKullAlong - toplamAlong;

  // BOYDAN BOYA YÖN ANALİZİ — 'ara' (bölüm içi) sürekli seçildiyse hizalama doğrulanır
  const contInfo = {requested: face.cont==='ara', valid: face.cont!=='ara', msg:''};
  let alignedHeights = null, alignedGaps = null;
  if(face.cont==='ara'){
    if(face.columns.length===1){
      contInfo.valid = true;
      alignedHeights = colResults[0].panels.map(p=>p.eff);
      alignedGaps = face.columns[0].innerGaps.slice();
    } else {
      const n0 = face.columns[0].panels.length;
      const h0 = colResults[0].panels.map(p=>p.eff);
      const g0 = face.columns[0].innerGaps;
      let ok = true, why = '';
      for(let ci=1; ci<face.columns.length && ok; ci++){
        if(face.columns[ci].panels.length !== n0){ ok=false; why='bölümlerin kapak sayıları farklı'; break; }
        for(let k=0;k<g0.length;k++){ if(!!face.columns[ci].innerGaps[k] !== !!g0[k]){ ok=false; why='ara takviye desenleri hizalı değil'; break; } }
        if(ok){ for(let k=0;k<n0;k++){
          const e0=h0[k], e1=colResults[ci].panels[k].eff;
          // Her ikisi de oto (0) ise pPlaceholder eşit olacağından geçerli sayılır
          if((e0<=0) !== (e1<=0)){ ok=false; why='kapak yükseklikleri hizalı değil (biri otomatik, diğeri girilmiş)'; break; }
          if(e0>0 && Math.abs(e0-e1)>0.51){ ok=false; why='kapak yükseklikleri hizalı değil (Bölüm 1 ↔ Bölüm '+(ci+1)+')'; break; }
        } }
      }
      contInfo.valid = ok; contInfo.msg = why;
      if(ok){ alignedHeights = h0; alignedGaps = g0.slice(); }
    }
  }

  // DURUM
  const alongName = orient==='H' ? 'genişlik' : 'yükseklik';
  const acrossName = orient==='H' ? 'yükseklik' : 'genişlik';
  let cls='info', lines=[];
  if(faceW<=0 || faceH<=0){ lines.push(`Gerekli ana ölçüler girilmedi (${def.wKey}, ${def.hKey})`); }
  else {
    const anyColSize = colResults.some(c=>c.colSize>0);
    if(!anyColSize) lines.push(`Bölüm ${alongName} ölçüleri girilmedi — görselde kapağa tıklanarak girilir`);
    else {
      if(Math.abs(kalanAlong)<1e-6){ lines.push(`✓ Ana yön (${alongName}) TAM OTURDU — iç kullanılabilir: ${icKullAlong.toFixed(0)} mm`); cls='good'; }
      else if(kalanAlong>0){ lines.push(`⚠ Ana yön (${alongName}): ${kalanAlong.toFixed(0)} mm EKSİK`); cls='warn'; }
      else { lines.push(`⚠ Ana yön (${alongName}): ${Math.abs(kalanAlong).toFixed(0)} mm FAZLA`); cls='bad'; }
    }
    colResults.forEach((c,ci)=>{
      if(c.autoUsed) return; // tek kapak oto → her zaman tam
      if(c.panels.length>1 || c.panels[0].entered>0){
        if(Math.abs(c.kalanAcross)>1e-6){
          const t = c.kalanAcross>0 ? `${c.kalanAcross.toFixed(0)} mm EKSİK` : `${Math.abs(c.kalanAcross).toFixed(0)} mm FAZLA`;
          lines.push(`⚠ Bölüm ${ci+1} dik yön (${acrossName}): ${t}`);
          if(cls==='good'||cls==='info') cls = c.kalanAcross>0?'warn':'bad';
          else if(cls==='warn' && c.kalanAcross<0) cls='bad';
        }
      }
    });
    if(cls==='good' && colResults.every(c=>c.autoUsed || Math.abs(c.kalanAcross)<1e-6)){
      // ana yön + tüm bölümler tam
    }
    if(contInfo.requested && !contInfo.valid){
      lines.push('⚠ Boydan boya &quot;Yatay&quot; uygulanamadı: '+contInfo.msg+' — &quot;Dikey&quot; sürekli düzene geri düşüldü');
      if(cls==='good'||cls==='info') cls='warn';
    }
  }
  const status = {cls, text: lines.join('  |  ')};

  const anaTakBoy = acrossDim - 2*V.kenar - 2*V.takviyePlastik; // boydan boya (dik eksende tam)
  const anaTakYon = orient==='H' ? 'Dikey' : 'Yatay';
  const araTakYon = orient==='H' ? 'Yatay' : 'Dikey';

  // TAKVİYE KAYITLARI — seçilen sürekli yöne göre kesim boyları
  const takviyeRecords = [];
  const dimsOk = faceW>0 && faceH>0;
  const contAra = contInfo.requested && contInfo.valid; // bölüm içi (yatay) sürekli
  if(!contAra){
    // Varsayılan hiyerarşi: ana sürekli, ara segment
    if(anaTakAdedi>0) takviyeRecords.push({tip:'Ana Takviye', yon:anaTakYon, kaynak:'Boydan boya', adet:anaTakAdedi, boy: dimsOk ? anaTakBoy : null});
    face.columns.forEach((col,ci)=>{
      const cnt = col.innerGaps.filter(Boolean).length;
      if(cnt>0){
        const cs = Number(col.size)||0;
        takviyeRecords.push({tip:'Ara Takviye', yon:araTakYon, kaynak:'Bölüm '+(ci+1)+' — segment', adet:cnt, boy: cs>0 ? cs-2*V.takviyePlastik : null});
      }
    });
  } else {
    // Ters hiyerarşi: ara sürekli (boydan boya), ana segmentli
    const levels = alignedGaps.filter(Boolean).length;
    if(levels>0) takviyeRecords.push({tip:'Ara Takviye', yon:araTakYon, kaynak:'Boydan boya', adet:levels, boy: dimsOk ? (alongDim-2*V.kenar-2*V.takviyePlastik) : null});
    if(anaTakAdedi>0){
      let span=0; const segs=[];
      alignedHeights.forEach((h,k)=>{
        span += h;
        const gapOn = k<alignedGaps.length ? alignedGaps[k] : false;
        if(gapOn){ segs.push(span); span=0; }
      });
      segs.push(span);
      segs.forEach((s,si)=>{
        takviyeRecords.push({tip:'Ana Takviye', yon:anaTakYon, kaynak:'Segment '+(si+1)+' — sürekli üyeler arası', adet:anaTakAdedi, boy: (dimsOk && s>0) ? s-2*V.takviyePlastik : null});
      });
    }
  }

  return {def, faceW, faceH, orient, V, icAcross, kapaksiz:false,
    colResults, anaTakAdedi, anaTakBoy, anaTakYon, araTakYon, araTakToplam,
    icKullAlong, kalanAlong, toplamKapak, status, profil:profilBase,
    takviyeRecords, contInfo};
}

// ---------- SVG ----------
// Kod/tür/ölçü etiketlerini panel genişliğine göre büyük-ama-taşırmayan boyuta sığdırır;
// en küçük okunur boyutta (minSize) bile sığmıyorsa üç noktayla kısaltır. Canlı görünüm ve
// Excel çıktısı aynı drawFaceSVG'yi kullandığından ikisinde de aynı sonucu verir.
let __measureCtx = null;
function fitLabelText(text, maxWidth, maxSize, minSize, weight){
  if(!__measureCtx) __measureCtx = document.createElement('canvas').getContext('2d');
  const fam = &quot;-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',Arial,sans-serif&quot;;
  let size = maxSize;
  __measureCtx.font = `${weight} ${size}px ${fam}`;
  while(size > minSize && __measureCtx.measureText(text).width > maxWidth){
    size -= 0.5;
    __measureCtx.font = `${weight} ${size}px ${fam}`;
  }
  let out = text;
  if(__measureCtx.measureText(out).width > maxWidth){
    while(out.length > 1 && __measureCtx.measureText(out+'…').width > maxWidth) out = out.slice(0,-1);
    if(out.length < text.length) out += '…';
  }
  return {text: out, size};
}
function drawFaceSVG(fi){
  const r = computeFace(fi);
  const face = state.faces[fi];
  const V = r.V;
  const orient = r.orient;

  const SVG_W = 880, SVG_H = 480, PAD = 46;
  const hasDims = r.faceW>0 && r.faceH>0;
  const modelW = hasDims ? r.faceW : 1400;
  const modelH = hasDims ? r.faceH : 1200;
  const reserveX = orient === 'H' ? 30 : 0;
  const reserveY = orient === 'V' ? 30 : 0;
  const scale = Math.min((SVG_W-2*PAD-reserveX)/modelW, (SVG_H-2*PAD-reserveY)/modelH);
  const fw = modelW*scale, fh = modelH*scale;
  const ox = PAD, oy = PAD;
  const kenarPx = Math.max(V.kenar*scale, 4);
  const takviyePx = Math.max(V.takviye*scale, 4);

  let svg = `<svg xmlns=&quot;http://www.w3.org/2000/svg&quot; width=&quot;${SVG_W}&quot; height=&quot;${SVG_H}&quot; viewBox=&quot;0 0 ${SVG_W} ${SVG_H}&quot;>`;
  svg += `<rect x=&quot;${ox}&quot; y=&quot;${oy}&quot; width=&quot;${fw}&quot; height=&quot;${fh}&quot; fill=&quot;#eef1f4&quot; stroke=&quot;#3a4d5c&quot; stroke-width=&quot;2&quot;/>`;
  svg += `<rect x=&quot;${ox}&quot; y=&quot;${oy}&quot; width=&quot;${fw}&quot; height=&quot;${kenarPx}&quot; fill=&quot;#22303d&quot;/>`;
  svg += `<rect x=&quot;${ox}&quot; y=&quot;${oy+fh-kenarPx}&quot; width=&quot;${fw}&quot; height=&quot;${kenarPx}&quot; fill=&quot;#22303d&quot;/>`;
  svg += `<rect x=&quot;${ox}&quot; y=&quot;${oy}&quot; width=&quot;${kenarPx}&quot; height=&quot;${fh}&quot; fill=&quot;#22303d&quot;/>`;
  svg += `<rect x=&quot;${ox+fw-kenarPx}&quot; y=&quot;${oy}&quot; width=&quot;${kenarPx}&quot; height=&quot;${fh}&quot; fill=&quot;#22303d&quot;/>`;
  // Köşe plastikleri (4 adet) — yalnızca görsel; boy düşümleri hesapta zaten mevcut
  const kosePx = V.kose>0 ? Math.max(V.kose*scale, 6) : 0;
  const plastikPx = V.takviyePlastik>0 ? Math.max(V.takviyePlastik*scale, 2.5) : 0;
  const PL = '#10161d';
  // Boydan boya (sürekli) yön açık renkle vurgulanır; segmentli yön koyu kalır
  const contAra2 = face.cont==='ara' && r.contInfo && r.contInfo.valid;
  const CONT_FILL = '#547a96', SEG_FILL = '#3d5568';
  const colFill = contAra2 ? SEG_FILL : CONT_FILL;
  const innerFill = contAra2 ? CONT_FILL : SEG_FILL;
  if(kosePx>0) [[ox,oy],[ox+fw-kosePx,oy],[ox,oy+fh-kosePx],[ox+fw-kosePx,oy+fh-kosePx]].forEach(cc=>{
    svg += `<rect x=&quot;${cc[0]}&quot; y=&quot;${cc[1]}&quot; width=&quot;${kosePx}&quot; height=&quot;${kosePx}&quot; fill=&quot;${PL}&quot; stroke=&quot;#55707f&quot; stroke-width=&quot;0.8&quot;/>`;
  });
  svg += `<text x=&quot;${ox+fw/2}&quot; y=&quot;${oy-14}&quot; fill=&quot;#33424e&quot; font-size=&quot;12&quot; text-anchor=&quot;middle&quot;>${r.def.wKey} = ${hasDims?r.faceW:'?'} mm</text>`;
  svg += `<text x=&quot;${ox-14}&quot; y=&quot;${oy+fh/2}&quot; fill=&quot;#33424e&quot; font-size=&quot;12&quot; text-anchor=&quot;middle&quot; transform=&quot;rotate(-90 ${ox-14} ${oy+fh/2})&quot;>${r.def.hKey} = ${hasDims?r.faceH:'?'} mm</text>`;

  if(face.kapaksiz){
    svg += `<text x=&quot;${ox+fw/2}&quot; y=&quot;${oy+fh/2}&quot; fill=&quot;#3d4d5a&quot; font-size=&quot;15&quot; text-anchor=&quot;middle&quot;>KAPAKSIZ YÜZ — DOLU PANEL</text>`;
    svg += `<text x=&quot;${SVG_W-PAD}&quot; y=&quot;${SVG_H-14}&quot; fill=&quot;#9aa8b2&quot; font-size=&quot;9.5&quot; text-anchor=&quot;end&quot; font-style=&quot;italic&quot;>Cenk Altınay</text></svg>`;
    return svg;
  }

  const innerX = ox+kenarPx, innerY = oy+kenarPx;
  const innerW = fw-2*kenarPx, innerH = fh-2*kenarPx;
  const alongStartPx = orient==='H' ? innerX : innerY;
  const acrossStartPx = orient==='H' ? innerY : innerX;
  const acrossLenPx = orient==='H' ? innerH : innerW;

  // Bölüm görsel ölçüleri: girilmişse mm oranlı, girilmemişse eşit paylaştır
  const icKullMm = Math.max(r.icKullAlong||0, 1);
  const colSizes = r.colResults.map(c=>c.colSize);
  const totalEntered = colSizes.reduce((a,b)=>a+(b>0?b:0),0);
  const zeroCount = colSizes.filter(v=>v<=0).length;
  const remainingMm = Math.max(icKullMm-totalEntered, 0);
  const placeholderMm = zeroCount>0 ? Math.max(remainingMm/zeroCount, icKullMm*0.10) : 0;

  let cursor = alongStartPx;
  const innerBars = [], colBars = []; // sürekli yön kesişimde üstte çizilsin diye tamponlanır
  const bandsPx = [];                  // hizalı ara takviye bantları (boydan boya 'ara' geometrisi için)

  r.colResults.forEach((cRes, ci)=>{
    const col = face.columns[ci];
    const colMm = cRes.colSize>0 ? cRes.colSize : placeholderMm;
    const colPx = Math.max(colMm*scale, 26);

    // Bölüm içi paneller (dik eksende)
    const icColMm = Math.max(cRes.icColAcross, 1);
    const pEntered = cRes.panels.map(p=>p.auto ? cRes.icColAcross : p.entered);
    const pTotal = pEntered.reduce((a,b)=>a+(b>0?b:0),0);
    const pZero = pEntered.filter(v=>v<=0).length;
    const pRemaining = Math.max(icColMm-pTotal, 0);
    const pPlaceholder = pZero>0 ? Math.max(pRemaining/pZero, icColMm*0.12) : 0;

    let pCursor = acrossStartPx;
    cRes.panels.forEach((p, pi)=>{
      const pMm = pEntered[pi]>0 ? pEntered[pi] : pPlaceholder;
      const pPx = Math.max(pMm*scale, 20);
      // Per-panel along-axis boyutu
      const pColMm = (p.pColSize||0) > 0 ? p.pColSize : colMm;
      const pColPx = Math.max(pColMm*scale, 26);
      const color = TYPE_COLORS[p.type] || &quot;#34495e&quot;;
      const isSel = face.selected && face.selected.col===ci && face.selected.idx===pi;
      const dash = p.bos ? 'stroke-dasharray=&quot;7,5&quot; fill-opacity=&quot;0.35&quot;'
                 : ((p.entered<=0 && !p.auto) ? 'stroke-dasharray=&quot;5,4&quot; fill-opacity=&quot;0.4&quot;' : '');

      let px, py, pw, ph;
      if(orient==='H'){ px=cursor; py=pCursor; pw=pColPx; ph=pPx; }
      else            { px=pCursor; py=cursor; pw=pPx; ph=pColPx; }

      svg += `<g class=&quot;svg-panel&quot; data-face=&quot;${fi}&quot; data-col=&quot;${ci}&quot; data-panel=&quot;${pi}&quot;>`;
      svg += `<rect class=&quot;panel-rect${isSel?' selected':''}&quot; x=&quot;${px}&quot; y=&quot;${py}&quot; width=&quot;${pw}&quot; height=&quot;${ph}&quot; fill=&quot;${color}&quot; stroke=&quot;#4a5d6e&quot; stroke-width=&quot;1.5&quot; ${dash}/>`;
      if(p.type==='Camlı Açılır'){
        const gr = Math.max(Math.min(GLASS_R_MM*scale, Math.min(pw,ph)*0.42), 4);
        svg += `<circle cx=&quot;${px+pw/2}&quot; cy=&quot;${py+ph/2}&quot; r=&quot;${gr.toFixed(1)}&quot; fill=&quot;rgba(150,215,235,0.62)&quot; stroke=&quot;#2f8fae&quot; stroke-width=&quot;2.4&quot;/><circle cx=&quot;${px+pw/2}&quot; cy=&quot;${py+ph/2}&quot; r=&quot;${(gr*0.55).toFixed(1)}&quot; fill=&quot;none&quot; stroke=&quot;#eaf7fb&quot; stroke-width=&quot;1&quot; stroke-opacity=&quot;0.8&quot;/>`;
      }
      if(p.acilir) svg += `<circle cx=&quot;${px+7}&quot; cy=&quot;${py+ph*0.3}&quot; r=&quot;2.5&quot; fill=&quot;#4fb8a8&quot;/><circle cx=&quot;${px+7}&quot; cy=&quot;${py+ph*0.7}&quot; r=&quot;2.5&quot; fill=&quot;#4fb8a8&quot;/><rect x=&quot;${(px+pw-15).toFixed(1)}&quot; y=&quot;${(py+ph/2-11).toFixed(1)}&quot; width=&quot;7&quot; height=&quot;22&quot; rx=&quot;3&quot; fill=&quot;#14212b&quot; stroke=&quot;#4fb8a8&quot; stroke-width=&quot;1.5&quot;/>`;
      if(p.eleman){
        if(p.type==='Damper'){
          // Jaluzi kanatlı damper (frontal) — metal kanat gövdesi + kırmızı conta şeridi, referans görsele göre
          svg += `<rect x=&quot;${px+3}&quot; y=&quot;${py+3}&quot; width=&quot;${pw-6}&quot; height=&quot;${ph-6}&quot; fill=&quot;none&quot; stroke=&quot;#9199a0&quot; stroke-width=&quot;1.4&quot;/>`;
          const nSlat = Math.max(3, Math.min(7, Math.floor(ph/24)));
          const bInX = px+5, bInW = pw-10;
          const bandH = (ph-8)/nSlat;
          for(let li=0; li<nSlat; li++){
            const by = py+4 + bandH*li;
            const bh = Math.max(bandH-3, 4);
            svg += `<rect x=&quot;${bInX}&quot; y=&quot;${by.toFixed(1)}&quot; width=&quot;${bInW}&quot; height=&quot;${bh.toFixed(1)}&quot; fill=&quot;#aeb4ba&quot; stroke=&quot;#6b7178&quot; stroke-width=&quot;0.6&quot;/>`;
            const sealH = Math.max(bh*0.22, 2);
            svg += `<rect x=&quot;${bInX}&quot; y=&quot;${(by+bh-sealH).toFixed(1)}&quot; width=&quot;${bInW}&quot; height=&quot;${sealH.toFixed(1)}&quot; fill=&quot;#c1272d&quot;/>`;
          }
        } else if(p.type==='Tava'){
          // Tava (frontal) — düz panel görünümü, sadece küçük bir tahliye deliği
          const hr = Math.max(Math.min(pw,ph)*0.09, 4);
          svg += `<circle cx=&quot;${(px+pw/2).toFixed(1)}&quot; cy=&quot;${(py+ph*0.72).toFixed(1)}&quot; r=&quot;${hr.toFixed(1)}&quot; fill=&quot;#05080c&quot; stroke=&quot;#3a4750&quot; stroke-width=&quot;1&quot;/>`;
        } else {
          // Boğaz (frontal) — flanş çerçevesi + koyu kanal açıklığı
          svg += `<rect x=&quot;${px+4}&quot; y=&quot;${py+4}&quot; width=&quot;${pw-8}&quot; height=&quot;${ph-8}&quot; fill=&quot;none&quot; stroke=&quot;#7a6a4a&quot; stroke-width=&quot;1.4&quot;/>`;
          const iw=(pw-8)*0.68, ih=(ph-8)*0.68;
          svg += `<rect x=&quot;${(px+pw/2-iw/2).toFixed(1)}&quot; y=&quot;${(py+ph/2-ih/2).toFixed(1)}&quot; width=&quot;${iw.toFixed(1)}&quot; height=&quot;${ih.toFixed(1)}&quot; fill=&quot;#05080c&quot; stroke=&quot;#3a4750&quot; stroke-width=&quot;1&quot;/>`;
        }
        // +150 mm çıkıntı notu (Tava düz/çıkıntısız olduğundan hariç tutulur)
        if(p.type!=='Tava') svg += `<text x=&quot;${px+pw/2}&quot; y=&quot;${py+12}&quot; fill=&quot;#000000&quot; font-size=&quot;8.5&quot; text-anchor=&quot;middle&quot;>+${'150'} mm çıkıntı</text>`;
      }
      const cx=px+pw/2, cy=py+ph/2;
      const colDisp = (p.pColSize||0) > 0 ? Math.round(p.pColSize) : Math.round(pColMm);
      const effDisp = p.eff>0 ? Math.round(p.eff) : Math.round(pMm);
      const colIsAuto = (p.pColSize||0) <= 0;
      const autoSfx = (colIsAuto || p.auto) ? ' (oto)' : '';
      const sizeTxt = orient==='H'
        ? `${colDisp}×${effDisp}${autoSfx}`
        : `${effDisp}×${colDisp}${autoSfx}`;
      const labelFill = p.bos ? '#ffffff' : '#000000';
      const kodTxt = `${FACE_CODE[fi]}-B${ci+1}K${pi+1}`;
      const padW = Math.max(pw-8, 10);
      // ph'ye göre kaç satır sığar (kod / tür / ölçü — bu sırayla öncelikli); her satırın
      // FONT BOYUTU ayrıca pw'ye göre fitLabelText ile küçültülür/kısaltılır, böylece yan
      // yana duran kapakların yazıları asla birbirine taşmaz.
      let lineCount = pw<18 ? 0 : ph>=46 ? 3 : ph>=30 ? 2 : ph>=18 ? 1 : 0;
      if(lineCount>0){
        const rows = [fitLabelText(kodTxt, padW, 13, 8, 700)];
        rows[0].weight = 700;
        if(lineCount>=2){ const t=fitLabelText(p.type, padW, 11, 8, 400); t.weight=400; rows.push(t); }
        if(lineCount>=3){ const t=fitLabelText(sizeTxt, padW, 12, 8, 700); t.weight=700; rows.push(t); }
        const lineGap = rows.length===3 ? 16 : rows.length===2 ? 13 : 0;
        const totalH = (rows.length-1)*lineGap;
        const clipId = `clip${fi}_${ci}_${pi}`;
        svg += `<clipPath id=&quot;${clipId}&quot;><rect x=&quot;${(px+1).toFixed(1)}&quot; y=&quot;${(py+1).toFixed(1)}&quot; width=&quot;${Math.max(pw-2,1).toFixed(1)}&quot; height=&quot;${Math.max(ph-2,1).toFixed(1)}&quot;/></clipPath>`;
        svg += `<g clip-path=&quot;url(#${clipId})&quot;>`;
        rows.forEach((row,ri)=>{
          const ly = cy - totalH/2 + ri*lineGap;
          svg += `<text x=&quot;${cx}&quot; y=&quot;${ly.toFixed(1)}&quot; fill=&quot;${labelFill}&quot; font-size=&quot;${row.size}&quot; font-weight=&quot;${row.weight}&quot; text-anchor=&quot;middle&quot; dominant-baseline=&quot;middle&quot;>${row.text}</text>`;
        });
        svg += `</g>`;
      }
      svg += `</g>`;

      pCursor += pPx;

      // Bölüm içi ara boşluk / ara takviye
      if(pi < cRes.panels.length-1){
        const on = col.innerGaps[pi];
        // İç takviye yalnızca her iki panelinpColPx örtüşümü kadar uzanır
        const np = cRes.panels[pi+1];
        const nextPColMm = (np.pColSize||0) > 0 ? np.pColSize : colMm;
        const nextPColPx = Math.max(nextPColMm*scale, 26);
        const gapColPx = Math.min(pColPx, nextPColPx);
        if(on){
          if(ci===0) bandsPx.push(pCursor);
          if(!contAra2){
          if(orient==='H') innerBars.push(`<g class=&quot;svg-innergap&quot; data-face=&quot;${fi}&quot; data-col=&quot;${ci}&quot; data-gap=&quot;${pi}&quot;><rect x=&quot;${cursor}&quot; y=&quot;${pCursor}&quot; width=&quot;${gapColPx}&quot; height=&quot;${takviyePx}&quot; fill=&quot;${innerFill}&quot; stroke=&quot;#4a5d6e&quot; stroke-width=&quot;0.8&quot;/>${plastikPx>0?`<rect x=&quot;${cursor}&quot; y=&quot;${pCursor}&quot; width=&quot;${plastikPx}&quot; height=&quot;${takviyePx}&quot; fill=&quot;${PL}&quot;/><rect x=&quot;${cursor+gapColPx-plastikPx}&quot; y=&quot;${pCursor}&quot; width=&quot;${plastikPx}&quot; height=&quot;${takviyePx}&quot; fill=&quot;${PL}&quot;/>`:``}<rect x=&quot;${cursor}&quot; y=&quot;${pCursor-5}&quot; width=&quot;${gapColPx}&quot; height=&quot;${takviyePx+10}&quot; fill=&quot;transparent&quot;/></g>`);
          else innerBars.push(`<g class=&quot;svg-innergap&quot; data-face=&quot;${fi}&quot; data-col=&quot;${ci}&quot; data-gap=&quot;${pi}&quot;><rect x=&quot;${pCursor}&quot; y=&quot;${cursor}&quot; width=&quot;${takviyePx}&quot; height=&quot;${gapColPx}&quot; fill=&quot;${innerFill}&quot; stroke=&quot;#4a5d6e&quot; stroke-width=&quot;0.8&quot;/>${plastikPx>0?`<rect x=&quot;${pCursor}&quot; y=&quot;${cursor}&quot; width=&quot;${takviyePx}&quot; height=&quot;${plastikPx}&quot; fill=&quot;${PL}&quot;/><rect x=&quot;${pCursor}&quot; y=&quot;${cursor+gapColPx-plastikPx}&quot; width=&quot;${takviyePx}&quot; height=&quot;${plastikPx}&quot; fill=&quot;${PL}&quot;/>`:``}<rect x=&quot;${pCursor-5}&quot; y=&quot;${cursor}&quot; width=&quot;${takviyePx+10}&quot; height=&quot;${gapColPx}&quot; fill=&quot;transparent&quot;/></g>`);
          }
          pCursor += takviyePx;
        } else {
          if(orient==='H'){
            svg += `<g class=&quot;svg-innergap&quot; data-face=&quot;${fi}&quot; data-col=&quot;${ci}&quot; data-gap=&quot;${pi}&quot;><line class=&quot;gap-hint&quot; x1=&quot;${cursor}&quot; y1=&quot;${pCursor}&quot; x2=&quot;${cursor+gapColPx}&quot; y2=&quot;${pCursor}&quot; stroke=&quot;#55697c&quot; stroke-width=&quot;1.5&quot; stroke-dasharray=&quot;3,5&quot;/><rect x=&quot;${cursor}&quot; y=&quot;${pCursor-7}&quot; width=&quot;${gapColPx}&quot; height=&quot;14&quot; fill=&quot;transparent&quot;><title>Ara takviye ekle/kaldır</title></rect></g>`;
          } else {
            svg += `<g class=&quot;svg-innergap&quot; data-face=&quot;${fi}&quot; data-col=&quot;${ci}&quot; data-gap=&quot;${pi}&quot;><line class=&quot;gap-hint&quot; x1=&quot;${pCursor}&quot; y1=&quot;${cursor}&quot; x2=&quot;${pCursor}&quot; y2=&quot;${cursor+gapColPx}&quot; stroke=&quot;#55697c&quot; stroke-width=&quot;1.5&quot; stroke-dasharray=&quot;3,5&quot;/><rect x=&quot;${pCursor-7}&quot; y=&quot;${cursor}&quot; width=&quot;14&quot; height=&quot;${gapColPx}&quot; fill=&quot;transparent&quot;><title>Ara takviye ekle/kaldır</title></rect></g>`;
          }
        }
      }
    });

    // Bölüm dik yön kalan boşluğu
    if(hasDims && !cRes.autoUsed && cRes.kalanAcross>1e-6 && (cRes.panels.length>1 || cRes.panels[0].entered>0)){
      const kPx = Math.min(Math.max(cRes.kalanAcross*scale,8), acrossStartPx+acrossLenPx-pCursor);
      if(kPx>2){
        if(orient==='H') svg += `<rect x=&quot;${cursor}&quot; y=&quot;${pCursor}&quot; width=&quot;${colPx}&quot; height=&quot;${kPx}&quot; fill=&quot;#3a2a10&quot; fill-opacity=&quot;0.5&quot; stroke=&quot;#e0a13a&quot; stroke-width=&quot;1&quot; stroke-dasharray=&quot;4,3&quot;/>`;
        else svg += `<rect x=&quot;${pCursor}&quot; y=&quot;${cursor}&quot; width=&quot;${kPx}&quot; height=&quot;${colPx}&quot; fill=&quot;#3a2a10&quot; fill-opacity=&quot;0.5&quot; stroke=&quot;#e0a13a&quot; stroke-width=&quot;1&quot; stroke-dasharray=&quot;4,3&quot;/>`;
      }
    }

    // Kapak ekle butonu (bölümün dik yön sonunda küçük +)
    {
      let bx, by;
      if(orient==='H'){ bx = cursor+colPx/2-11; by = innerY+innerH+4; }
      else            { bx = innerX+innerW+4;   by = cursor+colPx/2-11; }
      svg += `<g class=&quot;svg-addpanel&quot; data-face=&quot;${fi}&quot; data-col=&quot;${ci}&quot;>
        <rect x=&quot;${bx}&quot; y=&quot;${by}&quot; width=&quot;22&quot; height=&quot;22&quot; rx=&quot;5&quot; fill=&quot;#1c3a34&quot; stroke=&quot;#4fb8a8&quot; stroke-width=&quot;1&quot;/>
        <text x=&quot;${bx+11}&quot; y=&quot;${by+16}&quot; fill=&quot;#4fb8a8&quot; font-size=&quot;15&quot; font-weight=&quot;700&quot; text-anchor=&quot;middle&quot;>+</text>
        <title>${orient==='V' ? 'Bu satıra kapak ekle' : 'Bu bölüme kapak ekle (dik yönde böl)'}</title>
      </g>`;
    }


    cursor += colPx;

    // Bölümler arası ANA takviye / boşluk
    if(ci < r.colResults.length-1){
      const on = face.colGaps[ci];
      if(on){
        if(contAra2){
          // Boydan boya 'ara' geçerli: bu yöndeki takviye kesişimlerde bölünür,
          // her segmentin iki ucuna takviye plastiği gelir (hesapla birebir)
          const aEnd = (orient==='H') ? innerY+innerH : innerX+innerW;
          let segStart = (orient==='H') ? innerY : innerX;
          const bounds = [];
          bandsPx.forEach(b=>{ bounds.push([segStart, b]); segStart = b + takviyePx; });
          bounds.push([segStart, aEnd]);
          let segs = '';
          bounds.forEach(bd=>{
            const s0=bd[0], s1=bd[1];
            if(s1-s0 < 1) return;
            if(orient==='H'){
              segs += `<rect x=&quot;${cursor}&quot; y=&quot;${s0}&quot; width=&quot;${takviyePx}&quot; height=&quot;${(s1-s0)}&quot; fill=&quot;${colFill}&quot; stroke=&quot;#4a5d6e&quot; stroke-width=&quot;0.8&quot;/>`;
              if(plastikPx>0) segs += `<rect x=&quot;${cursor}&quot; y=&quot;${s0}&quot; width=&quot;${takviyePx}&quot; height=&quot;${plastikPx}&quot; fill=&quot;${PL}&quot;/><rect x=&quot;${cursor}&quot; y=&quot;${s1-plastikPx}&quot; width=&quot;${takviyePx}&quot; height=&quot;${plastikPx}&quot; fill=&quot;${PL}&quot;/>`;
            } else {
              segs += `<rect x=&quot;${s0}&quot; y=&quot;${cursor}&quot; width=&quot;${(s1-s0)}&quot; height=&quot;${takviyePx}&quot; fill=&quot;${colFill}&quot; stroke=&quot;#4a5d6e&quot; stroke-width=&quot;0.8&quot;/>`;
              if(plastikPx>0) segs += `<rect x=&quot;${s0}&quot; y=&quot;${cursor}&quot; width=&quot;${plastikPx}&quot; height=&quot;${takviyePx}&quot; fill=&quot;${PL}&quot;/><rect x=&quot;${s1-plastikPx}&quot; y=&quot;${cursor}&quot; width=&quot;${plastikPx}&quot; height=&quot;${takviyePx}&quot; fill=&quot;${PL}&quot;/>`;
            }
          });
          const hit = (orient==='H')
            ? `<rect x=&quot;${cursor-5}&quot; y=&quot;${innerY}&quot; width=&quot;${takviyePx+10}&quot; height=&quot;${innerH}&quot; fill=&quot;transparent&quot;/>`
            : `<rect x=&quot;${innerX}&quot; y=&quot;${cursor-5}&quot; width=&quot;${innerW}&quot; height=&quot;${takviyePx+10}&quot; fill=&quot;transparent&quot;/>`;
          colBars.push(`<g class=&quot;svg-gap&quot; data-face=&quot;${fi}&quot; data-gap=&quot;${ci}&quot;>${segs}${hit}</g>`);
        }
        else if(orient==='H') colBars.push(`<g class=&quot;svg-gap&quot; data-face=&quot;${fi}&quot; data-gap=&quot;${ci}&quot;><rect x=&quot;${cursor}&quot; y=&quot;${innerY}&quot; width=&quot;${takviyePx}&quot; height=&quot;${innerH}&quot; fill=&quot;${colFill}&quot; stroke=&quot;#4a5d6e&quot; stroke-width=&quot;0.8&quot;/>${plastikPx>0?`<rect x=&quot;${cursor}&quot; y=&quot;${innerY}&quot; width=&quot;${takviyePx}&quot; height=&quot;${plastikPx}&quot; fill=&quot;${PL}&quot;/><rect x=&quot;${cursor}&quot; y=&quot;${innerY+innerH-plastikPx}&quot; width=&quot;${takviyePx}&quot; height=&quot;${plastikPx}&quot; fill=&quot;${PL}&quot;/>`:``}<rect x=&quot;${cursor-5}&quot; y=&quot;${innerY}&quot; width=&quot;${takviyePx+10}&quot; height=&quot;${innerH}&quot; fill=&quot;transparent&quot;/></g>`);
        else colBars.push(`<g class=&quot;svg-gap&quot; data-face=&quot;${fi}&quot; data-gap=&quot;${ci}&quot;><rect x=&quot;${innerX}&quot; y=&quot;${cursor}&quot; width=&quot;${innerW}&quot; height=&quot;${takviyePx}&quot; fill=&quot;${colFill}&quot; stroke=&quot;#4a5d6e&quot; stroke-width=&quot;0.8&quot;/>${plastikPx>0?`<rect x=&quot;${innerX}&quot; y=&quot;${cursor}&quot; width=&quot;${plastikPx}&quot; height=&quot;${takviyePx}&quot; fill=&quot;${PL}&quot;/><rect x=&quot;${innerX+innerW-plastikPx}&quot; y=&quot;${cursor}&quot; width=&quot;${plastikPx}&quot; height=&quot;${takviyePx}&quot; fill=&quot;${PL}&quot;/>`:``}<rect x=&quot;${innerX}&quot; y=&quot;${cursor-5}&quot; width=&quot;${innerW}&quot; height=&quot;${takviyePx+10}&quot; fill=&quot;transparent&quot;/></g>`);
        cursor += takviyePx;
      } else {
        if(orient==='H'){
          svg += `<g class=&quot;svg-gap&quot; data-face=&quot;${fi}&quot; data-gap=&quot;${ci}&quot;><line class=&quot;gap-hint&quot; x1=&quot;${cursor}&quot; y1=&quot;${innerY}&quot; x2=&quot;${cursor}&quot; y2=&quot;${innerY+innerH}&quot; stroke=&quot;#55697c&quot; stroke-width=&quot;1.5&quot; stroke-dasharray=&quot;3,5&quot;/>`;
          svg += `<rect x=&quot;${cursor-7}&quot; y=&quot;${innerY}&quot; width=&quot;14&quot; height=&quot;${innerH}&quot; fill=&quot;transparent&quot;><title>Ana takviye ekle/kaldır</title></rect>`;
          svg += `</g>`;
        } else {
          svg += `<g class=&quot;svg-gap&quot; data-face=&quot;${fi}&quot; data-gap=&quot;${ci}&quot;><line class=&quot;gap-hint&quot; x1=&quot;${innerX}&quot; y1=&quot;${cursor}&quot; x2=&quot;${innerX+innerW}&quot; y2=&quot;${cursor}&quot; stroke=&quot;#55697c&quot; stroke-width=&quot;1.5&quot; stroke-dasharray=&quot;3,5&quot;/>`;
          svg += `<rect x=&quot;${innerX}&quot; y=&quot;${cursor-7}&quot; width=&quot;${innerW}&quot; height=&quot;14&quot; fill=&quot;transparent&quot;><title>Ana takviye ekle/kaldır</title></rect>`;
          svg += `</g>`;
        }
      }
    }
  });

  // Ana yön kalan boşluk
  if(hasDims && r.kalanAlong>1e-6){
    const kPx = Math.max(r.kalanAlong*scale, 10);
    if(orient==='H'){
      const w = Math.min(kPx, ox+fw-kenarPx-cursor);
      if(w>2){
        svg += `<rect x=&quot;${cursor}&quot; y=&quot;${innerY}&quot; width=&quot;${w}&quot; height=&quot;${innerH}&quot; fill=&quot;#3a2a10&quot; fill-opacity=&quot;0.5&quot; stroke=&quot;#e0a13a&quot; stroke-width=&quot;1&quot; stroke-dasharray=&quot;4,3&quot;/>`;
        svg += `<text x=&quot;${cursor+w/2}&quot; y=&quot;${innerY+innerH/2}&quot; fill=&quot;#e0a13a&quot; font-size=&quot;10&quot; text-anchor=&quot;middle&quot; transform=&quot;rotate(-90 ${cursor+w/2} ${innerY+innerH/2})&quot;>${r.kalanAlong.toFixed(0)} mm boş</text>`;
      }
    } else {
      const h = Math.min(kPx, oy+fh-kenarPx-cursor);
      if(h>2){
        svg += `<rect x=&quot;${innerX}&quot; y=&quot;${cursor}&quot; width=&quot;${innerW}&quot; height=&quot;${h}&quot; fill=&quot;#3a2a10&quot; fill-opacity=&quot;0.5&quot; stroke=&quot;#e0a13a&quot; stroke-width=&quot;1&quot; stroke-dasharray=&quot;4,3&quot;/>`;
        svg += `<text x=&quot;${innerX+innerW/2}&quot; y=&quot;${cursor+h/2+3}&quot; fill=&quot;#e0a13a&quot; font-size=&quot;10&quot; text-anchor=&quot;middle&quot;>${r.kalanAlong.toFixed(0)} mm boş</text>`;
      }
    }
  }

  // Sürekli üye kesişimde üstte: seçilen yön son çizilir
  if(contAra2){
    // Boydan boya sürekli ara takviyeler: tek parça, yalnız iki uçta plastik
    bandsPx.forEach((b,gi)=>{
      if(orient==='H'){
        innerBars.push(`<g class=&quot;svg-innergap&quot; data-face=&quot;${fi}&quot; data-col=&quot;all&quot; data-gap=&quot;${gi}&quot;><rect x=&quot;${innerX}&quot; y=&quot;${b}&quot; width=&quot;${innerW}&quot; height=&quot;${takviyePx}&quot; fill=&quot;${innerFill}&quot; stroke=&quot;#4a5d6e&quot; stroke-width=&quot;0.8&quot;/>${plastikPx>0?`<rect x=&quot;${innerX}&quot; y=&quot;${b}&quot; width=&quot;${plastikPx}&quot; height=&quot;${takviyePx}&quot; fill=&quot;${PL}&quot;/><rect x=&quot;${innerX+innerW-plastikPx}&quot; y=&quot;${b}&quot; width=&quot;${plastikPx}&quot; height=&quot;${takviyePx}&quot; fill=&quot;${PL}&quot;/>`:``}<rect x=&quot;${innerX}&quot; y=&quot;${b-5}&quot; width=&quot;${innerW}&quot; height=&quot;${takviyePx+10}&quot; fill=&quot;transparent&quot;><title>Boydan boya ara takviye — tıklanınca tüm bölümlerde kaldırılır</title></rect></g>`);
      } else {
        innerBars.push(`<g class=&quot;svg-innergap&quot; data-face=&quot;${fi}&quot; data-col=&quot;all&quot; data-gap=&quot;${gi}&quot;><rect x=&quot;${b}&quot; y=&quot;${innerY}&quot; width=&quot;${takviyePx}&quot; height=&quot;${innerH}&quot; fill=&quot;${innerFill}&quot; stroke=&quot;#4a5d6e&quot; stroke-width=&quot;0.8&quot;/>${plastikPx>0?`<rect x=&quot;${b}&quot; y=&quot;${innerY}&quot; width=&quot;${takviyePx}&quot; height=&quot;${plastikPx}&quot; fill=&quot;${PL}&quot;/><rect x=&quot;${b}&quot; y=&quot;${innerY+innerH-plastikPx}&quot; width=&quot;${takviyePx}&quot; height=&quot;${plastikPx}&quot; fill=&quot;${PL}&quot;/>`:``}<rect x=&quot;${b-5}&quot; y=&quot;${innerY}&quot; width=&quot;${takviyePx+10}&quot; height=&quot;${innerH}&quot; fill=&quot;transparent&quot;><title>Boydan boya ara takviye — tıklanınca tüm bölümlerde kaldırılır</title></rect></g>`);
      }
    });
  }
  if(contAra2) svg += colBars.join('') + innerBars.join('');
  else svg += innerBars.join('') + colBars.join('');

  // H orient: face sağ tarafında tek + butonu (bölüm ekle)
  if(orient === 'H'){
    const cbx = ox+fw+4, cby = oy+fh/2-11;
    svg += `<g class=&quot;svg-addcol&quot; data-face=&quot;${fi}&quot; data-addcol=&quot;${r.colResults.length-1}&quot;>
      <rect x=&quot;${cbx}&quot; y=&quot;${cby}&quot; width=&quot;22&quot; height=&quot;22&quot; rx=&quot;5&quot; fill=&quot;#1c2a24&quot; stroke=&quot;#4fb8a8&quot; stroke-width=&quot;1&quot; stroke-dasharray=&quot;3,2&quot;/>
      <text x=&quot;${cbx+11}&quot; y=&quot;${cby+16}&quot; fill=&quot;#4fb8a8&quot; font-size=&quot;15&quot; font-weight=&quot;700&quot; text-anchor=&quot;middle&quot;>+</text>
      <title>Sağa yeni bölüm ekle</title>
    </g>`;
  }
  // V orient: face altında tek + butonu (satır ekle)
  if(orient === 'V'){
    const arx = ox+fw/2-11, ary = oy+fh+4;
    svg += `<g class=&quot;svg-addrow&quot; data-face=&quot;${fi}&quot; data-addrow=&quot;${r.colResults.length-1}&quot;>
      <rect x=&quot;${arx}&quot; y=&quot;${ary}&quot; width=&quot;22&quot; height=&quot;22&quot; rx=&quot;5&quot; fill=&quot;#1c2a24&quot; stroke=&quot;#4fb8a8&quot; stroke-width=&quot;1&quot; stroke-dasharray=&quot;3,2&quot;/>
      <text x=&quot;${arx+11}&quot; y=&quot;${ary+16}&quot; fill=&quot;#4fb8a8&quot; font-size=&quot;15&quot; font-weight=&quot;700&quot; text-anchor=&quot;middle&quot;>+</text>
      <title>Yeni satır ekle</title>
    </g>`;
  }

  svg += `<text x=&quot;${SVG_W-PAD}&quot; y=&quot;${SVG_H-14}&quot; fill=&quot;#9aa8b2&quot; font-size=&quot;9.5&quot; text-anchor=&quot;end&quot; font-style=&quot;italic&quot;>Cenk Altınay</text>`;
  svg += `</svg>`;
  return svg;
}

// ---------- HTML ----------
function buildFaceHTML(fi){
  const def = FACE_DEFS[fi];
  return `
  <div class=&quot;section&quot;>
    <div class=&quot;flex-between&quot; style=&quot;margin-bottom:10px;&quot;>
      <span class=&quot;badge&quot;>${def.name} — ${def.wKey} × ${def.hKey}</span>

  return `<optgroup label=&quot;Sabit&quot;>${SABIT_TYPES.map(t=>`<option value=&quot;${t}&quot;${sel===t?' selected':''}>${t}</option>`).join('')}</optgroup>`+

         `<optgroup label=&quot;Eleman (0 tolerans)&quot;>${ELEMAN_TYPES.map(t=>`<option value=&quot;${t}&quot;${sel===t?' selected':''}>${t}</option>`).join('')}</optgroup>`+
         `<optgroup label=&quot;Boş&quot;>${BOS_TYPES.map(t=>`<option value=&quot;${t}&quot;${sel===t?' selected':''}>${t}</option>`).join('')}</optgroup>`;
}

function editorInfo(r, ci, pi, orient){
  const c = r.colResults[ci];
  const p = c.panels[pi];
  let info = '';
  if(p.sabitW!==null) info += `SABİT w: ${p.sabitW.toFixed(0)} mm. `;
  if(p.sabitH!==null) info += `SABİT h: ${p.sabitH.toFixed(0)} mm. `;
  if(p.eleman) info += `Eleman — 0 tolerans: girilen ölçü kesim/sipariş ölçüsüdür. `;
  if(p.bos) info += `Boş Alan — kesim listesine girmez; son hücrede ölçüsüz bırakılırsa kalan alanı otomatik doldurur. `;
  const acrossLbl = orient==='V' ? 'Genişlik' : 'Yükseklik';
  const rowLbl    = orient==='V' ? 'satır' : 'bölüm';
  if(p.auto) info += `${acrossLbl} otomatik (${rowLbl} iç ölçüsü: ${c.icColAcross.toFixed(0)} mm). `;
  if(!c.autoUsed && Math.abs(c.kalanAcross)>1e-6 && c.panels.length>1) info += `${rowLbl.charAt(0).toUpperCase()+rowLbl.slice(1)} dik yön kalanı: ${c.kalanAcross.toFixed(0)} mm.`;
  return info;
}

function renderEditor(fi){
  const face = state.faces[fi];
  const ed = document.getElementById(`f${fi}_editor`);
  const body = document.getElementById(`f${fi}_editor_body`);

    document.getElementById(`f${fi}_ed_info`).textContent='';
    return;
  }
  const r = computeFace(fi);
  const {col:ci, idx:pi} = face.selected;
  const col = face.columns[ci];
  const p = col.panels[pi];
  const orient = face.orient;

  document.getElementById(`f${fi}_editor_title`).textContent = orient==='V' ? `Satır ${ci+1} / Kapak ${pi+1}` : `Bölüm ${ci+1} / Kapak ${pi+1}`;
  const colLbl = orient==='H' ? 'Bu Kapak Genişliği w (mm)' : 'Kapak Yüksekliği h (mm)';
  const pLbl = orient==='H' ? 'Kapak Yüksekliği h (mm)' : 'Kapak Genişliği w (mm)';
  const single = col.panels.length===1;
  const colInputVal = orient==='H' ? (p.colSize||'') : (col.size||'');
  const colInputPh  = orient==='H' ? (col.size||'') : 'oto';
  const colField = `<div><label>${colLbl}</label><input type=&quot;number&quot; id=&quot;f${fi}_ed_colsize&quot; value=&quot;${colInputVal}&quot; placeholder=&quot;${colInputPh}&quot;></div>`;
  const pField = `<div><label>${pLbl}${single?' — boş = otomatik tam':''}</label><input type=&quot;number&quot; id=&quot;f${fi}_ed_psize&quot; value=&quot;${p.size||''}&quot; placeholder=&quot;${single?'oto':''}&quot;></div>`;
  const dimFields = orient==='V' ? pField + colField : colField + pField;
  body.innerHTML = `<div class=&quot;grid&quot;>

    <div><label>Panel Tipi</label><select id=&quot;f${fi}_ed_type&quot;>${typeOptions(p.type)}</select></div>

    </div>
  </div>`;
  document.getElementById(`f${fi}_ed_info`).textContent = editorInfo(r, ci, pi, orient);
}

// Kesim listesi satırları — HTML tablosu ve Excel çıktısı aynı kaynaktan beslenir
function getCutRows(r){
  const out = [];
  const fc = FACE_CODE[FACE_DEFS.indexOf(r.def)] || '';
  r.colResults.forEach((c,ci)=>{
    c.panels.forEach((p,pi)=>{
      if(p.bos) return; // Boş Alan kesim listesine girmez
      const istW = p.panelW>0 ? Math.round(p.panelW) : null;
      const istH = p.panelH>0 ? Math.round(p.panelH)+(p.auto?' (oto)':'') : null;
      const sabH = p.sabitH!==null ? Math.round(p.sabitH) : null;
      out.push([fc+'-B'+(ci+1)+'K'+(pi+1), p.type, istW!==null?istW:'—', istH!==null?istH:'—',
        p.sabitW!==null?Math.round(p.sabitW):'—', sabH!==null?sabH:'—']);
    });
  });
  return out;
}

// Excel çıktısı için: yalnızca SABİT ölçüler (imalat kesim değerleri)
function getSabitRows(r){
  const out = [];
  const fc = FACE_CODE[FACE_DEFS.indexOf(r.def)] || '';
  r.colResults.forEach((c,ci)=>{
    c.panels.forEach((p,pi)=>{
      if(p.bos) return; // Boş Alan kesim listesine girmez
      const g = p.sabitW!==null ? Math.round(p.sabitW) : 'ÖLÇÜ EKSİK';
      const y = p.sabitH!==null ? Math.round(p.sabitH) : 'ÖLÇÜ EKSİK';
      out.push([fc+'-B'+(ci+1)+'K'+(pi+1), p.type, g, y]);
    });
  });
  return out;
}

// ---------- CİHAZ GENELİ TAKVİYE ÖZETİ ----------
function collectTakviyeRows(){
  const rows = [];      // {face, tip, yon, kaynak, adet, boy|null}
  const missing = [];
  state.modules.forEach((md, m)=>{
    withModule(m, ()=>{
      FACE_DEFS.forEach((def, fi)=>{
        const r = computeFace(fi);
        if(r.kapaksiz) return;
        const faceName = 'M'+(m+1)+' '+def.name;
        r.takviyeRecords.forEach(t=>{
          rows.push({face:faceName, tip:t.tip, yon:t.yon, kaynak:t.kaynak, adet:t.adet, boy:t.boy});
          if(t.boy===null) missing.push(faceName+' '+t.kaynak+': ölçü eksik');
        });
        if(r.contInfo && r.contInfo.requested && !r.contInfo.valid){
          missing.push(faceName+': boydan boya &quot;bölüm içi&quot; uygulanamadı ('+r.contInfo.msg+') — varsayılan hiyerarşiyle hesaplandı');
        }
      });
    });
  });
  return {rows, missing};
}

function renderGlobalSummary(){
  // 3B İSKELET — 12 ayrıt: 4×W, 4×H, 4×L (ayrıtlar yüzler arasında paylaşılır, bir kez sayılır)
  const V = getV();
  const frameEl = document.getElementById('gsum_frame');
  if(frameEl){
    const N = state.modules.length;
    const pmap = new Map(); // boy → adet (her modülün L/H/W ekseni 4'er profil)
    let missingDim = 0;
    state.modules.forEach(md=>{
      ['L','H','W'].forEach(k=>{
        if(md[k]>0){ const boy = md[k]-2*V.kose; pmap.set(boy,(pmap.get(boy)||0)+4); }
        else missingDim += 4;
      });
    });
    let frameRows = '';
    [...pmap.entries()].sort((a,b)=>b[0]-a[0]).forEach(([boy,adet])=>{
      frameRows += `<tr><td>Köşe Profili</td><td>${adet}</td><td>${boy.toFixed(0)}</td><td>${(adet*boy/1000).toFixed(2)}</td><td>Eksen ölçüsü − 2×Köşe Plastik</td></tr>`;
    });
    if(missingDim>0) frameRows += `<tr><td>Köşe Profili</td><td>${missingDim}</td><td>⚠</td><td>—</td><td>Modül ölçüleri eksik</td></tr>`;
    frameRows += `<tr><td>Köşe Plastiği (3 yönlü)</td><td>${8*N}</td><td>—</td><td>—</td><td>Modül başına 8</td></tr>`;
    frameEl.innerHTML = frameRows;
  }

  const {rows, missing} = collectTakviyeRows();
  // KAPAKLAR (SABİT) — tüm modüller, tip + ölçü bazında gruplu; Boğaz/Damper ayrı listede
  const gk = document.getElementById('global_kapak');
  const gbd = document.getElementById('global_bogazdamper');
  if(gk){
    const kmap = new Map();
    const bdMap = new Map();
    state.modules.forEach((md,m)=>{
      withModule(m, ()=>{
        FACE_DEFS.forEach((_,fi)=>{
          const rk = computeFace(fi);
          if(rk.kapaksiz) return;
          rk.colResults.forEach(c=>c.panels.forEach(p=>{
            if(p.bos) return;
            const w = p.sabitW!==null ? Math.round(p.sabitW) : 'ÖLÇÜ EKSİK';
            const h = p.sabitH!==null ? Math.round(p.sabitH) : 'ÖLÇÜ EKSİK';
            const key = p.type+'|'+w+'|'+h;
            const map = isEleman(p.type) ? bdMap : kmap;
            map.set(key, (map.get(key)||0)+1);
          }));
        });
      });
    });
    gk.innerHTML = [...kmap.entries()]
      .sort((a,b)=>a[0].localeCompare(b[0],'tr'))
      .map(([key,adet])=>{
        const kp = key.split('|');
        return `<tr><td>${kp[0]}</td><td>${kp[1]}</td><td>${kp[2]}</td><td>${adet}</td></tr>`;
      }).join('') || `<tr><td colspan=&quot;4&quot; style=&quot;color:var(--muted);&quot;>Henüz kapak tanımlanmadı</td></tr>`;
    if(gbd) gbd.innerHTML = [...bdMap.entries()]
      .sort((a,b)=>a[0].localeCompare(b[0],'tr'))
      .map(([key,adet])=>{
        const kp = key.split('|');
        return `<tr><td>${kp[0]}</td><td>${kp[1]}</td><td>${kp[2]}</td><td>${adet}</td></tr>`;
      }).join('') || `<tr><td colspan=&quot;4&quot; style=&quot;color:var(--muted);&quot;>Henüz boğaz/damper tanımlanmadı</td></tr>`;
  }

  const detail = document.getElementById('gsum_detail');
  const group = document.getElementById('gsum_group');
  const note = document.getElementById('gsum_note');
  if(!detail) return;
  render3D();

  if(rows.length===0){
    detail.innerHTML = '<tr><td colspan=&quot;5&quot;>Henüz takviye eklenmedi — görselde ara boşluklara tıklanarak eklenir</td></tr>';
    group.innerHTML = '<tr><td colspan=&quot;4&quot;>—</td></tr>';
    note.textContent = '';
    return;
  }

  detail.innerHTML = rows.map(x=>
    `<tr><td>${x.face}</td><td>${x.yon} ${x.tip}</td><td>${x.kaynak}</td><td>${x.adet}</td><td>${x.boy!==null?x.boy.toFixed(0):'⚠ ölçü eksik'}</td></tr>`
  ).join('');

  // Boya göre grupla (yalnızca boyu hesaplanabilenler)
  const map = new Map();
  let skipped = 0;
  rows.forEach(x=>{
    if(x.boy===null){ skipped += x.adet; return; }
    // Ana/Ara ayrımı korunur: profil kesiti aynı olsa da işleme farkı olabilir
    const key = x.tip+'|'+x.boy.toFixed(0);
    if(!map.has(key)) map.set(key, {tip:x.tip, boy:x.boy, adet:0});
    map.get(key).adet += x.adet;
  });
  const groups = [...map.values()].sort((a,b)=> a.tip.localeCompare(b.tip) || b.boy-a.boy);
  group.innerHTML = groups.map(g=>
    `<tr><td>${g.tip}</td><td>${g.boy.toFixed(0)}</td><td>${g.adet}</td><td>${(g.boy*g.adet/1000).toFixed(2)}</td></tr>`
  ).join('') || '<tr><td colspan=&quot;4&quot;>—</td></tr>';

  let noteTxt = 'Boylar otomatik türetilir: Ana Takviye = dik eksen − 2×Kenar − 2×Takviye Plastik (boydan boya) | Ara Takviye = bölüm ölçüsü − 2×Takviye Plastik (segment). Yön ekleri (yatay/dikey) sipariş listesinde birleştirilir; kesit aynıdır.';
  if(skipped>0) noteTxt = '⚠ '+skipped+' adet takviye eksik ölçü nedeniyle sipariş listesine dahil edilemedi. '+noteTxt;
  if(missing.length>0) noteTxt += ' Eksikler: '+[...new Set(missing)].join('; ')+'.';
  note.textContent = noteTxt;
}

  });
}
