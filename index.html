// ---------- 3B GÖRÜNÜM VERİSİ ----------
// Bu bölüm yalnızca geometri/veri üretir (faceLayoutRects, faceUVtoXYZ). Gerçek 3B render
// (kamera, ışık, derinlik testi, tıklama) sayfa sonundaki Three.js modülünde yapılır — bkz.
// <script type=&quot;module&quot;> bloğu. window.APP üzerinden bu fonksiyonlara erişir.
const EL3_DEPTH = 150; // Damper/Boğaz dışa çıkıntısı (mm) — yalnızca görsel
const PH3 = {W:800, H:1200, L:1400}; // ölçü girilmemişse temsili prizma

// Yüzün mm cinsinden hücre geometrisi (u: yüz yatayı, v: yüz dikeyi, sol-üst orijin)
function faceLayoutRects(fi){
  const r = computeFace(fi);
  const face = state.faces[fi];
  const V = r.V;
  const def = FACE_DEFS[fi];
  const FW = (Number(state.dims[def.wKey])||0) > 0 ? Number(state.dims[def.wKey]) : PH3[def.wKey];
  const FH = (Number(state.dims[def.hKey])||0) > 0 ? Number(state.dims[def.hKey]) : PH3[def.hKey];
  const k = V.kenar, tk = V.takviye;
  const kp = V.kose, tp3 = V.takviyePlastik;
  const PL3 = '#10161d';
  const contAra3 = face.cont==='ara' && r.contInfo && r.contInfo.valid;
  const CONT3 = '#547a96', SEG3 = '#3d5568';
  const colFill3 = contAra3 ? SEG3 : CONT3;
  const innerFill3 = contAra3 ? CONT3 : SEG3;
  const innerBarR = [], colBarR = [];   // sürekli yön en son eklenir (3B'de üstte)
  const bandsMm = [];
  const rects = [], labels = [];
  rects.push({u0:0,v0:0,u1:FW,v1:FH, fill:'#131d27'});
  rects.push({u0:0,v0:0,u1:FW,v1:k, fill:'#22303d'});
  rects.push({u0:0,v0:FH-k,u1:FW,v1:FH, fill:'#22303d'});
  rects.push({u0:0,v0:0,u1:k,v1:FH, fill:'#22303d'});
  rects.push({u0:FW-k,v0:0,u1:FW,v1:FH, fill:'#22303d'});
  // Köşe plastikleri (görsel) — profilde köşe plastiği yoksa çizilmez
  if(kp>0) [[0,0],[FW-kp,0],[0,FH-kp],[FW-kp,FH-kp]].forEach(cc=>{
    rects.push({u0:cc[0],v0:cc[1],u1:cc[0]+kp,v1:cc[1]+kp, fill:PL3});
  });
  if(face.kapaksiz){
    labels.push({u:FW/2, v:FH/2, text:'KAPAKSIZ'});
    return {FW,FH,rects,labels};
  }
  const orient = face.orient;
  const alongLen = orient==='H'?FW:FH, acrossLen = orient==='H'?FH:FW;
  const icAcross = acrossLen-2*k;
  const icKullAlong = alongLen-2*k-r.anaTakAdedi*tk;
  const colSizes = r.colResults.map(c=>c.colSize);
  const tot = colSizes.reduce((a,b)=>a+(b>0?b:0),0);
  const zc = colSizes.filter(x=>x<=0).length;
  const phCol = zc>0 ? Math.max((icKullAlong-tot)/zc, icKullAlong*0.1) : 0;
  let cur = k;
  r.colResults.forEach((cRes,ci)=>{
    const col = face.columns[ci];
    const colMm = cRes.colSize>0?cRes.colSize:phCol;
    const icCol = icAcross - cRes.innerTakAdedi*tk;
    const effs = cRes.panels.map(p=>p.auto?icCol:p.entered);
    const ptot = effs.reduce((a,b)=>a+(b>0?b:0),0);
    const pzc = effs.filter(x=>x<=0).length;
    const phP = pzc>0?Math.max((icCol-ptot)/pzc, icCol*0.12):0;
    let pc = k;
    cRes.panels.forEach((p,pi)=>{
      const pm = effs[pi]>0?effs[pi]:phP;
      const rc = orient==='H'
        ? {u0:cur, v0:pc, u1:cur+colMm, v1:pc+pm}
        : {u0:pc, v0:cur, u1:pc+pm, v1:cur+colMm};
      rc.fill = TYPE_COLORS[p.type]||'#34495e';
      if(p.eleman){ rc.eleman = true; rc.elType = p.type; rc.lbl = FACE_CODE[fi]+'-B'+(ci+1)+'K'+(pi+1); }
      if(p.bos) rc.bos = true;
      if(p.acilir) rc.acilir = true;
      rects.push(rc);
      if(p.type==='Camlı Açılır'){
        rects.push({circle:true, cu:(rc.u0+rc.u1)/2, cv:(rc.v0+rc.v1)/2,
          r: Math.min(GLASS_R_MM, Math.min(rc.u1-rc.u0, rc.v1-rc.v0)*0.42), fill:'rgba(127,200,220,0.30)'});
      }
      if(!p.eleman) labels.push({u:(rc.u0+rc.u1)/2, v:(rc.v0+rc.v1)/2, text: p.bos ? 'BOŞ' : FACE_CODE[fi]+'-B'+(ci+1)+'K'+(pi+1), size: `${Math.round(rc.u1-rc.u0)}×${Math.round(rc.v1-rc.v0)}`, type: p.type, bos: !!p.bos});
      pc += pm;
      if(pi<cRes.panels.length-1 && col.innerGaps[pi]){
        if(ci===0) bandsMm.push(pc);
        if(!contAra3){
          const tr = orient==='H'
            ? {u0:cur,v0:pc,u1:cur+colMm,v1:pc+tk}
            : {u0:pc,v0:cur,u1:pc+tk,v1:cur+colMm};
          tr.fill=innerFill3; innerBarR.push(tr);
          if(tp3>0){
            if(orient==='H'){
              innerBarR.push({u0:tr.u0,v0:tr.v0,u1:tr.u0+tp3,v1:tr.v1, fill:PL3});
              innerBarR.push({u0:tr.u1-tp3,v0:tr.v0,u1:tr.u1,v1:tr.v1, fill:PL3});
            } else {
              innerBarR.push({u0:tr.u0,v0:tr.v0,u1:tr.u1,v1:tr.v0+tp3, fill:PL3});
              innerBarR.push({u0:tr.u0,v0:tr.v1-tp3,u1:tr.u1,v1:tr.v1, fill:PL3});
            }
          }
        }
        pc+=tk;
      }
    });
    cur += colMm;
    if(ci<r.colResults.length-1 && face.colGaps[ci]){
      if(contAra3){
        // Segmentli: kesişimlerde bölünür, her segment ucunda plastik
        const aEnd = (orient==='H') ? FH-k : FW-k;
        let segStart = k;
        const bounds = [];
        bandsMm.forEach(b=>{ bounds.push([segStart,b]); segStart = b+tk; });
        bounds.push([segStart, aEnd]);
        bounds.forEach(bd=>{
          const s0=bd[0], s1=bd[1];
          if(s1-s0 < 1) return;
          const tr = orient==='H'
            ? {u0:cur,v0:s0,u1:cur+tk,v1:s1}
            : {u0:s0,v0:cur,u1:s1,v1:cur+tk};
          tr.fill=colFill3; colBarR.push(tr);
          if(tp3>0){
            if(orient==='H'){
              colBarR.push({u0:tr.u0,v0:s0,u1:tr.u1,v1:s0+tp3, fill:PL3});
              colBarR.push({u0:tr.u0,v0:s1-tp3,u1:tr.u1,v1:s1, fill:PL3});
            } else {
              colBarR.push({u0:s0,v0:tr.v0,u1:s0+tp3,v1:tr.v1, fill:PL3});
              colBarR.push({u0:s1-tp3,v0:tr.v0,u1:s1,v1:tr.v1, fill:PL3});
            }
          }
        });
      } else {
        const tr = orient==='H'
          ? {u0:cur,v0:k,u1:cur+tk,v1:FH-k}
          : {u0:k,v0:cur,u1:FW-k,v1:cur+tk};
        tr.fill=colFill3; colBarR.push(tr);
        if(tp3>0){
          if(orient==='H'){
            colBarR.push({u0:tr.u0,v0:tr.v0,u1:tr.u1,v1:tr.v0+tp3, fill:PL3});
            colBarR.push({u0:tr.u0,v0:tr.v1-tp3,u1:tr.u1,v1:tr.v1, fill:PL3});
          } else {
            colBarR.push({u0:tr.u0,v0:tr.v0,u1:tr.u0+tp3,v1:tr.v1, fill:PL3});
            colBarR.push({u0:tr.u1-tp3,v0:tr.v0,u1:tr.u1,v1:tr.v1, fill:PL3});
          }
        }
      }
      cur+=tk;
    }
  });
  if(contAra3){
    // Boydan boya sürekli ara takviyeler: tek parça, yalnız iki uçta plastik
    bandsMm.forEach(b=>{
      const tr = orient==='H'
        ? {u0:k,v0:b,u1:FW-k,v1:b+tk}
        : {u0:b,v0:k,u1:b+tk,v1:FH-k};
      tr.fill=innerFill3; innerBarR.push(tr);
      if(tp3>0){
        if(orient==='H'){
          innerBarR.push({u0:k,v0:b,u1:k+tp3,v1:b+tk, fill:PL3});
          innerBarR.push({u0:FW-k-tp3,v0:b,u1:FW-k,v1:b+tk, fill:PL3});
        } else {
          innerBarR.push({u0:b,v0:k,u1:b+tk,v1:k+tp3, fill:PL3});
          innerBarR.push({u0:b,v0:FH-k-tp3,u1:b+tk,v1:FH-k, fill:PL3});
        }
      }
    });
  }
  if(contAra3) rects.push(...colBarR, ...innerBarR);   // sürekli: bölüm içi (ara) üstte
  else rects.push(...innerBarR, ...colBarR);           // sürekli: bölümler arası (ana) üstte
  return {FW,FH,rects,labels};
}

// Yüz-yerel (u,v) → cihaz XYZ (X=L ekseni, Y=H ekseni, Z=W ekseni); dışarıdan bakış yönelimi
function faceUVtoXYZ(fi, u, v, L, H, W){
  switch(fi){
    case 0: return [u,   H-v, W  ];  // ÖN   (z=W)
    case 1: return [L-u, H-v, 0  ];  // ARKA (z=0)
    case 2: return [u,   H,   v  ];  // ÜST  (y=H)
    case 3: return [u,   0,   W-v];  // ALT  (y=0)
    case 4: return [0,   H-v, u  ];  // SOL  (x=0)
    case 5: return [L,   H-v, W-u];  // SAĞ  (x=L)
  }
}

// ---------- EXCEL DIŞA AKTARMA ----------
function svgToPng(svgString, w, h){
  return new Promise((resolve, reject)=>{
    // Bağımsız SVG görüntüsü katı XML ister: xmlns zorunlu, HTML entiteleri geçersiz
    let src = svgString.replace(/&amp;nbsp;/g, ' ');
    if(!/xmlns=/.test(src)) src = src.replace('<svg ', '<svg xmlns=&quot;http://www.w3.org/2000/svg&quot; ');
    const img = new Image();
    const blob = new Blob([src], {type:'image/svg+xml;charset=utf-8'});
    const url = URL.createObjectURL(blob);
    img.onload = ()=>{
      const canvas = document.createElement('canvas');
      canvas.width = w*2; canvas.height = h*2;   // 2× çözünürlük
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0,0,canvas.width,canvas.height);
      ctx.scale(2,2);
      ctx.drawImage(img,0,0);
      URL.revokeObjectURL(url);
      resolve(canvas.toDataURL('image/png'));
    };
    img.onerror = ()=>{ URL.revokeObjectURL(url); reject(new Error('SVG render hatası')); };
    img.src = url;
  });
}

// İki PNG data URL'ini (örn. SOL/SAĞ cephe) tek bir görselde yan yana birleştirir.
function combineSideBySide(dataUrlLeft, dataUrlRight){
  return new Promise((resolve, reject)=>{
    const imgL = new Image(), imgR = new Image();
    let loaded = 0;
    function done(){
      const canvas = document.createElement('canvas');
      canvas.width = imgL.width + imgR.width;
      canvas.height = Math.max(imgL.height, imgR.height);
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0,0,canvas.width,canvas.height);
      ctx.drawImage(imgL, 0, 0);
      ctx.drawImage(imgR, imgL.width, 0);
      resolve(canvas.toDataURL('image/png'));
    }
    function onErr(){ reject(new Error('Görsel birleştirme hatası')); }
    imgL.onload = ()=>{ loaded++; if(loaded===2) done(); };
    imgR.onload = ()=>{ loaded++; if(loaded===2) done(); };
    imgL.onerror = onErr; imgR.onerror = onErr;
    imgL.src = dataUrlLeft; imgR.src = dataUrlRight;
  });
}

        const cepheViews = [
          {label:'ÖN CEPHE',  yaw:0,        pitch:0},
          {label:'ARKA CEPHE',yaw:Math.PI,  pitch:0},
          {label:'ÜST CEPHE', yaw:0,        pitch: Math.PI/2},
          {label:'ALT CEPHE', yaw:0,        pitch:-Math.PI/2}
        ];
        for(const cv of cepheViews){
          wsO.rowBreaks.push({id: rr - 1, max: 16383, man: 1});
          try{
            const pngC = await window.capture3DView(cv.yaw, cv.pitch, 900, 560);
            const imgC = wb.addImage({base64: pngC, extension:'png'});
            const tC = wsO.getCell(rr,1); tC.value = '3B TOPLU MONTAJ — '+cv.label; tC.font = titleFont;
            wsO.addImage(imgC, {tl:{col:0, row:rr}, ext:{width:900, height:560}});
            rr += Math.ceil(560/20) + 2;
          }catch(err){
            const tC = wsO.getCell(rr,1); tC.value = '⚠ '+cv.label+' eklenemedi: '+err.message; tC.font = FONT;
            rr += 2;
          }
        }
        // SOL ve SAĞ CEPHE — iki ayrı görsel yerine tek görselde yan yana (SOL solda, SAĞ sağda)
        wsO.rowBreaks.push({id: rr - 1, max: 16383, man: 1});
        try{
          const pngSol = await window.capture3DView(-Math.PI/2, 0, 450, 560);
          const pngSag = await window.capture3DView(Math.PI/2, 0, 450, 560);
          const pngSS = await combineSideBySide(pngSol, pngSag);
          const imgSS = wb.addImage({base64: pngSS, extension:'png'});
          const tSS = wsO.getCell(rr,1); tSS.value = '3B TOPLU MONTAJ — SOL CEPHE / SAĞ CEPHE'; tSS.font = titleFont;
          wsO.addImage(imgSS, {tl:{col:0, row:rr}, ext:{width:900, height:560}});
          rr += Math.ceil(560/20) + 2;
        }catch(err){
          const tSS = wsO.getCell(rr,1); tSS.value = '⚠ SOL/SAĞ CEPHE eklenemedi: '+err.message; tSS.font = FONT;
          rr += 2;
        }
      }
    }

    // ---- MODÜL × YÜZ SAYFALARI ----
    for(let m=0; m<state.modules.length; m++){
      for(let fi=0; fi<FACE_DEFS.length; fi++){
        const r = withModule(m, ()=>computeFace(fi));
        const face = state.modules[m].faces[fi];
        const sheetName = 'M'+(m+1)+' '+FACE_DEFS[fi].name;
        const ws = wb.addWorksheet(sheetName);
        ws.columns = [{width:14},{width:20},{width:14},{width:16},{width:14},{width:14}];
        setDevFooter(ws);

        let row = addTable(ws, 1, sheetName+' — YÜZ BİLGİSİ', ['Alan','Değer'], [
          ['Modül', 'M'+(m+1)+' ('+(state.modules[m].L||'?')+'×'+(state.modules[m].H||'?')+'×'+(state.modules[m].W||'?')+' mm @ '+state.modules[m].pos.x+','+state.modules[m].pos.y+','+state.modules[m].pos.z+')'],
          ['Kullanılan eksenler', r.def.wKey+' × '+r.def.hKey],
          ['Çalışma ölçüleri (mm)', (r.faceW||'—')+' × '+(r.faceH||'—')],
          ['Yerleşim yönü', face.orient==='H'?'Soldan Sağa':'Yukarıdan Aşağıya'],
          ['Boydan boya takviye', face.cont==='ana'?'Dikey':'Yatay'+(r.contInfo && r.contInfo.requested && !r.contInfo.valid ? ' — UYGULANAMADI: '+r.contInfo.msg : '')],
          ['Kapaksız yüz', face.kapaksiz?'EVET':'HAYIR'],
          ['Bölüm / Kapak adedi', face.kapaksiz?'—':(face.columns.length+' / '+r.toplamKapak)],
          ['Durum', r.status.text]
        ]);

        if(!r.kapaksiz){
          row = addTable(ws, row, 'KESİM LİSTESİ — KAPAKLAR', ['Kapak','Tip','Genişlik (mm)','Yükseklik (mm)'], getSabitRows(r));
          row = addTable(ws, row, 'TAKVİYELER', ['Takviye','Adet','Boy (mm)','Kaynak'],
            r.takviyeRecords.map(t=>[t.yon+' '+t.tip, t.adet, t.boy!==null?Math.round(t.boy):'ÖLÇÜ EKSİK', t.kaynak]));
        }

        // Tablolar bitti — görsel yeni sayfada başlasın
        if (!ws.rowBreaks) ws.rowBreaks = [];
        ws.rowBreaks.push({id: row - 1, max: 16383, man: 1});

        try{
          const png = await svgToPng(withModule(m, ()=>drawFaceSVG(fi)), 880, 480);
          const imgId = wb.addImage({base64: png, extension:'png'});
          const t = ws.getCell(row,1); t.value = 'GÖRSEL YERLEŞİM'; t.font = titleFont;
          ws.addImage(imgId, {tl:{col:0, row:row}, ext:{width:880, height:480}});
        }catch(err){
          const t = ws.getCell(row,1); t.value = '⚠ Görsel eklenemedi: '+err.message; t.font = FONT;
        }
      }
    }

    const buf = await wb.xlsx.writeBuffer();
    const blob = new Blob([buf], {type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    const parts = [];
    if(state.proje.isNo) parts.push(sanitizeF(state.proje.isNo));
    if(_ahuLabel) parts.push(sanitizeF(_ahuLabel));
    parts.push('KAPAK_HESABI');
    if(parts.length===1) parts.push(new Date().toISOString().slice(0,10));
    a.download = parts.join('_')+'.xlsx';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(a.href), 5000);
    totalExported++;
  }catch(err){
    note.textContent = '⚠ Excel oluşturma hatası ('+ _ahuLabel +'): '+err.message;
  }
  } // end AHU loop
  state.activeAhu = origActiveAhu;
  if(totalExported > 0){
    note.textContent = ahuCount > 1
      ? '✓ '+ahuCount+' AHU için Excel dosyaları indirildi.'
      : '✓ Excel dosyası indirildi: 1 özet + '+(state.modules.length*6)+' modül-yüz sayfası.';
  }
}

  }catch(_){}

  // Görünüm sekmeleri
  function moveViewThumb(btn){

    thumb.style.transform = `translateX(${btnRect.left - barRect.left}px)`;
  }
  document.querySelectorAll('.vbtn').forEach(b=>b.addEventListener('click', ()=>{
    document.querySelectorAll('.vbtn').forEach(x=>x.classList.remove('active'));
    document.querySelectorAll('.view').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    document.getElementById('view-'+b.dataset.view).classList.add('active');
    moveViewThumb(b);
  }));
  moveViewThumb(document.querySelector('.vbtn.active'));
  window.addEventListener('resize', ()=>moveViewThumb(document.querySelector('.vbtn.active')));

  document.getElementById('prj_isno').addEventListener('input', e=>{ state.proje.isNo = e.target.value.trim(); });
  document.getElementById('prj_ad').addEventListener('input', e=>{
    state.ahus[state.activeAhu].ad = e.target.value;
    renderAhuTabs();
  });
  document.getElementById('prj_icsac').addEventListener('change', e=>{
    state.ahus[state.activeAhu].malzeme = e.target.value;
  });

  // Yeni / özel profil düzenleyicisi
  const pe = document.getElementById('profil_editor');
  document.getElementById('btn_newprofil').addEventListener('click', ()=>{
    const cur = String(state.varsayimlar.seri);
    const isCustom = PROFILES[cur] && !PROFILES[cur].builtin;
    document.getElementById('pe_ad').value = isCustom ? cur : '';
    if(PROFILES[cur]){
      document.getElementById('pe_kenar').value = PROFILES[cur].kenar;
      document.getElementById('pe_takviye').value = PROFILES[cur].takviye;
      document.getElementById('pe_kose').value = PROFILES[cur].kose;
      document.getElementById('pe_tp').value = PROFILES[cur].takviyePlastik;
      document.getElementById('pe_acilirek').value = PROFILES[cur].acilirEk!=null ? PROFILES[cur].acilirEk : 1;
    }
    document.getElementById('pe_sil').style.display = isCustom ? 'inline-block' : 'none';
    pe.style.display = pe.style.display==='none' ? 'block' : 'none';
  });
  document.getElementById('pe_iptal').addEventListener('click', ()=>{ pe.style.display='none'; });
  document.getElementById('pe_kaydet').addEventListener('click', ()=>{
    const ad = document.getElementById('pe_ad').value.trim();
    if(!ad){ document.getElementById('pe_ad').focus(); return; }
    if(PROFILES[ad] && PROFILES[ad].builtin){ alert('50 ve 60 gömülü profillerdir, üzerine yazılamaz. Farklı bir ad kullanın.'); return; }
    PROFILES[ad] = {
      kenar: Number(document.getElementById('pe_kenar').value)||0,
      takviye: Number(document.getElementById('pe_takviye').value)||0,
      kose: Number(document.getElementById('pe_kose').value)||0,
      takviyePlastik: Number(document.getElementById('pe_tp').value)||0,
      acilirEk: Number(document.getElementById('pe_acilirek').value)||0,
      builtin: false
    };
    saveCustomProfiles();
    state.varsayimlar.seri = ad;
    pe.style.display = 'none';
    renderAll();
  });
  document.getElementById('pe_sil').addEventListener('click', ()=>{
    const cur = String(state.varsayimlar.seri);
    if(PROFILES[cur] && !PROFILES[cur].builtin){
      delete PROFILES[cur];
      saveCustomProfiles();
      state.varsayimlar.seri = '60';
      pe.style.display = 'none';
      renderAll();
    }
  });

  document.getElementById('btn_addmod').addEventListener('click', ()=>{
    addModuleAt(state.active, 5); // SAĞ
    document.getElementById('dim_L').focus();
  });
  document.getElementById('modtabs').addEventListener('click', e=>{
    const del = e.target.closest('[data-moddel]');
    if(del){
      const i = Number(del.dataset.moddel);
      if(state.modules.length>1){
        const D = state.modules[i];
        // Boşluk kapatma: silinen modülün bağlanma ekseninde, aynı şeritteki modüller geri kayar
        const ax = D.attAxis || 'x';
        const dExt = modExt(D, ax);
        const eps = 0.5;
        const perp = ['x','y','z'].filter(a=>a!==ax);
        const inLane = B => perp.every(a=>{
          const bE = modExt(B,a), dE = modExt(D,a);
          return B.pos[a] < D.pos[a]+dE-eps && D.pos[a] < B.pos[a]+bE-eps;
        });
        if((D.attDir||1) > 0){
          const farPlane = D.pos[ax] + dExt;
          state.modules.forEach(B=>{ if(B!==D && B.pos[ax] >= farPlane-eps && inLane(B)) B.pos[ax] -= dExt; });
        } else {
          state.modules.forEach(B=>{
            const bExt = modExt(B, ax);
            if(B!==D && B.pos[ax]+bExt <= D.pos[ax]+eps && inLane(B)) B.pos[ax] += dExt;
          });
        }
        state.modules.splice(i,1);
        if(state.active>=state.modules.length) state.active = state.modules.length-1;
        renderAll();
      }
      e.stopPropagation(); return;
    }
    const tab = e.target.closest('[data-modtab]');
    if(tab){
      state.active = Number(tab.dataset.modtab);
      renderAll();
    }
  });
  // &quot;Görünümü Sıfırla&quot; butonu ve fare/tekerlek/tıkla-ekle etkileşimi artık sayfa sonundaki
  // Three.js modülünde (gerçek kamera + raycaster ile) yönetiliyor.
  ['dim_W','dim_H','dim_L'].forEach(id=>{
    document.getElementById(id).addEventListener('input', e=>{
      state.dims[id.split('_')[1]] = Number(e.target.value)||0;
      FACE_DEFS.forEach((_,i)=>renderFace(i));
    });
  });
  document.getElementById('seri').addEventListener('change', e=>{
    state.varsayimlar.seri = e.target.value; renderAll();
  });
  ['v_tolw','v_tolh'].forEach(id=>{
    document.getElementById(id).addEventListener('input', e=>{
      state.varsayimlar[id==='v_tolw'?'tolW':'tolH'] = Number(e.target.value)||0; renderAll();
    });
  });
  const PROFIELD = {v_kenar:'kenar', v_takviye:'takviye', v_kose:'kose', v_takviyeplastik:'takviyePlastik', v_acilirek:'acilirEk'};
  Object.keys(PROFIELD).forEach(id=>{
    document.getElementById(id).addEventListener('input', e=>{
      const seri = String(state.varsayimlar.seri);
      const prof = PROFILES[seri] || PROFILES['60'];
      prof[PROFIELD[id]] = Number(e.target.value)||0;
      saveCustomProfiles();
      renderAll();
    });
  });

  document.body.addEventListener('click', e=>{
    // [+ BÖLÜM]
    const addBtn = e.target.closest('.svg-addbtn');
    if(addBtn){
      const fi = Number(addBtn.dataset.addface);
      const face = state.faces[fi];
      face.columns.push(newColumn());
      syncStructure(face);
      face.selected = {col: face.columns.length-1, idx: 0};
      renderFace(fi);
      const inp = document.getElementById(`f${fi}_ed_colsize`);
      if(inp) inp.focus();
      return;
    }
    // Kapak ekle (aynı satıra)
    const addP = e.target.closest('.svg-addpanel');
    if(addP){
      const fi = Number(addP.dataset.face);
      const ci = Number(addP.dataset.col);
      const face = state.faces[fi];
      face.columns[ci].panels.push({size:0, type:&quot;Normal Panel&quot;});
      syncStructure(face);
      face.selected = {col: ci, idx: face.columns[ci].panels.length-1};
      renderFace(fi);
      const inp = document.getElementById(`f${fi}_ed_psize`);
      if(inp) inp.focus();
      return;
    }
    // Yeni satır ekle (V orient — soldaki küçük +)
    const addRow = e.target.closest('.svg-addrow');
    if(addRow){
      const fi = Number(addRow.dataset.face);
      const ci = Number(addRow.dataset.addrow);
      const face = state.faces[fi];
      face.columns.splice(ci + 1, 0, newColumn());
      syncStructure(face);
      face.selected = {col: ci + 1, idx: 0};
      renderFace(fi);
      const inp = document.getElementById(`f${fi}_ed_colsize`);
      if(inp) inp.focus();
      return;
    }
    // Yeni bölüm ekle (H orient — üstteki küçük +)
    const addCol = e.target.closest('.svg-addcol');
    if(addCol){
      const fi = Number(addCol.dataset.face);
      const ci = Number(addCol.dataset.addcol);
      const face = state.faces[fi];
      face.columns.splice(ci + 1, 0, newColumn());
      syncStructure(face);
      face.selected = {col: ci + 1, idx: 0};
      renderFace(fi);
      const inp = document.getElementById(`f${fi}_ed_colsize`);
      if(inp) inp.focus();
      return;
    }
    // Ana takviye toggle
    const gapG = e.target.closest('.svg-gap');
    if(gapG){
      const fi = Number(gapG.dataset.face);
      const gi = Number(gapG.dataset.gap);
      const face = state.faces[fi];
      face.colGaps[gi] = !face.colGaps[gi];
      renderFace(fi);
      return;
    }
    // Ara takviye toggle
    const inG = e.target.closest('.svg-innergap');
    if(inG){
      const fi = Number(inG.dataset.face);
      const gi = Number(inG.dataset.gap);
      const face = state.faces[fi];
      if(inG.dataset.col==='all'){
        // Boydan boya sürekli takviye: kaldırma tüm bölümlerde uygulanır (hizalama korunur)
        const cur = face.columns[0].innerGaps[gi];
        face.columns.forEach(c=>{ if(gi < c.innerGaps.length) c.innerGaps[gi] = !cur; });
      } else {
        const ci = Number(inG.dataset.col);
        face.columns[ci].innerGaps[gi] = !face.columns[ci].innerGaps[gi];
      }
      renderFace(fi);
      return;
    }
    // Panel seç
    const panelG = e.target.closest('.svg-panel');
    if(panelG){
      const fi = Number(panelG.dataset.face);
      const ci = Number(panelG.dataset.col);
      const pi = Number(panelG.dataset.panel);
      const face = state.faces[fi];
      const already = face.selected && face.selected.col===ci && face.selected.idx===pi;
      face.selected = already ? null : {col:ci, idx:pi};
      renderFace(fi);
      if(face.selected){
        const inp = document.getElementById(`f${fi}_ed_colsize`);
        if(inp) inp.focus();
      }
      return;
    }
    // Kapak sil
    const m = e.target.id && e.target.id.match(/^f(\d+)_ed_del$/);
    if(m){
      const fi = Number(m[1]);
      const face = state.faces[fi];
      if(!face.selected) return;
      const {col:ci, idx:pi} = face.selected;
      const col = face.columns[ci];
      if(col.panels.length>1){
        col.panels.splice(pi,1);
      } else if(face.columns.length>1){
        face.columns.splice(ci,1);
      } else return;
      syncStructure(face);
      face.selected = null;
      renderFace(fi);
      return;
    }
  });

  document.body.addEventListener('input', e=>{
    let m = e.target.id && e.target.id.match(/^f(\d+)_ed_colsize$/);
    if(m){
      const fi = Number(m[1]);
      const face = state.faces[fi];
      if(face.selected){
        const val = Number(e.target.value)||0;
        const col = face.columns[face.selected.col];
        if(face.orient === 'V'){
          // V modunda ed_colsize = satır yüksekliği (col.size); per-panel override kullanılmaz
          col.size = val;
          col.panels.forEach(pp => { pp.colSize = 0; });
        } else {
          // H modunda: bireysel kapak genişliği; col.size yeni kapaklar için varsayılan
          col.panels[face.selected.idx].colSize = val;
          col.size = val;
        }
        partialRender(fi);
      }
      return;
    }
    m = e.target.id && e.target.id.match(/^f(\d+)_ed_psize$/);
    if(m){
      const fi = Number(m[1]);
      const face = state.faces[fi];
      if(face.selected){
        face.columns[face.selected.col].panels[face.selected.idx].size = Number(e.target.value)||0;
        partialRender(fi);
      }
      return;
    }
  });

  document.body.addEventListener('change', e=>{
    let m = e.target.id && e.target.id.match(/^f(\d+)_ed_type$/);
    if(m){
      const fi = Number(m[1]);
      const face = state.faces[fi];
      if(face.selected){
        face.columns[face.selected.col].panels[face.selected.idx].type = e.target.value;
        syncStructure(face); // boğaz seçilirse bitişik ana takviyeler kalkar
        renderFace(fi);
      }
      return;
    }
    if(e.target.matches('[data-orientface]')){
      const fi = Number(e.target.dataset.orientface);
      const face = state.faces[fi];
      if(e.target.value !== face.orient){
        face.orient = e.target.value;
        face.selected = null;
        // Yönelim değişince tüm ölçüleri sıfırla — otomatik yerleşim devreye girsin
        face.columns.forEach(col => {
          col.size = 0;
          col.panels.forEach(p => { p.size = 0; p.colSize = 0; });
        });
      }
      renderFace(fi);
      return;
    }
    if(e.target.matches('[data-kapaksizface]')){
      const fi = Number(e.target.dataset.kapaksizface);
      state.faces[fi].kapaksiz = e.target.checked;
      state.faces[fi].selected = null;
      renderFace(fi);
      return;
    }
  });
}

function buildTabs(){
  const tabsEl = document.getElementById('tabs');
  const container = document.getElementById('faces-container');
  FACE_DEFS.forEach((def, idx)=>{
    const tab = document.createElement('div');
    tab.className = 'tab'+(idx===0?' active':'');
    tab.textContent = def.name;
    tab.addEventListener('click', ()=>{
      document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
      tab.classList.add('active');
      document.querySelectorAll('.face-panel').forEach(p=>p.style.display='none');
      document.getElementById('face-'+idx).style.display='block';
    });
    tabsEl.appendChild(tab);

    const panel = document.createElement('div');
    panel.id = 'face-'+idx;
    panel.className = 'face-panel';
    panel.style.display = idx===0?'block':'none';
    panel.innerHTML = buildFaceHTML(idx);
    container.appendChild(panel);
  });
}

function exportToDxf() {
  var proje = (state.proje.isNo || '').trim();
  var basePath = window.location.href.replace(/\/[^\/]*$/, '/');
  var dxfUrl = basePath + 'cenk%20panel/DXF%20URETME%20PROGRAMI.html';
  var multiAhu = state.ahus.length > 1;
  var origActiveAhu = state.activeAhu;
  var totalFound = 0;

  function openDxfTab(panels, bogazList, projeLabel, seri, autoGen){
    var obj = { seri: seri, proje: projeLabel, panels: panels };
    if(bogazList && bogazList.length > 0) obj.bogazList = bogazList;
    if(autoGen) obj.autoGenerate = true;
    if(window.parent !== window){
      window.parent.postMessage({ type: 'dxfExport', payload: obj }, '*');
      return;
    }
    var url = dxfUrl + '#kapak=' + encodeURIComponent(JSON.stringify(obj));
    var wnd = window.open(url, '_blank');
    if(!wnd) alert(panels.length+' panel hazırlandı ama tarayıcı popup\'ı engelledi.\nAdres çubuğunun yanındaki popup izni simgesine tıklayıp tekrar deneyin.');
  }

  // Tüm AHU'larda İç Sac seçili mi kontrol et
  var eksikMalzeme = [];
  state.ahus.forEach(function(ahu, ai) {
    if(!ahu.malzeme) eksikMalzeme.push(ahu.ad || ('AHU-'+(ai+1)));
  });
  if(eksikMalzeme.length > 0){
    alert('DXF üretilemiyor — aşağıdaki AHU\'lar için İç Sac tipi seçilmedi:\n• ' + eksikMalzeme.join('\n• ') + '\n\nProje Bilgisi bölümünden Galvaniz veya Paslanmaz seçin.');
    return;
  }

  // Tüm AHU'larda Profil Serisi seçili mi kontrol et
  var eksikProfil = [];
  state.ahus.forEach(function(ahu, ai) {
    if(!ahu.varsayimlar || !ahu.varsayimlar.seri) eksikProfil.push(ahu.ad || ('AHU-'+(ai+1)));
  });
  if(eksikProfil.length > 0){
    alert('DXF üretilemiyor — aşağıdaki AHU\'lar için Profil Serisi seçilmedi:\n• ' + eksikProfil.join('\n• ') + '\n\nProje Bilgisi bölümünden bir profil serisi seçin.');
    return;
  }

  state.ahus.forEach(function(ahu, ai) {
    state.activeAhu = ai;
    var seriBase = String(state.varsayimlar.seri || 60);
    var seri = seriBase + (ahu.malzeme === 'paslanmaz' ? 'P' : '');
    var ahuLabel = ahu.ad || ('AHU-' + (ai + 1));
    var projeLabel = proje ? proje + ' — ' + ahuLabel : ahuLabel;
    var mainPanels = [];
    var altUstPanels = [];

    state.modules.forEach(function(mod, mi) {
      withModule(mi, function() {
        FACE_DEFS.forEach(function(faceDef, fi) {
          var r = computeFace(fi);
          if (!r || r.kapaksiz) return;
          var isAltUst = (fi === 2 || fi === 3);
          (r.colResults || []).forEach(function(col, ci) {
            (col.panels || []).forEach(function(p, pi) {
              if (p.bos || p.eleman) return;
              var mapped = KAPAK_TO_HYT[p.type];
              if (!mapped) return;
              var sw = p.sabitW, sh = p.sabitH;
              if (!sw || !sh || sw <= 0 || sh <= 0) return;
              var B = Math.max(Math.round(sw), Math.round(sh));
              var K = Math.min(Math.round(sw), Math.round(sh));
              var ahuPfx = multiAhu ? ahuLabel.replace(/\s+/g,'') + '-' : '';
              var modPfx = state.modules.length > 1 ? 'M' + (mi + 1) + '-' : '';
              var faceShort = faceDef.name.replace(/\s+/g,'').substring(0, 3);
              var kod = ahuPfx + modPfx + faceShort + '-B' + (ci + 1) + 'K' + (pi + 1);
              var panelObj = { kalinlik: seri, tip: mapped.tip, B: B, K: K,
                cam: mapped.cam, bogazTip: mapped.bogazTip, kod: kod, adet: 1 };
              panelObj.grup = isAltUst ? 'ALTUST' : 'ANA';
              if(isAltUst) altUstPanels.push(panelObj);
              else mainPanels.push(panelObj);
            });
          });
        });
      });
    });

    var bogazDimMap = {};
    state.modules.forEach(function(mod, mi) {
      withModule(mi, function() {
        FACE_DEFS.forEach(function(faceDef, fi) {
          var r = computeFace(fi);
          if (!r || r.kapaksiz) return;
          (r.colResults || []).forEach(function(col) {
            (col.panels || []).forEach(function(p) {
              if (!p.eleman || p.type !== 'Boğaz') return;
              var sw = p.sabitW, sh = p.sabitH;
              if (!sw || !sh || sw <= 0 || sh <= 0) return;
              var key = Math.round(sw) + '|' + Math.round(sh);
              bogazDimMap[key] = (bogazDimMap[key] || 0) + 1;
            });
          });
        });
      });
    });
    var importedBogaz = Object.keys(bogazDimMap).map(function(k) {
      var pts = k.split('|');
      return { ybp: parseInt(pts[0]), dbp: parseInt(pts[1]), adet: bogazDimMap[k] };
    });

    var allPanels = mainPanels.concat(altUstPanels);
    if(allPanels.length > 0 || importedBogaz.length > 0){
      openDxfTab(allPanels, importedBogaz, projeLabel, seri, false);
      totalFound++;
    }
  });

  state.activeAhu = origActiveAhu;

  if(totalFound === 0){
    alert('DXF üretilecek panel veya boğaz bulunamadı.\nLütfen modül ölçülerini (W/H/L) girin ve yüzlere panel/boğaz ekleyin.\n\nNot: Damper, Tava ve Boş Alan tipleri DXFʼye aktarılmaz.');
  }
}

document.getElementById('btn_dxf').addEventListener('click', exportToDxf);

function saveProject(){
  const data = {
    version: 3,
    proje: state.proje,
    ahus: state.ahus,
    activeAhu: state.activeAhu
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  const fname = (state.proje.isNo || '').trim() || 'proje';
  a.download = fname.replace(/[/\\:*?&quot;<>|]/g,'_') + '.json';
  document.body.appendChild(a);
  a.click();
  setTimeout(()=>{ URL.revokeObjectURL(a.href); a.remove(); }, 1000);
}

function loadProject(file){
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e=>{
    try{
      const data = JSON.parse(e.target.result);
      if(data.version === 3 && Array.isArray(data.ahus)){
        // v3: çok-AHU formatı
        state.ahus = data.ahus;
        state.activeAhu = typeof data.activeAhu==='number' ? Math.min(data.activeAhu, data.ahus.length-1) : 0;
      } else if(Array.isArray(data.modules)){
        // v2: tek-AHU geriye uyumluluk
        const ahu = newAhu(1);
        ahu.modules = data.modules;
        ahu.active = typeof data.active==='number' ? Math.min(data.active, data.modules.length-1) : 0;
        if(data.varsayimlar) ahu.varsayimlar = data.varsayimlar;
        state.ahus = [ahu];
        state.activeAhu = 0;
      } else {
        alert('Geçersiz proje dosyası.');
        return;
      }
      if(data.proje) state.proje = data.proje;
      const isNoEl = document.getElementById('prj_isno');
      if(isNoEl) isNoEl.value = state.proje.isNo || '';
      renderAll(); // renderAll → renderAhuTabs → prj_ad synced to active AHU
    }catch(err){
      alert('Proje yüklenemedi: '+err.message);
    }
  };
  reader.readAsText(file);
}

// ---------- THREE.JS 3B MOTORU İÇİN KÖPRÜ ----------
// Sayfa sonundaki <script type=&quot;module&quot;> bu nesne üzerinden mevcut veri modeline
// ve fonksiyonlara erişir. Modüller (ES module) klasik <script> içindeki const/function
// tanımlarını doğrudan göremediğinden, ihtiyaç duyulan her şey burada açıkça köprülenir.
window.APP = {
  state, FACE_DEFS, TYPE_COLORS, ELEMAN_TYPES, isEleman,
  EL3_DEPTH, PH3, FACE_ATT, EXT_KEY, GLASS_R_MM,
  modExt, withModule, computeFace, faceLayoutRects, faceUVtoXYZ,
  faceMated, detectCollisions, addModuleAt
};
</script>

<script type=&quot;module&quot;>
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

// ============================================================================
// GERÇEK 3B RENDER MOTORU (Three.js / WebGL)
// ----------------------------------------------------------------------------
// Önceki sürüm elle yazılmış bir projeksiyon + &quot;ressam algoritması&quot; (painter's
// algorithm) kullanıyordu: nesneler uzaklığa göre sıralanıp sırayla çiziliyordu.
// Bu yaklaşım, bitişik/çıkıntılı geometrilerde (damper, boğaz, komşu modüller)
// yanlış üst-üste-binme hatalarına açıktı, çünkü gerçek bir derinlik testi
// (Z-Buffer) yoktu. Bu motor onun yerine GPU'nun donanımsal derinlik tamponunu
// kullanır: her piksel için &quot;kameraya en yakın yüzey&quot; otomatik ve kesin olarak
// belirlenir; çizim sırası artık görünürlüğü etkilemez.
// ============================================================================

function boot(){
  if(!window.APP){ setTimeout(boot, 30); return; }
  const APP = window.APP;
  const {
    state, FACE_DEFS, modExt, withModule, faceLayoutRects,
    faceUVtoXYZ, faceMated, detectCollisions, addModuleAt, EL3_DEPTH
  } = APP;

  const NORMALS = [[0,0,1],[0,0,-1],[0,1,0],[0,-1,0],[-1,0,0],[1,0,0]];
  const DARK_EDGE = 0x0a1118, COLL_EDGE = 0xd9534f;

  const container = document.getElementById('canvas3d');
  const warnEl = document.getElementById('coll_warn');
  const resetBtn = document.getElementById('v3_reset');
  if(!container) return;

  function containerSize(){
    // Sekme gizliyken (display:none) clientWidth 0 döner — 900x560 sabit oranına düş.
    const w = container.clientWidth || 900;
    const h = container.clientHeight || Math.round(w*560/900);
    return {w, h: h||560};
  }

  // ---------- Sahne / Kamera / Render ----------
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0xffffff);

  const camera = new THREE.OrthographicCamera(-1,1,1,-1, 1, 200000);

  const renderer = new THREE.WebGLRenderer({antialias:true, preserveDrawingBuffer:true});
  renderer.setPixelRatio(Math.min(window.devicePixelRatio||1, 2));
  container.innerHTML = '';
  container.appendChild(renderer.domElement);

  const labelRenderer = new CSS2DRenderer();
  Object.assign(labelRenderer.domElement.style, {position:'absolute', top:'0', left:'0', pointerEvents:'none'});
  container.appendChild(labelRenderer.domElement);

  // Not: ışıklandırma/gölgelendirme kasıtlı olarak kullanılmıyor — tüm malzemeler unlit
  // (MeshBasicMaterial). Bu hem titreme/pırpır sorununu ortadan kaldırır hem de her rengin
  // her açıdan birebir aynı, düz göründüğü bir teknik çizim görünümü verir.

  const controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.12;
  controls.screenSpacePanning = true;
  controls.minZoom = 0.22; controls.maxZoom = 6;
  controls.mouseButtons = { LEFT: THREE.MOUSE.ROTATE, MIDDLE: THREE.MOUSE.DOLLY, RIGHT: THREE.MOUSE.PAN };
  controls.touches = { ONE: THREE.TOUCH.ROTATE, TWO: THREE.TOUCH.DOLLY_PAN };

  const modelGroup = new THREE.Group();
  scene.add(modelGroup);

  let defaultCam = null;      // &quot;Görünümü Sıfırla&quot; için
  let faceHitMeshes = [];     // tıkla-ekle vuruş düzlemleri
  let solidMeshes = [];       // opak paneller/eklentiler — tıklama engelleme (occlusion) testi için
  let labelEntries = [];      // {obj, normal} — kamera açısına göre görünürlük güncellemesi için
  let modNameGroups = [];     // her modül için aday &quot;M#&quot; etiketleri — her karede en dönük yüzdeki gösterilir

  // ---------- Yardımcı: yüz düzleminde kutu parametreleri ----------
  // fi'nin normali doğrultusunda ('outward': yüzden dışa taşan | 'center': yüz düzleminde ortalanmış)
  // u0..v1 aralığını gerçek dünya (mm) kutusuna çevirir. Diğer 6 yüz için de aynı genel mantık
  // çalışır — yüze özel kod dallanmasına gerek yoktur.
  // Sıfır kalınlıklı düz yüzey: panel gibi &quot;ince kutu&quot; yerine gerçek bir düzlem kullanır.
  // Bir kutunun kendi ön/arka/yan yüzeyleri arasında büyük düz alanlarda oluşabilecek
  // z-fighting'i kökten ortadan kaldırır (kalınlık kavramı hiç yok). outward: yüz düzleminden
  // normal yönünde dışa doğru ofset (mm) — komşu geometriyle (çerçeve, vuruş düzlemi) net
  // ayrışma için.
  function facePlaneQuad(fi, u0,v0,u1,v1, L,H,W, pos, outward){
    const n = NORMALS[fi];
    const pts = [[u0,v0],[u1,v0],[u1,v1],[u0,v1]].map(([u,v])=>{
      const p = faceUVtoXYZ(fi,u,v,L,H,W);
      return new THREE.Vector3(p[0]+pos.x+n[0]*outward, p[1]+pos.y+n[1]*outward, p[2]+pos.z+n[2]*outward);
    });
    const geo = new THREE.BufferGeometry();
    const positions = new Float32Array(12);
    pts.forEach((p,i)=>{ positions[i*3]=p.x; positions[i*3+1]=p.y; positions[i*3+2]=p.z; });
    geo.setAttribute('position', new THREE.BufferAttribute(positions,3));
    geo.setIndex([0,1,2, 0,2,3]);
    return {geo, pts};
  }

  // 4 köşeden DOĞRUDAN kapalı bir dörtgen çerçeve çizer — EdgesGeometry'nin otomatik
  // köşegen algılamasına (sayısal hassasiyet nedeniyle yanlışlıkla &quot;kenar&quot; sayılıp görünür
  // bir çizgi/artefakt oluşturabilir) hiç gerek bırakmaz; sadece bilinen 4 gerçek kenar çizilir.
  function addQuadOutline(grp, pts, colorHex){
    const positions = new Float32Array(24); // 4 kenar × 2 nokta × 3 eksen
    const pairs = [[0,1],[1,2],[2,3],[3,0]];
    pairs.forEach(([a,b], i)=>{
      positions[i*6]   = pts[a].x; positions[i*6+1] = pts[a].y; positions[i*6+2] = pts[a].z;
      positions[i*6+3] = pts[b].x; positions[i*6+4] = pts[b].y; positions[i*6+5] = pts[b].z;
    });
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(positions,3));
    const ln = new THREE.LineSegments(geo, new THREE.LineBasicMaterial({color:colorHex, transparent:true, opacity:0.85}));
    grp.add(ln);
  }

  function facePlaneBox(fi, u0,v0,u1,v1, L,H,W, pos, depth, mode){
    const corners = [[u0,v0],[u1,v0],[u1,v1],[u0,v1]].map(([u,v])=>{
      const p = faceUVtoXYZ(fi,u,v,L,H,W);
      return [p[0]+pos.x, p[1]+pos.y, p[2]+pos.z];
    });
    let mn=[Infinity,Infinity,Infinity], mx=[-Infinity,-Infinity,-Infinity];
    corners.forEach(c=>{ for(let k=0;k<3;k++){ mn[k]=Math.min(mn[k],c[k]); mx[k]=Math.max(mx[k],c[k]); } });
    const n = NORMALS[fi];
    for(let k=0;k<3;k++){
      if(mx[k]-mn[k] > 1e-6) continue; // bu eksen yüzeyin genişliği/yüksekliği — dokunma
      if(mode==='outward'){
        if(n[k]>0) mx[k]+=depth; else mn[k]-=depth;
      } else {
        mn[k]-=depth/2; mx[k]+=depth/2;
      }
    }
    return {
      center: new THREE.Vector3((mn[0]+mx[0])/2, (mn[1]+mx[1])/2, (mn[2]+mx[2])/2),
      size:   new THREE.Vector3(Math.max(mx[0]-mn[0],0.02), Math.max(mx[1]-mn[1],0.02), Math.max(mx[2]-mn[2],0.02))
    };
  }

  function addBoxEdges(mesh, colorHex){
    const eg = new THREE.EdgesGeometry(mesh.geometry, 1);
    const ln = new THREE.LineSegments(eg, new THREE.LineBasicMaterial({color:colorHex, transparent:true, opacity:0.85}));
    mesh.add(ln);
  }

  // Silindir eksenini (varsayılan Y) verilen yüzey normaline hizalar
  function orientAlongNormal(mesh, n){
    const from = new THREE.Vector3(0,1,0);
    const to = new THREE.Vector3(n[0],n[1],n[2]).normalize();
    mesh.quaternion.copy(new THREE.Quaternion().setFromUnitVectors(from, to));
  }

  // lines: [{text, cls}] — hem CSS2D DOM görünümü hem de Excel'e aktarırken canvas'a elle
  // yeniden çizim için gereken yapılandırılmış veri burada birlikte tutulur (bkz. capture3DView).
  function makeLabel(lines, extraClass){
    const div = document.createElement('div');
    div.className = 'label3d' + (extraClass? ' '+extraClass : '');
    div.innerHTML = lines.map(l=>`<span class=&quot;${l.cls}&quot;>${l.text}</span>`).join('<br>');
    const obj = new CSS2DObject(div);
    obj.userData.lines = lines;
    return obj;
  }

  function addLabel(grp, lines, worldPos, faceNormal, extraClass){
    const label = makeLabel(lines, extraClass);
    label.position.copy(worldPos);
    grp.add(label);
    labelEntries.push({obj:label, normal:new THREE.Vector3(faceNormal[0],faceNormal[1],faceNormal[2])});
    return label;
  }

  // ---------- Bir modülün tüm geometrisini kur ----------
  function buildModule(m, collides){
    const md = state.modules[m];
    const L = modExt(md,'x'), H = modExt(md,'y'), W = modExt(md,'z');
    const pos = md.pos;
    const grp = new THREE.Group();
    grp.name = 'module'+m;

    // Gövde çerçevesi: normalde ÇİZİLMEZ (&quot;kenar&quot; panel katmanları zaten aynı görseli
    // sağlıyor — bu çizgi onlara ek, gereksiz bir tekrardı). Yalnızca modüller ÇAKIŞTIĞINDA
    // kırmızı bir uyarı çerçevesi olarak çizilir.
    if(collides){
      const frameGeo = new THREE.BoxGeometry(L,H,W);
      const frameLine = new THREE.LineSegments(new THREE.EdgesGeometry(frameGeo),
        new THREE.LineBasicMaterial({color: COLL_EDGE, linewidth: 2}));
      frameLine.position.set(pos.x+L/2, pos.y+H/2, pos.z+W/2);
      grp.add(frameLine);
      frameGeo.dispose();
    }

    const modNameCandidates = [];

    NORMALS.forEach((n, fi)=>{
      if(faceMated(m, fi)) return; // komşu modülle birleşen iç yüz — çizilmez
      const lay = withModule(m, ()=>faceLayoutRects(fi));

      // Modül adı için bu yüzde de bir aday etiket oluşturulur; hangisi gösterileceğine
      // (o anki kamera açısına göre hangi yüz en dönük duruyorsa) her karede karar verilir —
      // böylece modülün HERHANGİ bir yüzü görünürken adı da mutlaka görünür.
      {
        const dk = {L, H, W};
        const fw = dk[FACE_DEFS[fi].wKey], fh = dk[FACE_DEFS[fi].hKey];
        const p = faceUVtoXYZ(fi, fw/2, fh*0.09, L,H,W);
        const wp = new THREE.Vector3(p[0]+pos.x, p[1]+pos.y, p[2]+pos.z)
          .addScaledVector(new THREE.Vector3(n[0],n[1],n[2]), 14);
        const label = makeLabel([{text:`M${m+1}`, cls:'modname'}], 'modname');
        label.position.copy(wp);
        label.visible = false;
        grp.add(label);
        modNameCandidates.push({obj:label, normal:new THREE.Vector3(n[0],n[1],n[2])});
      }

      lay.rects.forEach((rc, idx)=>{
        if(rc.eleman) return; // damper/boğaz/tava ayrı işlenir (aşağıda)
        // faceLayoutRects, 2D SVG mantığıyla ÜST ÜSTE binen rect'ler üretir (arka plan → kenar
        // şeritleri → köşe plastikleri → gerçek paneller — dizideki SONRAKİ rect 2D'de otomatik
        // üstte görünürdü). 3B'de bunların hepsini AYNI derinlikte çizmek z-fighting'e yol açar;
        // bu yüzden dizideki sırayı gerçek derinliğe çeviriyoruz. Fark, GÖZLE FARK EDİLMEYECEK
        // kadar küçük tutulur (mm'nin onda biri) — z-fighting'i önlemeye yeter ama katmanlar
        // arasında görünür bir &quot;basamak/boşluk&quot; oluşturmaz.
        const outward = 1.2 + idx*0.12;
        if(rc.circle){
          // Camlı Açılır gözetleme camı — Yüz Düzenleme (2B) görünümüyle aynı renk/çerçeve:
          // açık mavi dolgu (rgba(150,215,235,.62)) + koyu mavi çerçeve (#2f8fae)
          const c3 = faceUVtoXYZ(fi, rc.cu, rc.cv, L,H,W);
          const rim = new THREE.Mesh(
            new THREE.CylinderGeometry(rc.r, rc.r, 15, 24),
            new THREE.MeshBasicMaterial({color:0x2f8fae, transparent:true, opacity:0.9})
          );
          const glass = new THREE.Mesh(
            new THREE.CylinderGeometry(rc.r*0.86, rc.r*0.86, 17, 24),
            new THREE.MeshBasicMaterial({color:0x96d7eb, transparent:true, opacity:0.62})
          );
          orientAlongNormal(rim, n);
          orientAlongNormal(glass, n);
          rim.position.set(c3[0]+pos.x+n[0]*(outward+0.9), c3[1]+pos.y+n[1]*(outward+0.9), c3[2]+pos.z+n[2]*(outward+0.9));
          glass.position.set(c3[0]+pos.x+n[0]*(outward+1), c3[1]+pos.y+n[1]*(outward+1), c3[2]+pos.z+n[2]*(outward+1));
          grp.add(rim); grp.add(glass);
          solidMeshes.push(rim); solidMeshes.push(glass);
          return;
        }
        const {geo:quadGeo, pts:quadPts} = facePlaneQuad(fi, rc.u0, rc.v0, rc.u1, rc.v1, L,H,W, pos, outward);
        const mesh = new THREE.Mesh(
          quadGeo,
          new THREE.MeshBasicMaterial({color: rc.fill, side:THREE.DoubleSide, transparent: !!rc.bos, opacity: rc.bos?0.55:1})
        );
        grp.add(mesh);
        // Arka plan ve köşe-plastiği dekoratif katmanlarına kenarlık çizilmez. Ama KENAR
        // şeridine (gerçek panellerle aynı şekilde) çizilir — bu, iki modül yan yana geldiğinde
        // her modülün kendi çerçevesini ayırt edilebilir kılan çizgidir.
        if(rc.fill!=='#131d27' && rc.fill!=='#10161d'){
          addQuadOutline(grp, quadPts, DARK_EDGE);
        }
        solidMeshes.push(mesh);
        // Açılır panel donanımı — Yüz Düzenleme (2B) görünümüyle aynı: 2 menteşe noktası
        // (u0 kenarı) + kapı kolu (u1 kenarı), gerçek panel yüzeyine oturan düz dörtgenler.
        if(rc.acilir){
          const uSpan = rc.u1-rc.u0, vSpan = rc.v1-rc.v0;
          const edgeOff = Math.min(15, uSpan*0.12);
          [0.3, 0.7].forEach(fv=>{
            const hv = rc.v0 + vSpan*fv;
            const c3h = faceUVtoXYZ(fi, rc.u0+edgeOff, hv, L,H,W);
            const dot = new THREE.Mesh(
              new THREE.CylinderGeometry(7,7,6,16),
              new THREE.MeshBasicMaterial({color:0x4fb8a8})
            );
            orientAlongNormal(dot, n);
            dot.position.set(c3h[0]+pos.x+n[0]*(outward+3), c3h[1]+pos.y+n[1]*(outward+3), c3h[2]+pos.z+n[2]*(outward+3));
            grp.add(dot);
            solidMeshes.push(dot);
          });
          const handleW = Math.min(9, uSpan*0.1), handleHalf = Math.min(22, vSpan*0.18);
          const hu1 = rc.u1-edgeOff-handleW/2, hu2 = rc.u1-edgeOff+handleW/2;
          const hv1 = rc.v0+vSpan*0.5-handleHalf, hv2 = rc.v0+vSpan*0.5+handleHalf;
          const bw = Math.max(handleW*0.22, 1.5);
          const handleRim = new THREE.Mesh(
            facePlaneQuad(fi, hu1-bw, hv1-bw, hu2+bw, hv2+bw, L,H,W, pos, outward+2.8).geo,
            new THREE.MeshBasicMaterial({color:0x4fb8a8, side:THREE.DoubleSide})
          );
          const handle = new THREE.Mesh(
            facePlaneQuad(fi, hu1, hv1, hu2, hv2, L,H,W, pos, outward+3).geo,
            new THREE.MeshBasicMaterial({color:0x14212b, side:THREE.DoubleSide})
          );
          grp.add(handleRim); grp.add(handle);
          solidMeshes.push(handleRim); solidMeshes.push(handle);
        }
      });

      // Etiketler: panel kodu + gerçek mm ölçüsü (KAPAKSIZ / BOŞ dahil)
      lay.labels.forEach(lb=>{
        const p = faceUVtoXYZ(fi, lb.u, lb.v, L,H,W);
        const wp = new THREE.Vector3(p[0]+pos.x, p[1]+pos.y, p[2]+pos.z)
          .addScaledVector(new THREE.Vector3(n[0],n[1],n[2]), 14);
        const isPanelCode = /-B\d/.test(lb.text);
        const txt = isPanelCode ? 'M'+(m+1)+'·'+lb.text : lb.text;
        const boscls = lb.bos ? ' bos' : '';
        const lines = [{text:txt, cls:'l1'+boscls}];
        if(lb.type) lines.push({text: lb.type.length>12 ? lb.type.slice(0,11)+'…' : lb.type, cls:'l3'+boscls});
        if(lb.size) lines.push({text:lb.size, cls:'l2'+boscls});
        addLabel(grp, lines, wp, n);
      });

      // Tıkla-modül-ekle: görünmez vuruş düzlemi — bu yüzün KENDİ tüm katmanlarının (arka plan,
      // kenar şeridi, gerçek panel, Tava) önünde durur ki panelin ortasına tıklamak da kenarına
      // tıklamak kadar kolay olsun. Yine de gerçekten önde duran BAŞKA bir modülün gövdesi
      // tarafından (ayrı raycaster hedefi olarak) doğru şekilde engellenmeye devam eder.
      const hitBox = facePlaneBox(fi, 0, 0, lay.FW, lay.FH, L,H,W, pos, 14, 'outward');
      const hitMesh = new THREE.Mesh(
        new THREE.BoxGeometry(hitBox.size.x, hitBox.size.y, hitBox.size.z),
        new THREE.MeshBasicMaterial({color:0x4fb8a8, transparent:true, opacity:0, side:THREE.FrontSide, depthWrite:false, depthTest:false})
      );
      hitMesh.position.copy(hitBox.center);
      hitMesh.userData = {faceHit:true, m, fi};
      grp.add(hitMesh);
      faceHitMeshes.push(hitMesh);

      // Damper / Boğaz / Tava — kendi eklerini kur
      lay.rects.filter(rc=>rc.eleman).forEach(rc=>{
        buildElemanMesh(grp, fi, rc, L,H,W, pos, n, m);
      });
    });

    if(modNameCandidates.length) modNameGroups.push(modNameCandidates);

    return grp;
  }

  // Damper: metal kanat gövdesi + kırmızı conta şeridi (150mm dışa çıkıntı)
  // Boğaz : flanş kutusu + koyu kanal açıklığı (150mm dışa çıkıntı)
  // Tava  : çıkıntısız düz panel + küçük tahliye deliği
  function buildElemanMesh(grp, fi, rc, L,H,W, pos, n, m){
    const isDamper = rc.elType==='Damper';
    const isTava = rc.elType==='Tava';
    const nrm = new THREE.Vector3(n[0],n[1],n[2]);

    if(isTava){
      const {geo:quadGeo, pts:quadPts} = facePlaneQuad(fi, rc.u0, rc.v0, rc.u1, rc.v1, L,H,W, pos, 9);
      const mesh = new THREE.Mesh(quadGeo,
        new THREE.MeshBasicMaterial({color:0x111315, side:THREE.DoubleSide, polygonOffset:true, polygonOffsetFactor:2, polygonOffsetUnits:2}));
      grp.add(mesh);
      addQuadOutline(grp, quadPts, DARK_EDGE);
      solidMeshes.push(mesh);

      // tahliye deliği (u/v dünya mm ile 1:1 olduğundan holeR doğrudan yarıçaptır)
      const holeU = (rc.u0+rc.u1)/2, holeV = rc.v0+(rc.v1-rc.v0)*0.72;
      const holeR = Math.max(Math.min(rc.u1-rc.u0, rc.v1-rc.v0)*0.09, 3);
      const hc3 = faceUVtoXYZ(fi, holeU, holeV, L,H,W);
      const hole = new THREE.Mesh(new THREE.CylinderGeometry(holeR, holeR, 6, 20),
        new THREE.MeshBasicMaterial({color:0x05080c}));
      orientAlongNormal(hole, n);
      hole.position.set(hc3[0]+pos.x, hc3[1]+pos.y, hc3[2]+pos.z);
      hole.position.addScaledVector(nrm, 10.5);
      grp.add(hole);

      const centerTava = faceUVtoXYZ(fi, (rc.u0+rc.u1)/2, (rc.v0+rc.v1)/2, L,H,W);
      const labelPos = new THREE.Vector3(centerTava[0]+pos.x, centerTava[1]+pos.y, centerTava[2]+pos.z)
        .addScaledVector(nrm, 12);
      addElemanLabel(grp, rc, m, labelPos, n);
      return;
    }

    // Damper / Boğaz: 150mm dışa çıkıntılı İÇİ BOŞ ÇERÇEVE (dolu kutu değil — aksi halde
    // ön yüzü, içine konacak kanatları/kanalı tamamen gizler; tıpkı orijinal 2D SVG'deki
    // gibi burada da sadece kenar çerçevesi katı, orta kısım açık bırakılır).
    const bodyColor = isDamper ? 0x4b5158 : 0x5c3a1e;
    const frameMat = new THREE.MeshBasicMaterial({color:bodyColor, polygonOffset:true, polygonOffsetFactor:2, polygonOffsetUnits:2});
    const frameT = Math.max(Math.min(rc.u1-rc.u0, rc.v1-rc.v0) * 0.09, 14);
    const uMid0 = rc.u0+frameT, uMid1 = rc.u1-frameT, vMid0 = rc.v0+frameT, vMid1 = rc.v1-frameT;
    const frameStrips = [
      [uMid0, rc.v0, uMid1, rc.v0+frameT],   // üst (orta genişlik — köşeler sol/sağ şeride ait)
      [uMid0, rc.v1-frameT, uMid1, rc.v1],   // alt
      [rc.u0, rc.v0, rc.u0+frameT, rc.v1],   // sol (tam yükseklik)
      [rc.u1-frameT, rc.v0, rc.u1, rc.v1]    // sağ (tam yükseklik)
    ];
    frameStrips.forEach(([su0,sv0,su1,sv1])=>{
      const sbox = facePlaneBox(fi, su0,sv0,su1,sv1, L,H,W, pos, EL3_DEPTH, 'outward');
      const smesh = new THREE.Mesh(new THREE.BoxGeometry(sbox.size.x, sbox.size.y, sbox.size.z), frameMat);
      smesh.position.copy(sbox.center);
      grp.add(smesh);
      addBoxEdges(smesh, DARK_EDGE);
      solidMeshes.push(smesh);
    });

    if(isDamper){
      // Kanatlar: çerçeve açıklığı içinde v ekseni boyunca dizilmiş yatay bloklar + her
      // kanadın dış (kameraya en yakın) kenarında ince kırmızı conta şeridi — referans görsele göre.
      const nSlat = Math.max(3, Math.min(7, Math.round((vMid1-vMid0)/140)));
      for(let i=0;i<nSlat;i++){
        const t0 = i/nSlat, t1 = (i+0.86)/nSlat; // aralarda küçük boşluk
        const bv0 = vMid0 + (vMid1-vMid0)*t0, bv1 = vMid0 + (vMid1-vMid0)*t1;
        const bladeBox = facePlaneBox(fi, uMid0, bv0, uMid1, bv1, L,H,W, pos, EL3_DEPTH*0.86, 'outward');
        const blade = new THREE.Mesh(new THREE.BoxGeometry(bladeBox.size.x, bladeBox.size.y, bladeBox.size.z),
          new THREE.MeshBasicMaterial({color:0xaeb4ba}));
        blade.position.copy(bladeBox.center);
        grp.add(blade);
        solidMeshes.push(blade);

        const sealBox = facePlaneBox(fi, uMid0, bv0+(bv1-bv0)*0.78, uMid1, bv1, L,H,W, pos, EL3_DEPTH*0.88, 'outward');
        const seal = new THREE.Mesh(new THREE.BoxGeometry(sealBox.size.x, sealBox.size.y, sealBox.size.z),
          new THREE.MeshBasicMaterial({color:0xc1272d}));
        seal.position.copy(sealBox.center);
        grp.add(seal);
        solidMeshes.push(seal);
      }
    } else {
      // Boğaz: çerçeve açıklığı içinde, hafif geride (içeri çekilmiş) koyu kanal yüzeyi
      const innerBox = facePlaneBox(fi, uMid0, vMid0, uMid1, vMid1, L,H,W, pos, EL3_DEPTH*0.65, 'outward');
      const inner = new THREE.Mesh(new THREE.BoxGeometry(innerBox.size.x, innerBox.size.y, innerBox.size.z),
        new THREE.MeshBasicMaterial({color:0x05080c}));
      inner.position.copy(innerBox.center);
      grp.add(inner);
      solidMeshes.push(inner);
    }

    const centerP = faceUVtoXYZ(fi, (rc.u0+rc.u1)/2, (rc.v0+rc.v1)/2, L,H,W);
    const labelPos = new THREE.Vector3(centerP[0]+pos.x, centerP[1]+pos.y, centerP[2]+pos.z)
      .addScaledVector(nrm, EL3_DEPTH*0.95);
    addElemanLabel(grp, rc, m, labelPos, n);
  }

  function addElemanLabel(grp, rc, m, worldPos, n){
    const lines = [
      {text:`M${m+1}·${rc.lbl} — ${rc.elType}`, cls:'l1'},
      {text:`${Math.round(rc.u1-rc.u0)}×${Math.round(rc.v1-rc.v0)}`, cls:'l2'}
    ];
    addLabel(grp, lines, worldPos, n);
  }

  // ---------- Sahneyi tamamen yeniden kur ----------
  function disposeGroup(g){
    g.traverse(obj=>{
      if(obj.geometry) obj.geometry.dispose();
      if(obj.material){
        if(Array.isArray(obj.material)) obj.material.forEach(mm=>mm.dispose());
        else obj.material.dispose();
      }
      if(obj.isCSS2DObject && obj.element && obj.element.parentNode){
        obj.element.parentNode.removeChild(obj.element);
      }
    });
  }

  function rebuildScene(){
    disposeGroup(modelGroup);
    while(modelGroup.children.length) modelGroup.remove(modelGroup.children[0]);
    faceHitMeshes = []; solidMeshes = []; labelEntries = []; modNameGroups = [];

    const pairs = detectCollisions();
    const collSet = new Set(pairs.flat());
    state.modules.forEach((md, m)=>{
      modelGroup.add(buildModule(m, collSet.has(m)));
    });

    // Sınır kutusu → kamera hedefi ve mesafesi
    const box = new THREE.Box3().setFromObject(modelGroup);
    const sphere = new THREE.Sphere();
    box.getBoundingSphere(sphere);
    const center = sphere.center.clone();
    const radius = Math.max(sphere.radius, 200);

    const {w, h} = containerSize();
    const aspect = w/h;
    const fitR = radius * 1.15;
    camera.left = -fitR*aspect; camera.right = fitR*aspect;
    camera.top = fitR; camera.bottom = -fitR;
    camera.near = Math.max(radius*0.1, 1); camera.far = radius*8;

    if(!defaultCam){
      const dist = radius*3;
      const dir = new THREE.Vector3(Math.sin(-0.55)*Math.cos(0.42), Math.sin(0.42), Math.cos(-0.55)*Math.cos(0.42));
      const camPos = center.clone().addScaledVector(dir, dist);
      defaultCam = {pos:camPos.clone(), target:center.clone(), zoom:1};
      camera.position.copy(camPos);
      camera.zoom = 1;
      controls.target.copy(center);
    } else {
      // Mevcut bakış yönünü koru, sadece hedef merkezi güncelle
      const offset = camera.position.clone().sub(controls.target);
      controls.target.copy(center);
      camera.position.copy(center.clone().add(offset));
    }
    camera.updateProjectionMatrix();
    controls.update();

    updateCollisionWarning(pairs);
  }

  function updateCollisionWarning(pairs){
    if(!warnEl) return;
    if(pairs.length){
      warnEl.style.display = 'block';
      warnEl.textContent = '⚠ ÇAKIŞMA: ' + pairs.map(p=>'M'+(p[0]+1)+' ↔ M'+(p[1]+1)).join(', ')
        + ' — modüller iç içe geçiyor. Kırmızı çerçeveli modüllerin ölçülerini düzeltin; kesim listeleri çakışmayı bilmez, çıktı bu haliyle güvenilmez.';
    } else warnEl.style.display = 'none';
  }

  // ---------- Boyutlandırma ----------
  function resize(){
    const {w, h} = containerSize();
    renderer.setSize(w, h, false);
    labelRenderer.setSize(w, h);
    const aspect = w/h;
    const r = (camera.top - camera.bottom)/2;
    camera.left = -r*aspect; camera.right = r*aspect;
    camera.updateProjectionMatrix();
  }
  new ResizeObserver(resize).observe(container);

  // ---------- Tıkla → modül ekle (Raycaster, engel-farkında) ----------
  // Vuruş düzlemleriyle BİRLİKTE opak panel/eklenti gövdeleri de ışın testine dahil edilir;
  // böylece önünde başka bir modülün gövdesi varsa (kameraya daha yakınsa) tıklama o modüle
  // çarpar ve arkadaki yüz — doğru şekilde — tıklanabilir sayılmaz.
  const raycaster = new THREE.Raycaster();
  const pointerNDC = new THREE.Vector2();
  let downPt = null, moved = false;

  function updateNDC(e){
    const rect = renderer.domElement.getBoundingClientRect();
    pointerNDC.x = ((e.clientX-rect.left)/rect.width)*2-1;
    pointerNDC.y = -((e.clientY-rect.top)/rect.height)*2+1;
  }
  function castTargets(){ return [...faceHitMeshes, ...solidMeshes]; }

  renderer.domElement.addEventListener('pointerdown', e=>{
    downPt = {x:e.clientX, y:e.clientY}; moved = false;
  });
  renderer.domElement.addEventListener('pointermove', e=>{
    if(downPt){
      const dx=e.clientX-downPt.x, dy=e.clientY-downPt.y;
      if(Math.abs(dx)+Math.abs(dy) > 4) moved = true;
      return; // sürükleme/döndürme sırasında hover vurgusu için ışın taraması yapma
    }
    updateNDC(e);
    raycaster.setFromCamera(pointerNDC, camera);
    const hits = raycaster.intersectObjects(castTargets(), false);
    faceHitMeshes.forEach(hm=>{ hm.material.opacity = 0; });
    if(hits.length && hits[0].object.userData.faceHit) hits[0].object.material.opacity = 0.16;
  });
  renderer.domElement.addEventListener('pointerup', e=>{
    if(downPt && !moved){
      updateNDC(e);
      raycaster.setFromCamera(pointerNDC, camera);
      const hits = raycaster.intersectObjects(castTargets(), false);
      if(hits.length && hits[0].object.userData.faceHit){
        const {m, fi} = hits[0].object.userData;
        addModuleAt(m, fi); // renderAll() → render3D() zinciriyle sahne otomatik güncellenir
      }
    }
    downPt = null; moved = false;
  });

  if(resetBtn){
    resetBtn.addEventListener('click', ()=>{
      if(!defaultCam) return;
      camera.position.copy(defaultCam.pos);
      controls.target.copy(defaultCam.target);
      camera.zoom = defaultCam.zoom;
      camera.updateProjectionMatrix();
      controls.update();
    });
  }

  // ---------- Render döngüsü ----------
  const camDir = new THREE.Vector3();
  function updateLabelVisibility(){
    camera.getWorldDirection(camDir);
    labelEntries.forEach(({obj,normal})=>{ obj.visible = normal.dot(camDir) < -0.05; });
    // Modül adı: her modülde, o anki kamera açısına göre en dönük duran yüzdeki aday
    // gösterilir, diğerleri gizlenir — modülün herhangi bir yüzü görünürken adı da görünür.
    modNameGroups.forEach(group=>{
      let best = null, bestDot = -0.05;
      group.forEach(({obj,normal})=>{
        const d = normal.dot(camDir);
        obj.visible = false;
        if(d < bestDot){ bestDot = d; best = obj; }
      });
      if(best) best.visible = true;
    });
  }
  renderer.setAnimationLoop(()=>{
    controls.update();
    // Etiket görünürlüğü: yalnızca kameraya dönük yüzeylerin etiketleri gösterilir —
    // aksi halde CSS2D metni, derinlik testine girmediği için katı geometrinin arkasından sızar.
    updateLabelVisibility();
    renderer.render(scene, camera);
    labelRenderer.render(scene, camera);
  });

  // ---------- Dışa aktarım: sabit açıdan / mevcut açıdan PNG yakala ----------
  window.capture3DView = function(yaw, pitch, w, h){
    return new Promise((resolve, reject)=>{
      try{
        const savedPos = camera.position.clone();
        const savedTarget = controls.target.clone();
        const savedZoom = camera.zoom;
        const savedCamL=camera.left, savedCamR=camera.right, savedCamT=camera.top, savedCamB=camera.bottom;
        const savedUp = camera.up.clone();

        const box = new THREE.Box3().setFromObject(modelGroup);
        const sphere = new THREE.Sphere();
        box.getBoundingSphere(sphere);
        const center = sphere.center.clone();
        const radius = Math.max(sphere.radius, 200);

        if(yaw!==null && pitch!==null){
          const dir = new THREE.Vector3(Math.sin(yaw)*Math.cos(pitch), Math.sin(pitch), Math.cos(yaw)*Math.cos(pitch));
          camera.position.copy(center.clone().addScaledVector(dir, radius*3));
          controls.target.copy(center);
          camera.zoom = 1;
          // Üst/Alt görünümde up vektörü bakış yönüyle çakışır → dejenere matris; Z eksenini kullan
          if(Math.abs(pitch) > Math.PI/2 - 0.01){
            camera.up.set(0, 0, pitch > 0 ? -1 : 1);
          } else {
            camera.up.set(0, 1, 0);
          }
          camera.lookAt(center);
        }
        // Sıkı fit: Box3 köşelerini view uzayına dönüştür, gerçek sınırı hesapla
        camera.updateMatrixWorld();
        const viewMat = camera.matrixWorldInverse;
        const corners3D = [
          new THREE.Vector3(box.min.x,box.min.y,box.min.z),
          new THREE.Vector3(box.max.x,box.min.y,box.min.z),
          new THREE.Vector3(box.min.x,box.max.y,box.min.z),
          new THREE.Vector3(box.max.x,box.max.y,box.min.z),
          new THREE.Vector3(box.min.x,box.min.y,box.max.z),
          new THREE.Vector3(box.max.x,box.min.y,box.max.z),
          new THREE.Vector3(box.min.x,box.max.y,box.max.z),
          new THREE.Vector3(box.max.x,box.max.y,box.max.z)
        ];
        let vMinX=Infinity,vMaxX=-Infinity,vMinY=Infinity,vMaxY=-Infinity;
        corners3D.forEach(c=>{
          c.applyMatrix4(viewMat);
          if(c.x<vMinX)vMinX=c.x; if(c.x>vMaxX)vMaxX=c.x;
          if(c.y<vMinY)vMinY=c.y; if(c.y>vMaxY)vMaxY=c.y;
        });
        const aspect = w/h;
        const hrX=(vMaxX-vMinX)/2, hrY=(vMaxY-vMinY)/2;
        // Sabit cephe görünümlerinde modül genişlik/yükseklik etiketleri kutunun hemen
        // dışına taşar — kırpılmasınlar diye bu görünümlerde çerçeveye ekstra pay bırakılır.
        // Dar (örn. SOL/SAĞ birleştirmesi için yarı genişlikte alınan) görünümlerde aynı
        // mutlak metin genişliği orantılı olarak daha fazla yer kapladığından pay artırılır.
        const fitMargin = (yaw!==null && pitch!==null) ? (w<600 ? 1.30 : 1.16) : 1.04;
        let halfW,halfH;
        if(hrX/Math.max(hrY,0.001)>aspect){ halfW=hrX*fitMargin; halfH=halfW/aspect; }
        else{ halfH=hrY*fitMargin; halfW=halfH*aspect; }
        halfW=Math.max(halfW,1); halfH=Math.max(halfH,1);
        const cxFit=(vMinX+vMaxX)/2, cyFit=(vMinY+vMaxY)/2;
        camera.left=cxFit-halfW; camera.right=cxFit+halfW;
        camera.top=cyFit+halfH; camera.bottom=cyFit-halfH;
        camera.updateProjectionMatrix();
        controls.update();

        const prevPR = renderer.getPixelRatio();
        renderer.setPixelRatio(1);
        renderer.setSize(w*2, h*2, false);
        updateLabelVisibility();
        renderer.render(scene, camera);

        // CSS2DRenderer etiketleri gerçek DOM elemanlarıdır — WebGL canvas'ının pikseline dahil
        // değildir, bu yüzden toDataURL() onları hiç yakalamaz. Görünür etiketleri burada elle,
        // 2B canvas metni olarak WebGL görüntüsünün üstüne besteliyoruz (composite).
        const outCanvas = document.createElement('canvas');
        outCanvas.width = w*2; outCanvas.height = h*2;
        const ctx = outCanvas.getContext('2d');
        ctx.drawImage(renderer.domElement, 0, 0);

        // Modül genişlik/yükseklik ölçü etiketleri — yalnızca sabit cephe görünümlerinde
        // (yaw/pitch verilmişse) anlamlı; serbest açıda &quot;genişlik altta/üstte&quot; gibi bir
        // yön tanımlanamaz. Komşu modülün izdüşümü bitişikse (başka modül doluysa) metin
        // karşı tarafa kaydırılır; genişlikte hem üst hem alt, yükseklikte hem sol hem sağ
        // doluysa o ölçü hiç yazılmaz.
        if(yaw!==null && pitch!==null && state.modules.length){
          const isTopBottom = Math.abs(Math.abs(pitch) - Math.PI/2) < 0.01;
          const isSide = Math.abs(pitch) < 0.01 && Math.abs(Math.abs(yaw) - Math.PI/2) < 0.01;
          const wAxis = isTopBottom ? 'x' : (isSide ? 'z' : 'x');
          const hAxis = isTopBottom ? 'z' : 'y';
          const modBoxes = [];
          state.modules.forEach((md, mi)=>{
            const grp = modelGroup.children.find(c=>c.name==='module'+mi);
            if(!grp) return;
            const mbox = new THREE.Box3().setFromObject(grp);
            if(mbox.isEmpty()) return;
            const corners = [
              [mbox.min.x,mbox.min.y,mbox.min.z],[mbox.max.x,mbox.min.y,mbox.min.z],
              [mbox.min.x,mbox.max.y,mbox.min.z],[mbox.max.x,mbox.max.y,mbox.min.z],
              [mbox.min.x,mbox.min.y,mbox.max.z],[mbox.max.x,mbox.min.y,mbox.max.z],
              [mbox.min.x,mbox.max.y,mbox.max.z],[mbox.max.x,mbox.max.y,mbox.max.z]
            ];
            let sMinX=Infinity,sMaxX=-Infinity,sMinY=Infinity,sMaxY=-Infinity;
            corners.forEach(c=>{
              const p = new THREE.Vector3(c[0],c[1],c[2]).project(camera);
              const sx=(p.x*0.5+0.5)*w*2, sy=(-p.y*0.5+0.5)*h*2;
              if(sx<sMinX)sMinX=sx; if(sx>sMaxX)sMaxX=sx;
              if(sy<sMinY)sMinY=sy; if(sy>sMaxY)sMaxY=sy;
            });
            modBoxes.push({mi, sMinX, sMaxX, sMinY, sMaxY, wVal: modExt(md, wAxis), hVal: modExt(md, hAxis)});
          });
          const overlap1D = (aMin,aMax,bMin,bMax)=> Math.min(aMax,bMax) - Math.max(aMin,bMin);
          const NEI_TOL = 8;
          const hasNeighbor = (me, dir)=> modBoxes.some(n=>{
            if(n===me) return false;
            if(dir==='below') return Math.abs(n.sMinY - me.sMaxY) < NEI_TOL && overlap1D(n.sMinX,n.sMaxX,me.sMinX,me.sMaxX) > 4;
            if(dir==='above') return Math.abs(n.sMaxY - me.sMinY) < NEI_TOL && overlap1D(n.sMinX,n.sMaxX,me.sMinX,me.sMaxX) > 4;
            if(dir==='left')  return Math.abs(n.sMaxX - me.sMinX) < NEI_TOL && overlap1D(n.sMinY,n.sMaxY,me.sMinY,me.sMaxY) > 4;
            if(dir==='right') return Math.abs(n.sMinX - me.sMaxX) < NEI_TOL && overlap1D(n.sMinY,n.sMaxY,me.sMinY,me.sMaxY) > 4;
            return false;
          });
          ctx.font = '600 20px Inter, Arial, sans-serif';
          ctx.shadowColor = 'rgba(255,255,255,0.85)';
          ctx.shadowBlur = 3;
          ctx.fillStyle = '#000000';
          modBoxes.forEach(me=>{
            const midX=(me.sMinX+me.sMaxX)/2, midY=(me.sMinY+me.sMaxY)/2;
            const belowOcc = hasNeighbor(me,'below'), aboveOcc = hasNeighbor(me,'above');
            if(!belowOcc || !aboveOcc){
              ctx.textAlign = 'center';
              if(!belowOcc){ ctx.textBaseline = 'top'; ctx.fillText(Math.round(me.wVal)+' mm', midX, me.sMaxY+8); }
              else { ctx.textBaseline = 'bottom'; ctx.fillText(Math.round(me.wVal)+' mm', midX, me.sMinY-8); }
            }
            const leftOcc = hasNeighbor(me,'left'), rightOcc = hasNeighbor(me,'right');
            if(!leftOcc || !rightOcc){
              ctx.textBaseline = 'middle';
              if(!leftOcc){ ctx.textAlign = 'right'; ctx.fillText(Math.round(me.hVal)+' mm', me.sMinX-8, midY); }
              else { ctx.textAlign = 'left'; ctx.fillText(Math.round(me.hVal)+' mm', me.sMaxX+8, midY); }
            }
          });
        }

        const allLabelObjs = [
          ...labelEntries.map(e=>e.obj),
          ...modNameGroups.flatMap(g=>g.map(e=>e.obj))
        ];
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        allLabelObjs.forEach(obj=>{
          if(!obj.visible) return;
          const ndc = obj.position.clone().project(camera);
          if(ndc.z<-1 || ndc.z>1) return;
          const sx = (ndc.x*0.5+0.5)*w*2, sy = (-ndc.y*0.5+0.5)*h*2;
          const lines = obj.userData.lines || [];
          const lineH = 24;
          let y = sy - (lines.length-1)*lineH/2;
          lines.forEach(line=>{
            // Yüz Düzenleme/Excel etiketleriyle aynı renk-boyut kuralı — burada CSS'e
            // (.label3d .l1/.l3/.l2) sahip değiliz, canlı DOM stiliyle elle senkron tutulur:
            // CSS font-size'ın 2 katı (bu canvas 2x pikselde yakalanıyor).
            const clsParts = (line.cls||'').split(' ');
            const base = clsParts[0], isBos = clsParts.indexOf('bos')>=0;
            let fontSpec, color, shadowColor;
            if(base==='modname'){ fontSpec = '700 26px'; color = '#4fb8a8'; shadowColor = 'rgba(0,0,0,0.5)'; }
            else if(base==='l3'){ fontSpec = '600 22px'; color = isBos?'#ffffff':'#000000'; shadowColor = isBos?'rgba(0,0,0,0.6)':'rgba(255,255,255,0.85)'; }
            else if(base==='l2'){ fontSpec = '700 24px'; color = isBos?'#ffffff':'#000000'; shadowColor = isBos?'rgba(0,0,0,0.6)':'rgba(255,255,255,0.85)'; }
            else { fontSpec = '700 26px'; color = isBos?'#ffffff':'#000000'; shadowColor = isBos?'rgba(0,0,0,0.6)':'rgba(255,255,255,0.85)'; }
            ctx.font = fontSpec+' Inter, Arial, sans-serif';
            ctx.fillStyle = color;
            ctx.shadowColor = shadowColor;
            ctx.shadowBlur = 3;
            ctx.fillText(line.text, sx, y);
            y += lineH;
          });
        });
        const dataURL = outCanvas.toDataURL('image/png');

        renderer.setPixelRatio(prevPR);
        camera.up.copy(savedUp);
        camera.position.copy(savedPos);
        controls.target.copy(savedTarget);
        camera.zoom = savedZoom;
        camera.left=savedCamL; camera.right=savedCamR; camera.top=savedCamT; camera.bottom=savedCamB;
        camera.updateProjectionMatrix();
        controls.update();
        resize();

        resolve(dataURL);
      }catch(err){ reject(err); }
    });
  };

  // ---------- Dışarıya (klasik script'e) bağlan ----------
  window.render3D = function(){ rebuildScene(); };

  resize();
  rebuildScene();
}

boot();
</script>
