document.getElementById('f0').srcdoc=b64Decode(KAPAK_B64);
document.getElementById('f1').srcdoc=b64Decode(DXF_B64);

var tabs=document.querySelectorAll('.tab');
var frames=document.querySelectorAll('iframe');
function switchTab(i){
  tabs.forEach(function(t,j){t.classList.toggle('active',i===j);});
  frames.forEach(function(f,j){f.classList.toggle('active',i===j);});
}
switchTab(0);

var _dxfReady=false, _dxfQueue=[];
window.addEventListener('message',function(e){
  if(!e.data) return;
  if(e.data.type==='dxfExport'){
    switchTab(1);
    var payload=e.data.payload;
    if(_dxfReady){
      document.getElementById('f1').contentWindow.postMessage({type:'dxfInject',payload:payload},'*');
    } else {
      _dxfQueue.push(payload);
    }
  }
  if(e.data.type==='dxfReady'){
    _dxfReady=true;
    _dxfQueue.forEach(function(p){
      document.getElementById('f1').contentWindow.postMessage({type:'dxfInject',payload:p},'*');
    });
    _dxfQueue=[];
  }
});
</script>
