function b64Decode(b64) {
  var bin = atob(b64);
  var bytes = new Uint8Array(bin.length);
  for (var i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return new TextDecoder('utf-8').decode(bytes);
}
var iK = document.getElementById('iframe-kapak');
var iD = document.getElementById('iframe-dxf');
iK.srcdoc = b64Decode(KAPAK_B64);
iD.srcdoc = b64Decode(DXF_B64);
function showTab(name) {
  document.getElementById('tab-kapak').classList.toggle('active', name === 'kapak');
  document.getElementById('tab-dxf').classList.toggle('active', name === 'dxf');
  iK.classList.toggle('active', name === 'kapak');
  iD.classList.toggle('active', name === 'dxf');
}
window.addEventListener('message', function(e) {
  if (!e.data) return;
  if (e.data.type === 'dxfExport') {
    showTab('dxf');
    setTimeout(function() {
      try { iD.contentWindow.applyKapakData(e.data.payload); }
      catch(ex) { console.warn('DXF inject error:', ex); }
    }, 50);
  }
});
</script>
