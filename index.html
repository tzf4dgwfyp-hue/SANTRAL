<script>
// =====================================================================
// DXF WRITER
// =====================================================================

class DxfWriter {
  constructor() {
    this.entities = [];
    this.handle = 100;
  }

  _nextHandle() {
    return (this.handle++).toString(16).toUpperCase();
  }

  /** Cizgi ekle */
  addLine(x1, y1, x2, y2, layer) {
    if (layer === undefined) layer = '0';
    this.entities.push({ type: 'LINE', x1: x1, y1: y1, x2: x2, y2: y2, layer: layer });
  }

  /** Daire ekle */
  addCircle(cx, cy, r, layer) {
    if (layer === undefined) layer = '0';
    this.entities.push({ type: 'CIRCLE', cx: cx, cy: cy, r: r, layer: layer });
  }

  /** Ark ekle (acilar derece cinsinden) */
  addArc(cx, cy, r, startAngle, endAngle, layer) {
    if (layer === undefined) layer = '0';
    this.entities.push({ type: 'ARC', cx: cx, cy: cy, r: r, startAngle: startAngle, endAngle: endAngle, layer: layer });
  }

  /** Text ekle. (x,y) konumu hAlign/vAlign'a gore yorumlanir:
   *    hAlign: 0=Left (varsayilan), 1=Center, 2=Right
   *    vAlign: 0=Baseline (varsayilan), 1=Bottom, 2=Middle, 3=Top
   *  hAlign>0 veya vAlign>0 ise (x,y) DXF code 11 (alignment point) olur. */
  addText(x, y, height, text, layer, rotation, hAlign, vAlign) {
    if (layer === undefined) layer = '0';
    if (rotation === undefined) rotation = 0;
    if (hAlign === undefined) hAlign = 0;
    if (vAlign === undefined) vAlign = 0;
    this.entities.push({
      type: 'TEXT', x: x, y: y, height: height, text: text,
      layer: layer, rotation: rotation, hAlign: hAlign, vAlign: vAlign
    });
  }

  /** Spline ekle (control points + knots) */
  addSpline(controlPoints, knots, degree, flags, layer) {
    if (degree === undefined) degree = 3;
    if (flags === undefined) flags = 8;
    if (layer === undefined) layer = '0';
    this.entities.push({ type: 'SPLINE', controlPoints: controlPoints, knots: knots, degree: degree, flags: flags, layer: layer });
  }

  /** DXF string uret - DXF R12 (AC1009) formati, tum AutoCAD surumlerinde acilir */
  generate() {
    var dxf = '';

    // ======== HEADER ========
    dxf += '0\nSECTION\n2\nHEADER\n';
    dxf += '9\n$ACADVER\n1\nAC1009\n';
    dxf += '9\n$INSUNITS\n70\n4\n';
    dxf += '9\n$EXTMIN\n10\n-1000.0\n20\n-100000.0\n30\n0.0\n';
    dxf += '9\n$EXTMAX\n10\n100000.0\n20\n100000.0\n30\n0.0\n';
    dxf += '0\nENDSEC\n';

    // ======== TABLES ========
    dxf += '0\nSECTION\n2\nTABLES\n';

    // VPORT
    dxf += '0\nTABLE\n2\nVPORT\n70\n1\n';
    dxf += '0\nVPORT\n2\n*ACTIVE\n70\n0\n';
    dxf += '10\n0.0\n20\n0.0\n11\n1.0\n21\n1.0\n';
    dxf += '12\n0.0\n22\n0.0\n13\n0.0\n23\n0.0\n14\n1.0\n24\n1.0\n';
    dxf += '15\n0.0\n25\n0.0\n16\n0.0\n26\n0.0\n36\n1.0\n';
    dxf += '17\n0.0\n27\n0.0\n37\n0.0\n40\n1000.0\n41\n1.5\n42\n50.0\n43\n0.0\n44\n0.0\n';
    dxf += '50\n0.0\n51\n0.0\n71\n0\n72\n100\n73\n1\n74\n3\n75\n0\n76\n0\n77\n0\n78\n0\n';
    dxf += '0\nENDTAB\n';

    // LTYPE
    dxf += '0\nTABLE\n2\nLTYPE\n70\n1\n';
    dxf += '0\nLTYPE\n2\nCONTINUOUS\n70\n0\n3\nSolid line\n72\n65\n73\n0\n40\n0.0\n';
    dxf += '0\nENDTAB\n';

    // LAYER
    var layers = ['0'];
    var layerSet = {};
    layerSet['0'] = true;
    for (var i = 0; i < this.entities.length; i++) {
      var ln = this.entities[i].layer;
      if (!layerSet[ln]) {
        layerSet[ln] = true;
        layers.push(ln);
      }
    }

    dxf += '0\nTABLE\n2\nLAYER\n70\n' + layers.length + '\n';
    for (var li = 0; li < layers.length; li++) {
      dxf += '0\nLAYER\n2\n' + layers[li] + '\n70\n0\n62\n7\n6\nCONTINUOUS\n';
    }
    dxf += '0\nENDTAB\n';

    // STYLE
    dxf += '0\nTABLE\n2\nSTYLE\n70\n1\n';
    dxf += '0\nSTYLE\n2\nSTANDARD\n70\n0\n40\n0.0\n41\n1.0\n50\n0.0\n71\n0\n42\n3.5\n3\ntxt\n4\n\n';
    dxf += '0\nENDTAB\n';

    dxf += '0\nENDSEC\n';

    // ======== BLOCKS (bos ama zorunlu) ========
    dxf += '0\nSECTION\n2\nBLOCKS\n';
    dxf += '0\nENDSEC\n';

    // ======== ENTITIES ========
    dxf += '0\nSECTION\n2\nENTITIES\n';

    for (var i = 0; i < this.entities.length; i++) {
      var e = this.entities[i];
      switch (e.type) {
        case 'LINE':
          dxf += '0\nLINE\n8\n' + e.layer + '\n';
          dxf += '10\n' + e.x1 + '\n20\n' + e.y1 + '\n30\n0.0\n';
          dxf += '11\n' + e.x2 + '\n21\n' + e.y2 + '\n31\n0.0\n';
          break;

        case 'CIRCLE':
          dxf += '0\nCIRCLE\n8\n' + e.layer + '\n';
          dxf += '10\n' + e.cx + '\n20\n' + e.cy + '\n30\n0.0\n';
          dxf += '40\n' + e.r + '\n';
          break;

        case 'ARC':
          dxf += '0\nARC\n8\n' + e.layer + '\n';
          dxf += '10\n' + e.cx + '\n20\n' + e.cy + '\n30\n0.0\n';
          dxf += '40\n' + e.r + '\n';
          dxf += '50\n' + e.startAngle + '\n51\n' + e.endAngle + '\n';
          break;

        case 'TEXT':
          dxf += '0\nTEXT\n8\n' + e.layer + '\n';
          dxf += '10\n' + e.x + '\n20\n' + e.y + '\n30\n0.0\n';
          dxf += '40\n' + e.height + '\n';
          dxf += '1\n' + e.text + '\n';
          if (e.rotation) dxf += '50\n' + e.rotation + '\n';
          // Sag-/orta-/sol- ve baseline/bottom/middle/top hizalama (DXF 72/73 + 11).
          // hAlign>0 veya vAlign>0 ise alignment point (DXF 11) eklenir; aksi
          // halde TEXT default Left/Baseline yorumlanir (eski davranis korunur).
          if (e.hAlign || e.vAlign) {
            if (e.hAlign) dxf += '72\n' + e.hAlign + '\n';
            dxf += '11\n' + e.x + '\n21\n' + e.y + '\n31\n0.0\n';
            if (e.vAlign) dxf += '73\n' + e.vAlign + '\n';
          }
          break;

        case 'SPLINE':
          // R12 SPLINE yok - POLYLINE ile yaklasik cizim
          var pts = this._evalSpline(e.controlPoints, e.knots, e.degree, 200);
          dxf += '0\nPOLYLINE\n8\n' + e.layer + '\n66\n1\n70\n0\n';
          for (var si = 0; si < pts.length; si++) {
            dxf += '0\nVERTEX\n8\n' + e.layer + '\n';
            dxf += '10\n' + pts[si][0] + '\n20\n' + pts[si][1] + '\n30\n0.0\n';
          }
          dxf += '0\nSEQEND\n8\n' + e.layer + '\n';
          break;
      }
    }

    dxf += '0\nENDSEC\n';
    dxf += '0\nEOF\n';

    return dxf;
  }

  /** B-spline noktalarini hesapla (De Boor algoritmasi) */
  _evalSpline(ctrlPts, knots, degree, numPts) {
    var points = [];
    if (!ctrlPts || ctrlPts.length < 2) return points;

    var n = ctrlPts.length - 1;
    var p = degree;

    // Parametre araligi
    var tMin = knots[p];
    var tMax = knots[n + 1];

    for (var i = 0; i <= numPts; i++) {
      var t = tMin + (tMax - tMin) * i / numPts;
      if (t >= tMax) t = tMax - 1e-10;

      // Knot span bul
      var span = p;
      for (var j = p; j <= n; j++) {
        if (t >= knots[j] && t < knots[j + 1]) { span = j; break; }
      }

      // De Boor
      var d = [];
      for (var j = 0; j <= p; j++) {
        var idx = span - p + j;
        if (idx >= 0 && idx <= n) {
          d.push([ctrlPts[idx][0], ctrlPts[idx][1]]);
        } else {
          d.push([0, 0]);
        }
      }

      for (var r = 1; r <= p; r++) {
        for (var j = p; j >= r; j--) {
          var left = span - p + j;
          var kl = knots[left];
          var kr = knots[left + p - r + 1];
          var denom = kr - kl;
          var alpha = (denom > 1e-14) ? (t - kl) / denom : 0.0;
          d[j] = [
            (1 - alpha) * d[j - 1][0] + alpha * d[j][0],
            (1 - alpha) * d[j - 1][1] + alpha * d[j][1]
          ];
        }
      }
      points.push([d[p][0], d[p][1]]);
    }
    return points;
  }
}


// =====================================================================
// 50'lik PANEL CIZIM MOTORU
// =====================================================================

// Percin hesaplama: ceil(span / maxSp) esit aralikli daire
// vidaPos: paralel siradaki vida konumlari (yatay sira icin X, dikey sutun icin Y).
//          Percin bu listedeki bir konumla ortusurse 13mm kaydirilir.
function addPercin(dxf, ox, oy, x1, y1, x2, y2, r, dir, maxSp, layer, vidaPos) {
  var span = dir === 'V' ? Math.abs(y2 - y1) : Math.abs(x2 - x1);
  var n = Math.ceil(span / maxSp);
  vidaPos = vidaPos || [];
  // Herhangi bir percin vida ile cakisiyorsa n'i artir (max 20 deneme)
  for (var iter = 0; iter < 20; iter++) {
    var sp = span / n;
    var base = (dir === 'V' ? Math.min(y1, y2) : Math.min(x1, x2));
    var conflict = false;
    for (var i = 1; i < n; i++) {
      var pos = base + i * sp;
      for (var j = 0; j < vidaPos.length; j++) {
        if (Math.abs(pos - vidaPos[j]) < 1) { conflict = true; break; }
      }
      if (conflict) break;
    }
    if (!conflict) break;
    n++;
  }
  var sp = span / n;
  var base = (dir === 'V' ? Math.min(y1, y2) : Math.min(x1, x2));
  for (var i = 1; i < n; i++) {
    var pos = base + i * sp;
    if (dir === 'V') {
      dxf.addCircle(ox + x1, oy + pos, r, layer);
    } else {
      dxf.addCircle(ox + pos, oy + y1, r, layer);
    }
  }
  return n; // cagiran, ayni sayiyi es (ic/dis) kapaga da uygulayabilsin diye
}

// addPercin ile AYNI kenara, ama vida cakisma kontrolu yapmadan, DISARIDAN VERILEN n
// sayisinda percin dagitir. Dis kapakta vida cakismasi nedeniyle n artmissa, ic kapak
// bunu (kendi vida deligi olmasa bile) AYNEN miras alsin diye kullanilir.
function addPercinN(dxf, ox, oy, x1, y1, x2, y2, r, dir, n, layer) {
  var span = dir === 'V' ? Math.abs(y2 - y1) : Math.abs(x2 - x1);
  var sp = span / n;
  var base = (dir === 'V' ? Math.min(y1, y2) : Math.min(x1, x2));
  for (var i = 1; i < n; i++) {
    var pos = base + i * sp;
    if (dir === 'V') {
      dxf.addCircle(ox + x1, oy + pos, r, layer);
    } else {
      dxf.addCircle(ox + pos, oy + y1, r, layer);
    }
  }
}

// Vida kurali: 800-1600 arasi 1 orta, 1600+ ise 2 tane (1/3 ve 2/3)
function addVida(dxf, ox, oy, dir, x1, y1, x2, y2, dimVal, r, layer) {
  if (dimVal >= 800 && dimVal < 1600) {
    if (dir === 'H') {
      dxf.addCircle(ox + (x1 + x2) / 2, oy + y1, r, layer);
    } else {
      dxf.addCircle(ox + x1, oy + (y1 + y2) / 2, r, layer);
    }
  } else if (dimVal >= 1600) {
    var sp = dir === 'H' ? Math.abs(x2 - x1) : Math.abs(y2 - y1);
    if (dir === 'H') {
      dxf.addCircle(ox + x1 + sp / 3, oy + y1, r, layer);
      dxf.addCircle(ox + x1 + sp * 2 / 3, oy + y1, r, layer);
    } else {
      dxf.addCircle(ox + x1, oy + y1 + sp / 3, r, layer);
      dxf.addCircle(ox + x1, oy + y1 + sp * 2 / 3, r, layer);
    }
  }
}

// Kodlama texti
function addKod(dxf, ox, oy, tx, ty, kod, layer) {
  if (kod && kod.length > 0) {
    var txtH = 3.5;
    var px = ox + tx - 9.0;
    var py = oy + ty - txtH / 2;
    dxf.addText(px, py, txtH, kod, layer);
  }
}

// -------------------------------------------------------
// DIS SABIT PANEL (50'lik)
// W = B+98, H = K+98
// -------------------------------------------------------
function drawDisSabit(dxf, ox, oy, B, K, kod) {
  var W = B + 98, H = K + 98;
  var R_P = 2.3, R_V = 8.1;

  // Bukum cizgileri
  var lb = 'DP_BUKUM';
  // Alt-Sol
  dxf.addLine(ox + 0, oy + 69, ox + 20, oy + 49, lb);
  dxf.addLine(ox + 20, oy + 49, ox + 49, oy + 49, lb);
  dxf.addLine(ox + 49, oy + 49, ox + 49, oy + 20, lb);
  dxf.addLine(ox + 49, oy + 20, ox + 69, oy + 0, lb);
  // Ust-Sol
  dxf.addLine(ox + 0, oy + H - 69, ox + 20, oy + H - 49, lb);
  dxf.addLine(ox + 20, oy + H - 49, ox + 49, oy + H - 49, lb);
  dxf.addLine(ox + 49, oy + H - 49, ox + 49, oy + H - 20, lb);
  dxf.addLine(ox + 49, oy + H - 20, ox + 69, oy + H, lb);
  // Alt-Sag
  dxf.addLine(ox + W - 69, oy + 0, ox + W - 49, oy + 20, lb);
  dxf.addLine(ox + W - 49, oy + 20, ox + W - 49, oy + 49, lb);
  dxf.addLine(ox + W - 49, oy + 49, ox + W - 20, oy + 49, lb);
  dxf.addLine(ox + W - 20, oy + 49, ox + W, oy + 69, lb);
  // Ust-Sag
  dxf.addLine(ox + W, oy + H - 69, ox + W - 20, oy + H - 49, lb);
  dxf.addLine(ox + W - 20, oy + H - 49, ox + W - 49, oy + H - 49, lb);
  dxf.addLine(ox + W - 49, oy + H - 49, ox + W - 49, oy + H - 20, lb);
  dxf.addLine(ox + W - 49, oy + H - 20, ox + W - 69, oy + H, lb);

  // Yesil kenarlar (B-40)
  var ly = 'DP_YESIL';
  dxf.addLine(ox + 69, oy + 0, ox + W - 69, oy + 0, ly);
  dxf.addLine(ox + 69, oy + H, ox + W - 69, oy + H, ly);

  // Turkuaz kenarlar (K-40)
  var lt = 'DP_TURKUAZ';
  dxf.addLine(ox + 0, oy + 69, ox + 0, oy + H - 69, lt);
  dxf.addLine(ox + W, oy + 69, ox + W, oy + H - 69, lt);

  // Sabit percin O4.2
  var lsp = 'DP_SABIT_PERCIN';
  dxf.addCircle(ox + 10.8, oy + 89.5, R_P, lsp);
  dxf.addCircle(ox + 10.8, oy + H - 89.5, R_P, lsp);
  dxf.addCircle(ox + 89.5, oy + 10.8, R_P, lsp);
  dxf.addCircle(ox + 89.5, oy + H - 10.8, R_P, lsp);
  dxf.addCircle(ox + W - 89.5, oy + 10.8, R_P, lsp);
  dxf.addCircle(ox + W - 89.5, oy + H - 10.8, R_P, lsp);
  dxf.addCircle(ox + W - 10.8, oy + 89.5, R_P, lsp);
  dxf.addCircle(ox + W - 10.8, oy + H - 89.5, R_P, lsp);

  // Sabit vida O16.2
  var lsv = 'DP_SABIT_VIDA';
  dxf.addCircle(ox + 64, oy + 109, R_V, lsv);
  dxf.addCircle(ox + 64, oy + H - 109, R_V, lsv);
  dxf.addCircle(ox + 109, oy + 64, R_V, lsv);
  dxf.addCircle(ox + 109, oy + H - 64, R_V, lsv);
  dxf.addCircle(ox + W - 109, oy + 64, R_V, lsv);
  dxf.addCircle(ox + W - 109, oy + H - 64, R_V, lsv);
  dxf.addCircle(ox + W - 64, oy + 109, R_V, lsv);
  dxf.addCircle(ox + W - 64, oy + H - 109, R_V, lsv);

  // Vida konumlari (vidayla ayni hizaya gelen percin 13mm kayar; hiza tol. 1mm)
  var vidaXs = [109, W - 109];
  if (B >= 800 && B < 1600) vidaXs.push(W / 2);
  else if (B >= 1600) {
    vidaXs.push(109 + (W - 218) / 3);
    vidaXs.push(109 + 2 * (W - 218) / 3);
  }
  var vidaYs = [109, H - 109];
  if (K >= 800 && K < 1600) vidaYs.push(H / 2);
  else if (K >= 1600) {
    vidaYs.push(109 + (H - 218) / 3);
    vidaYs.push(109 + 2 * (H - 218) / 3);
  }

  // Degisken percin max 390mm
  var lp = 'DP_PERCIN';
  var nLeft = addPercin(dxf, ox, oy, 10.8, 89.5, 10.8, H - 89.5, R_P, 'V', 390, lp, vidaYs);
  var nRight = addPercin(dxf, ox, oy, W - 10.8, 89.5, W - 10.8, H - 89.5, R_P, 'V', 390, lp, vidaYs);
  var nBottom = addPercin(dxf, ox, oy, 89.5, 10.8, W - 89.5, 10.8, R_P, 'H', 390, lp, vidaXs);
  var nTop = addPercin(dxf, ox, oy, 89.5, H - 10.8, W - 89.5, H - 10.8, R_P, 'H', 390, lp, vidaXs);

  // Degisken vida 800/1600
  var lv = 'DP_VIDA';
  addVida(dxf, ox, oy, 'H', 109, 64, W - 109, 64, B, R_V, lv);
  addVida(dxf, ox, oy, 'H', 109, H - 64, W - 109, H - 64, B, R_V, lv);
  addVida(dxf, ox, oy, 'V', 64, 109, 64, H - 109, K, R_V, lv);
  addVida(dxf, ox, oy, 'V', W - 64, 109, W - 64, H - 109, K, R_V, lv);

  // Kodlama
  addKod(dxf, ox, oy, W - 90.5, H - 10.8, kod, 'DP_KODLAMA');

  // Vida cakismasi nedeniyle artan percin sayisi ic kapaga da aktarilsin diye dondurulur
  return { left: nLeft, right: nRight, bottom: nBottom, top: nTop };
}

// -------------------------------------------------------
// IC SABIT PANEL (50'lik) - kulak yok, UST stili (kose notch + R1)
// W = B+31, H = K+31

function drawIcSabit(dxf, ox, oy, B, K, kod, percinN) {

  // Kirmizi dikey (K-41)

  // Bukum (L-fold + R1 ark, UST stili - kulak yok)

  dxf.addLine(ox + W - 36, oy + H, ox + W - 36, oy + H - 35, lb);

  dxf.addLine(ox + W - 35, oy + H - 36, ox + W, oy + H - 36, lb);

  // Sabit percin O4.2

  dxf.addCircle(ox + 7.5, oy + 56, R_P, lsp);

  dxf.addCircle(ox + W - 56, oy + 7.5, R_P, lsp);
  dxf.addCircle(ox + 56, oy + H - 7.5, R_P, lsp);
  dxf.addCircle(ox + W - 56, oy + H - 7.5, R_P, lsp);
  dxf.addCircle(ox + W - 7.5, oy + 56, R_P, lsp);
  dxf.addCircle(ox + W - 7.5, oy + H - 56, R_P, lsp);

  // Degisken percin max 390mm — dis kapaktan (vida cakismasi nedeniyle artmis olabilecek)
  // percin SAYISI miras alinir; boylece ic ve dis kapak ayni sayida percine sahip olur.
  var lp = 'IC_PERCIN';
  if (percinN) {
    addPercinN(dxf, ox, oy, 7.5, 56, 7.5, H - 56, R_P, 'V', percinN.left, lp);
    addPercinN(dxf, ox, oy, W - 7.5, 56, W - 7.5, H - 56, R_P, 'V', percinN.right, lp);
    addPercinN(dxf, ox, oy, 56, 7.5, W - 56, 7.5, R_P, 'H', percinN.bottom, lp);
    addPercinN(dxf, ox, oy, 56, H - 7.5, W - 56, H - 7.5, R_P, 'H', percinN.top, lp);
  } else {
    addPercin(dxf, ox, oy, 7.5, 56, 7.5, H - 56, R_P, 'V', 390, lp);
    addPercin(dxf, ox, oy, W - 7.5, 56, W - 7.5, H - 56, R_P, 'V', 390, lp);
    addPercin(dxf, ox, oy, 56, 7.5, W - 56, 7.5, R_P, 'H', 390, lp);
    addPercin(dxf, ox, oy, 56, H - 7.5, W - 56, H - 7.5, R_P, 'H', 390, lp);
  }

  // Kodlama
  addKod(dxf, ox, oy, W - 56, H - 7.5, kod, 'IC_KODLAMA');
}

// =====================================================================
// PASLANMAZ SABIT PANEL (50'lik) - referans: 50'LİK PASLANMAZ DIŞ/İÇ.dxf
// Normal SABIT'ten farki:
//  - Sabit percin (PEMBE) kose ofseti: DIS 89.5->149.5, IC 56->116
//  - Degisken percin (YESIL): sabit percin uclari + eklenen vida konumlari
//    bolucu sayilir; her aralik <=390 esit bolunur (vida-bolucu kural)
//  - IC panelde dis paneldeki vidaya karsilik gelen oval slotlar var
//  - Dis hat / bukum / MAVI(B) / KIRMIZI(K) kenarlari normal SABIT ile ayni
// =====================================================================

// Eklenen vida konumu (sadece pozisyon - daire/slot cizmeden).
// [a,b] = iki sabit vida arasi band. >=1600 -> 1/3 ve 2/3 ; >=800 -> orta.
function addedVidaPos(a, b, dim) {
  if (dim >= 1600) return [a + (b - a) / 3, a + 2 * (b - a) / 3];
  if (dim >= 800)  return [(a + b) / 2];
  return [];
}

// Nokta (px,py) ile AB dogru parcasi arasi en kisa mesafe.
function _segDist(px, py, ax, ay, bx, by) {
  var dx = bx - ax, dy = by - ay;
  var L2 = dx * dx + dy * dy;
  var t = L2 > 1e-9 ? ((px - ax) * dx + (py - ay) * dy) / L2 : 0;
  t = Math.max(0, Math.min(1, t));
  var cx = ax + t * dx, cy = ay + t * dy;
  return Math.hypot(px - cx, py - cy);
}

// Paslanmaz percin/vida CLEARANCE kurali (normal paneldeki 13mm DEGIL):
// vida deligi ile percin deligi birbirine TEMAS ETMEYECEK; kenar-kenar
// bosluk MIN_CLR(5mm) altina dusen percin, kenar boyunca vida'dan uzaga
// HEDEF ~7mm (5-10 ortasi) bosluga gelene kadar kaydirilir.
// vidaList ogeleri: {cx,cy,half,R}  (slot icin half=arc merkez ofseti, R=5;
//                                    daire vida icin half=0, R=daire yari capi)
var PAS_MIN_CLR = 5, PAS_TGT_CLR = 7;
function _pasClr(dir, fixed, pos, pR, vidaList) {
  if (!vidaList || !vidaList.length) return pos;
  for (var iter = 0; iter < 4; iter++) {
    var px = (dir === 'V') ? fixed : pos;
    var py = (dir === 'V') ? pos : fixed;
    var worst = null, worstClr = 1e9;
    for (var k = 0; k < vidaList.length; k++) {
      var v = vidaList[k];
      var ax = v.cx - (v.orient === 'H' ? v.half : 0);
      var ay = v.cy - (v.orient === 'V' ? v.half : 0);
      var bx = v.cx + (v.orient === 'H' ? v.half : 0);
      var by = v.cy + (v.orient === 'V' ? v.half : 0);
      var clr = _segDist(px, py, ax, ay, bx, by) - v.R - pR;
      if (clr < worstClr) { worstClr = clr; worst = v; }
    }
    if (!worst || worstClr >= PAS_MIN_CLR) break;
    // En yakin vida'dan kenar boyunca uzaga kaydir (hedef ~7mm bosluk)
    var vAlong = (dir === 'V') ? worst.cy : worst.cx;
    var vPerp  = (dir === 'V') ? worst.cx : worst.cy;
    var perpD  = Math.abs(fixed - vPerp);
    var D = PAS_TGT_CLR + worst.R + pR;
    var need = D * D - perpD * perpD;
    if (need <= 0) break; // dikey mesafe tek basina yeterli (kaydirma gereksiz)
    var S = worst.half + Math.sqrt(need);
    var sign = (pos >= vAlong) ? 1 : -1;
    pos = vAlong + sign * S;
  }
  return pos;
}

// Sabit percin uclari ile aradaki bolucu (eklenen vida) konumlari arasinda,
// her aralik <= maxSp olacak sekilde esit araliklı percin daireleri ekler.
// Bolucu konumlarinin kendisine percin KONULMAZ (orada vida vardir).
// vidaList: clearance icin vida geometrileri (yukaridaki _pasClr).
function addPercinDiv(dxf, ox, oy, fixed, p0, p1, r, dir, maxSp, layer, dividers, vidaList) {
  var pts = [p0];
  (dividers || []).forEach(function (d) {
    if (d > p0 + 0.01 && d < p1 - 0.01) pts.push(d);
  });
  pts.push(p1);
  pts.sort(function (a, b) { return a - b; });
  for (var s = 0; s < pts.length - 1; s++) {
    var a = pts[s], b = pts[s + 1], span = b - a;
    var n = Math.ceil(span / maxSp);
    for (var i = 1; i < n; i++) {
      var pos = a + i * span / n;
      pos = _pasClr(dir, fixed, pos, r, vidaList);
      if (pos < p0) pos = p0; else if (pos > p1) pos = p1;
      if (dir === 'V') dxf.addCircle(ox + fixed, oy + pos, r, layer);
      else dxf.addCircle(ox + pos, oy + fixed, r, layer);
    }
  }
}

// Dis paneldeki vidaya karsilik gelen oval slot (2x R5 ark + 2 cizgi).
// orient 'H' = slot kenar boyunca yatay (alt/ust kenar),
// orient 'V' = slot kenar boyunca dikey (sol/sag kenar).
function addVidaSlotPas(dxf, cx, cy, orient, layer) {
  var R = 5, h = 2.5;
  if (orient === 'H') {
    dxf.addArc(cx + h, cy, R, 270, 90, layer);
    dxf.addArc(cx - h, cy, R, 90, 270, layer);
    dxf.addLine(cx - h, cy + R, cx + h, cy + R, layer);
    dxf.addLine(cx - h, cy - R, cx + h, cy - R, layer);
  } else {
    dxf.addArc(cx, cy - h, R, 180, 0, layer);
    dxf.addArc(cx, cy + h, R, 0, 180, layer);
    dxf.addLine(cx - R, cy - h, cx - R, cy + h, layer);
    dxf.addLine(cx + R, cy - h, cx + R, cy + h, layer);
  }
}

// --- IC paneldeki vida slotuna gore percin kaydirma kontrolu: hem DIS hem IC
//     ayni offset listesini kullanir, boylece kaydirma her iki panele esit
//     uygulanir ve delikler hizadan cikmaz.
//
// Bir kenarda esit araliklı percin pozisyonlarini hesaplar (PEMBE u-cunden
// 'p0' ile 'p1' arasi, dividers ile bolutlenmis), clearance kontrolu ile
// kaydirir. Donus: panel-yerel koordinat (p0..p1 arasi) listesi.
function _pasEdgePositions(p0, p1, maxSp, dir, fixed, dividers, vL) {
  var pts = [p0];
  (dividers || []).forEach(function (d) {
    if (d > p0 + 0.01 && d < p1 - 0.01) pts.push(d);
  });
  pts.push(p1);
  pts.sort(function (a, b) { return a - b; });
  var out = [];
  for (var s = 0; s < pts.length - 1; s++) {
    var a = pts[s], b = pts[s + 1], span = b - a;
    var n = Math.ceil(span / maxSp);
    for (var i = 1; i < n; i++) {
      var pos = a + i * span / n;
      pos = _pasClr(dir, fixed, pos, 2.3, vL);
      if (pos < p0) pos = p0;
      if (pos > p1) pos = p1;
      out.push(pos);
    }
  }
  return out;
}

// IC tarafinin clearance kuralina gore percin offset listelerini (PEMBE
// kosesinden) hesaplar. kalinlik: '50' veya '60'. tip: 'SABIT' | 'BOGAZ'.
// bogazTip: 'N' | 'B' | 'B2' (yalniz tip=='BOGAZ' kullanir).
// BOGAZ kurallari (slot listesi ve dolayisiyla clearance + dividers):
//   - BOGAZ panelinin Y-ekseni eklenen slotlari YOKTUR (sadece Beyaz+Kirmizi).
//   - 50'lik:
//       tip=B  -> alt-yan (Mavi) slot+eklenen silinir
//       tip=B2 -> alt-yan + ust-yan (Sari) slot+eklenen silinir
//       K<150 + B/B2 -> sol/sag-alt (Kirmizi) V slot silinir;
//                       sol/sag-ust (Beyaz) V slot Y = H_IC/2 'ye kayar
//   - 60'lık (normal drawBogazDis60 ile uyumlu):
//       tip=B  -> alt-yan slot+eklenen silinir
//       tip=B2 -> alt-yan + ust-yan slot+eklenen silinir
//       K<150 (TUM tipler) -> sol/sag iki V slot yerine yalnizca KI/2 V slot
// Donus: {bottom, top, left, right} listeleri (PEMBE-rel ofset, mm).
function computePasPercinOffsets(B, K, kalinlik, tip, bogazTip) {
  tip = (tip || 'SABIT').toUpperCase();
  bogazTip = (bogazTip || 'N').toUpperCase();
  var isBogaz = (tip === 'BOGAZ');
  var rmAlt = isBogaz && (bogazTip === 'B' || bogazTip === 'B2');
  var rmUst = isBogaz && bogazTip === 'B2';

  if (kalinlik === '60') {
    var SP = 19.785;
    var BI = B - 41, KI = K - 41;
    // 60 BOGAZ K<150: tum tipler icin Beyaz tek slot @ KI/2 (Kirmizi silinir)
    var rmYanCorner = isBogaz && K < 150;
    var vL = [];
    var sabitSlots = [];
    // Sol/sag yan V slotlari
    if (rmYanCorner) {
      sabitSlots.push([-27,        KI / 2, 'V']);
      sabitSlots.push([BI + 27,    KI / 2, 'V']);
    } else {
      sabitSlots.push([-27,         40,        'V']);
      sabitSlots.push([-27,        (KI - 40),  'V']);
      sabitSlots.push([BI + 27,     40,        'V']);
      sabitSlots.push([BI + 27,    (KI - 40),  'V']);
    }
    // Alt yan H slotlari (Mavi)
    if (!rmAlt) {
      sabitSlots.push([40,        -27, 'H']);
      sabitSlots.push([BI - 40,   -27, 'H']);
    }
    // Ust yan H slotlari (Sari)
    if (!rmUst) {
      sabitSlots.push([40,        KI + 27, 'H']);
      sabitSlots.push([BI - 40,   KI + 27, 'H']);
    }
    // Eklenen X (alt/ust)
    var vXs = addedVidaPos(40, BI - 40, B);
    vXs.forEach(function (x) {
      if (!rmAlt) sabitSlots.push([x, -27,       'H']);
      if (!rmUst) sabitSlots.push([x, KI + 27,   'H']);
    });
    // Eklenen Y (sol/sag): BOGAZ'da YOK
    if (!isBogaz) {
      var vYs = addedVidaPos(40, KI - 40, K);
      vYs.forEach(function (y) {
        sabitSlots.push([-27,     y, 'V']);
        sabitSlots.push([BI + 27, y, 'V']);
      });
    }
    sabitSlots.forEach(function (s) {
      vL.push({ cx: s[0], cy: s[1], half: 2.5, R: 5, orient: s[2] });
    });
    // 60'lık: tum kenarlar basit esit (no divider)
    var bot60 = _pasEdgePositions(SP, BI - SP, 390, 'H', -28.5,      [], vL);
    var top60 = _pasEdgePositions(SP, BI - SP, 390, 'H', KI + 28.5,  [], vL);
    var lft60 = _pasEdgePositions(SP, KI - SP, 390, 'V', -28.5,      [], vL);
    var rgt60 = _pasEdgePositions(SP, KI - SP, 390, 'V', BI + 28.5,  [], vL);
    return {
      bottom: bot60.map(function (p) { return p - SP; }),
      top:    top60.map(function (p) { return p - SP; }),
      left:   lft60.map(function (p) { return p - SP; }),
      right:  rgt60.map(function (p) { return p - SP; })
    };
  }
  // '50' default
  var SP50 = 116;
  var W50 = B + 31, H50 = K + 31;
  // 50 BOGAZ K<150 + B/B2: Kirmizi silinir, Beyaz H/2 'ye kayar
  var rmKirmizi50 = isBogaz && K < 150 && (bogazTip === 'B' || bogazTip === 'B2');
  var vL50 = [];
  var sabitSlots50 = [];
  // Sol/sag V slotlari (Kirmizi alt + Beyaz ust)
  if (rmKirmizi50) {
    // Sadece Beyaz @ H50/2
    sabitSlots50.push([9,         H50 / 2, 'V']);
    sabitSlots50.push([W50 - 9,   H50 / 2, 'V']);
  } else {
    sabitSlots50.push([9,         76,         'V']);   // Kirmizi
    sabitSlots50.push([9,         H50 - 76,   'V']);   // Beyaz
    sabitSlots50.push([W50 - 9,   76,         'V']);
    sabitSlots50.push([W50 - 9,   H50 - 76,   'V']);
  }
  // Alt yan H slotlari (Mavi)
  if (!rmAlt) {
    sabitSlots50.push([76,        9,          'H']);
    sabitSlots50.push([W50 - 76,  9,          'H']);
  }
  // Ust yan H slotlari (Sari)
  if (!rmUst) {
    sabitSlots50.push([76,        H50 - 9,    'H']);
    sabitSlots50.push([W50 - 76,  H50 - 9,    'H']);
  }
  var vXs50 = addedVidaPos(76, W50 - 76, B);
  vXs50.forEach(function (x) {
    if (!rmAlt) sabitSlots50.push([x, 9,        'H']);
    if (!rmUst) sabitSlots50.push([x, H50 - 9,  'H']);
  });
  // Eklenen Y (sol/sag): BOGAZ'da YOK
  if (!isBogaz) {
    var vYs50 = addedVidaPos(76, H50 - 76, K);
    vYs50.forEach(function (y) {
      sabitSlots50.push([9,       y, 'V']);
      sabitSlots50.push([W50 - 9, y, 'V']);
    });
  }
  sabitSlots50.forEach(function (s) {
    vL50.push({ cx: s[0], cy: s[1], half: 2.5, R: 5, orient: s[2] });
  });
  // 50'lık: yatay vida bolucu, dikey basit esit
  // BOGAZ'da silinen kenarlarda vida-bolucu yok (zaten slot yok)
  var divBot50 = rmAlt ? [] : vXs50;
  var divTop50 = rmUst ? [] : vXs50;
  var bot50 = _pasEdgePositions(SP50, W50 - SP50, 390, 'H', 7.5,         divBot50, vL50);
  var top50 = _pasEdgePositions(SP50, W50 - SP50, 390, 'H', H50 - 7.5,   divTop50, vL50);
  var lft50 = _pasEdgePositions(SP50, H50 - SP50, 390, 'V', 7.5,         [],       vL50);
  var rgt50 = _pasEdgePositions(SP50, H50 - SP50, 390, 'V', W50 - 7.5,   [],       vL50);
  return {
    bottom: bot50.map(function (p) { return p - SP50; }),
    top:    top50.map(function (p) { return p - SP50; }),
    left:   lft50.map(function (p) { return p - SP50; }),
    right:  rgt50.map(function (p) { return p - SP50; })
  };
}

// --- DIS SABIT PASLANMAZ (50'lik): W=B+98, H=K+98
function drawDisSabitPas(dxf, ox, oy, B, K, kod, percinOffsets) {
  var W = B + 98, H = K + 98;
  var R_P = 2.3, R_V = 8.1;

  // Bukum cizgileri (normal SABIT ile ayni)
  var lb = 'PAS_DP_BUKUM';
  dxf.addLine(ox + 0, oy + 69, ox + 20, oy + 49, lb);
  dxf.addLine(ox + 20, oy + 49, ox + 49, oy + 49, lb);
  dxf.addLine(ox + 49, oy + 49, ox + 49, oy + 20, lb);
  dxf.addLine(ox + 49, oy + 20, ox + 69, oy + 0, lb);
  dxf.addLine(ox + 0, oy + H - 69, ox + 20, oy + H - 49, lb);
  dxf.addLine(ox + 20, oy + H - 49, ox + 49, oy + H - 49, lb);
  dxf.addLine(ox + 49, oy + H - 49, ox + 49, oy + H - 20, lb);
  dxf.addLine(ox + 49, oy + H - 20, ox + 69, oy + H, lb);
  dxf.addLine(ox + W - 69, oy + 0, ox + W - 49, oy + 20, lb);
  dxf.addLine(ox + W - 49, oy + 20, ox + W - 49, oy + 49, lb);
  dxf.addLine(ox + W - 49, oy + 49, ox + W - 20, oy + 49, lb);
  dxf.addLine(ox + W - 20, oy + 49, ox + W, oy + 69, lb);
  dxf.addLine(ox + W, oy + H - 69, ox + W - 20, oy + H - 49, lb);
  dxf.addLine(ox + W - 20, oy + H - 49, ox + W - 49, oy + H - 49, lb);
  dxf.addLine(ox + W - 49, oy + H - 49, ox + W - 49, oy + H - 20, lb);
  dxf.addLine(ox + W - 49, oy + H - 20, ox + W - 69, oy + H, lb);

  // Mavi (B-40) yatay kenarlar / Kirmizi (K-40) dikey kenarlar
  dxf.addLine(ox + 69, oy + 0, ox + W - 69, oy + 0, 'PAS_DP_MAVI');
  dxf.addLine(ox + 69, oy + H, ox + W - 69, oy + H, 'PAS_DP_MAVI');
  dxf.addLine(ox + 0, oy + 69, ox + 0, oy + H - 69, 'PAS_DP_KIRMIZI');
  dxf.addLine(ox + W, oy + 69, ox + W, oy + H - 69, 'PAS_DP_KIRMIZI');

  // Sabit percin O4.2 - PASLANMAZ ofset 149.5 (normal SABIT'te 89.5)
  var SP = 149.5;
  var lsp = 'PAS_DP_SABIT_PERCIN';
  dxf.addCircle(ox + 10.8, oy + SP, R_P, lsp);
  dxf.addCircle(ox + 10.8, oy + H - SP, R_P, lsp);
  dxf.addCircle(ox + SP, oy + 10.8, R_P, lsp);
  dxf.addCircle(ox + SP, oy + H - 10.8, R_P, lsp);
  dxf.addCircle(ox + W - SP, oy + 10.8, R_P, lsp);
  dxf.addCircle(ox + W - SP, oy + H - 10.8, R_P, lsp);
  dxf.addCircle(ox + W - 10.8, oy + SP, R_P, lsp);
  dxf.addCircle(ox + W - 10.8, oy + H - SP, R_P, lsp);

  // Sabit vida O16.2 (64/109 kose) + Eklenen vida (800/1600) tek blokta
  // asagida _dpVida ile cizilir (clearance listesi vL de orada toplanir).

  // Eklenen vida (800/1600 kurali) + clearance icin vida geometri listesi
  var vidaX = addedVidaPos(109, W - 109, B);
  var vidaY = addedVidaPos(109, H - 109, K);
  var lv = 'PAS_DP_VIDA';
  var vL = []; // {cx,cy,half,R,orient} - daire vida icin half=0
  function _dpVida(cx, cy) {
    dxf.addCircle(ox + cx, oy + cy, R_V, lv);
    vL.push({ cx: cx, cy: cy, half: 0, R: R_V, orient: 'H' });
  }
  // Sabit vida (kose 8)
  _dpVida(64, 109); _dpVida(64, H - 109); _dpVida(109, 64); _dpVida(109, H - 64);
  _dpVida(W - 109, 64); _dpVida(W - 109, H - 64); _dpVida(W - 64, 109); _dpVida(W - 64, H - 109);
  // Eklenen vida
  vidaX.forEach(function (x) { _dpVida(x, 64); _dpVida(x, H - 64); });
  vidaY.forEach(function (y) { _dpVida(64, y); _dpVida(W - 64, y); });
  // Not: sabit vida (kose 8) DXF'te 2 kez cizilmesin diye yukarida ayrica
  // cizilen blok kaldirildi; _dpVida hepsini tek seferde cizer.

  // Degisken percin - IC kaynakli offsetler (DIS+IC ayni miktarda kayar)
  // percinOffsets: {bottom, top, left, right} - PEMBE kose'sinden ofset
  if (!percinOffsets) percinOffsets = computePasPercinOffsets(B, K, '50');
  var lp = 'PAS_DP_PERCIN';
  percinOffsets.bottom.forEach(function (off) {
    dxf.addCircle(ox + SP + off, oy + 10.8, R_P, lp);
  });
  percinOffsets.top.forEach(function (off) {
    dxf.addCircle(ox + SP + off, oy + H - 10.8, R_P, lp);
  });
  percinOffsets.left.forEach(function (off) {
    dxf.addCircle(ox + 10.8, oy + SP + off, R_P, lp);
  });
  percinOffsets.right.forEach(function (off) {
    dxf.addCircle(ox + W - 10.8, oy + SP + off, R_P, lp);
  });

  // Kodlama
  addKod(dxf, ox, oy, W - 90.5, H - 10.8, kod, 'PAS_DP_KODLAMA');
}

// --- IC SABIT PASLANMAZ (50'lik): W=B+31, H=K+31
function drawIcSabitPas(dxf, ox, oy, B, K, kod, percinOffsets) {
  var W = B + 31, H = K + 31;
  var R_P = 2.3;

  // Mavi yatay (B-41) / Kirmizi dikey (K-41)
  dxf.addLine(ox + 36, oy + 0, ox + W - 36, oy + 0, 'PAS_IC_MAVI');
  dxf.addLine(ox + 36, oy + H, ox + W - 36, oy + H, 'PAS_IC_MAVI');
  dxf.addLine(ox + 0, oy + 36, ox + 0, oy + H - 36, 'PAS_IC_KIRMIZI');
  dxf.addLine(ox + W, oy + 36, ox + W, oy + H - 36, 'PAS_IC_KIRMIZI');

  // Bukum (L-fold + R1 ark, kulak yok - normal IC SABIT ile ayni)
  var lb = 'PAS_IC_BUKUM';
  dxf.addLine(ox + 36, oy + 0, ox + 36, oy + 35, lb);
  dxf.addArc(ox + 36, oy + 36, 1, 270, 180, lb);
  dxf.addLine(ox + 35, oy + 36, ox + 0, oy + 36, lb);
  dxf.addLine(ox + W, oy + 36, ox + W - 35, oy + 36, lb);
  dxf.addArc(ox + W - 36, oy + 36, 1, 0, 270, lb);
  dxf.addLine(ox + W - 36, oy + 35, ox + W - 36, oy + 0, lb);
  dxf.addLine(ox + 0, oy + H - 36, ox + 35, oy + H - 36, lb);
  dxf.addArc(ox + 36, oy + H - 36, 1, 180, 90, lb);
  dxf.addLine(ox + 36, oy + H - 35, ox + 36, oy + H, lb);
  dxf.addLine(ox + W - 36, oy + H, ox + W - 36, oy + H - 35, lb);
  dxf.addArc(ox + W - 36, oy + H - 36, 1, 90, 0, lb);
  dxf.addLine(ox + W - 35, oy + H - 36, ox + W, oy + H - 36, lb);

  // Sabit percin O4.2 - PASLANMAZ ofset 116 (normal IC SABIT'te 56)
  var SP = 116;
  var lsp = 'PAS_IC_SABIT_PERCIN';
  dxf.addCircle(ox + 7.5, oy + SP, R_P, lsp);
  dxf.addCircle(ox + 7.5, oy + H - SP, R_P, lsp);
  dxf.addCircle(ox + SP, oy + 7.5, R_P, lsp);
  dxf.addCircle(ox + W - SP, oy + 7.5, R_P, lsp);
  dxf.addCircle(ox + SP, oy + H - 7.5, R_P, lsp);
  dxf.addCircle(ox + W - SP, oy + H - 7.5, R_P, lsp);
  dxf.addCircle(ox + W - 7.5, oy + SP, R_P, lsp);
  dxf.addCircle(ox + W - 7.5, oy + H - SP, R_P, lsp);

  // Vida slotlari (dis paneldeki vidaya karsilik). _icSlot hem cizer hem
  // clearance listesine (vL) ekler. Slot geom: half=2.5 (ark merkez ofseti), R=5.
  var lvs = 'PAS_IC_VIDA';
  var vidaX = addedVidaPos(76, W - 76, B);
  var vidaY = addedVidaPos(76, H - 76, K);
  var vL = [];
  function _icSlot(cx, cy, or) {
    addVidaSlotPas(dxf, ox + cx, oy + cy, or, lvs);
    vL.push({ cx: cx, cy: cy, half: 2.5, R: 5, orient: or });
  }
  // Sabit (kose 8)
  _icSlot(9, 76, 'V'); _icSlot(9, H - 76, 'V'); _icSlot(W - 9, 76, 'V'); _icSlot(W - 9, H - 76, 'V');
  _icSlot(76, 9, 'H'); _icSlot(W - 76, 9, 'H'); _icSlot(76, H - 9, 'H'); _icSlot(W - 76, H - 9, 'H');
  // Eklenen (800/1600 kurali)
  vidaX.forEach(function (x) { _icSlot(x, 9, 'H'); _icSlot(x, H - 9, 'H'); });
  vidaY.forEach(function (y) { _icSlot(9, y, 'V'); _icSlot(W - 9, y, 'V'); });

  // Degisken percin - IC kaynakli offsetler (DIS ile birebir ayni)
  if (!percinOffsets) percinOffsets = computePasPercinOffsets(B, K, '50');
  var lp = 'PAS_IC_PERCIN';
  percinOffsets.bottom.forEach(function (off) {
    dxf.addCircle(ox + SP + off, oy + 7.5, R_P, lp);
  });
  percinOffsets.top.forEach(function (off) {
    dxf.addCircle(ox + SP + off, oy + H - 7.5, R_P, lp);
  });
  percinOffsets.left.forEach(function (off) {
    dxf.addCircle(ox + 7.5, oy + SP + off, R_P, lp);
  });
  percinOffsets.right.forEach(function (off) {
    dxf.addCircle(ox + W - 7.5, oy + SP + off, R_P, lp);
  });

  // Kodlama
  addKod(dxf, ox, oy, W - 56, H - 7.5, kod, 'PAS_IC_KODLAMA');
}

// =====================================================================
// PASLANMAZ BOGAZ PANEL (50'lik)
// Normal BOGAZ ile vida pozisyonlari + bogazTip B/B2/N + K<150 kurallari AYNI.
// Paslanmaz farklari (SABIT pas ile paralel):
//   DIS: Pembe sabit percin kose ofseti 90.5 -> 149.5
//   IC : Pembe sabit percin kose ofseti 56   -> 116
//   IC : dis paneldeki vidaya karsilik gelen oval slotlar (R5, half=2.5)
//        - DIS'te silinen vidanin IC karsiligi slot da silinir
//        - K<150 + B/B2: Beyaz slot da H_IC/2 ye kayar
//   Degisken percin: IC kaynakli offset, DIS+IC esit kayar, 5-10mm clearance
//   BOGAZ'da Y-ekseni eklenen vida YOKTUR (sadece Beyaz+Kirmizi 1-2 vida)
// =====================================================================

// --- DIS BOGAZ PASLANMAZ (50'lik): W=B+98, H=K+98
function drawBogazDisPas(dxf, ox, oy, B, K, bogazTip, kod, percinOffsets) {
  var W = B + 98, H = K + 98;
  var R_P = 2.3, R_V = 8.1;
  var tip = (bogazTip || 'N').toUpperCase();

  // Bukum (SABIT pas / normal SABIT ile birebir ayni)
  var lb = 'PAS_BG_BUKUM';
  dxf.addLine(ox + 0, oy + 69, ox + 20, oy + 49, lb);
  dxf.addLine(ox + 20, oy + 49, ox + 49, oy + 49, lb);
  dxf.addLine(ox + 49, oy + 49, ox + 49, oy + 20, lb);
  dxf.addLine(ox + 49, oy + 20, ox + 69, oy + 0, lb);
  dxf.addLine(ox + 0, oy + H - 69, ox + 20, oy + H - 49, lb);
  dxf.addLine(ox + 20, oy + H - 49, ox + 49, oy + H - 49, lb);
  dxf.addLine(ox + 49, oy + H - 49, ox + 49, oy + H - 20, lb);
  dxf.addLine(ox + 49, oy + H - 20, ox + 69, oy + H, lb);
  dxf.addLine(ox + W - 69, oy + 0, ox + W - 49, oy + 20, lb);
  dxf.addLine(ox + W - 49, oy + 20, ox + W - 49, oy + 49, lb);
  dxf.addLine(ox + W - 49, oy + 49, ox + W - 20, oy + 49, lb);
  dxf.addLine(ox + W - 20, oy + 49, ox + W, oy + 69, lb);
  dxf.addLine(ox + W, oy + H - 69, ox + W - 20, oy + H - 49, lb);
  dxf.addLine(ox + W - 20, oy + H - 49, ox + W - 49, oy + H - 49, lb);
  dxf.addLine(ox + W - 49, oy + H - 49, ox + W - 49, oy + H - 20, lb);
  dxf.addLine(ox + W - 49, oy + H - 20, ox + W - 69, oy + H, lb);

  // Yesil (alt/ust) ve Turkuaz (sol/sag) - BOGAZ etiketleri
  dxf.addLine(ox + 69, oy + 0, ox + W - 69, oy + 0, 'PAS_BG_YESIL');
  dxf.addLine(ox + 69, oy + H, ox + W - 69, oy + H, 'PAS_BG_YESIL');
  dxf.addLine(ox + 0, oy + 69, ox + 0, oy + H - 69, 'PAS_BG_TURKUAZ');
  dxf.addLine(ox + W, oy + 69, ox + W, oy + H - 69, 'PAS_BG_TURKUAZ');

  // Sabit percin O4.2 - PASLANMAZ ofset 149.5 (SABIT pas ile ayni)
  var SP = 149.5;
  var lsp = 'PAS_BG_SABIT_PERCIN';
  dxf.addCircle(ox + 10.8, oy + SP, R_P, lsp);
  dxf.addCircle(ox + 10.8, oy + H - SP, R_P, lsp);
  dxf.addCircle(ox + SP, oy + 10.8, R_P, lsp);
  dxf.addCircle(ox + SP, oy + H - 10.8, R_P, lsp);
  dxf.addCircle(ox + W - SP, oy + 10.8, R_P, lsp);
  dxf.addCircle(ox + W - SP, oy + H - 10.8, R_P, lsp);
  dxf.addCircle(ox + W - 10.8, oy + SP, R_P, lsp);
  dxf.addCircle(ox + W - 10.8, oy + H - SP, R_P, lsp);

  // Vida kurallari (normal drawBogazDis ile ayni mantik)
  var rmKirmizi = (K < 150 && (tip === 'B' || tip === 'B2'));
  var vidaBeyazY = rmKirmizi ? (H / 2) : (H - 109);
  var vidaKirmizi = !rmKirmizi;

  var lvk = 'PAS_BG_VIDA_KIRMIZI';
  var lvb = 'PAS_BG_VIDA_BEYAZ';
  var lvm = 'PAS_BG_VIDA_MAVI';
  var lvs = 'PAS_BG_VIDA_SARI';
  var vL = []; // clearance icin vida geometri listesi

  // Beyaz (yan ust)
  dxf.addCircle(ox + 64, oy + vidaBeyazY, R_V, lvb);
  dxf.addCircle(ox + W - 64, oy + vidaBeyazY, R_V, lvb);
  vL.push({ cx: 64,    cy: vidaBeyazY, half: 0, R: R_V, orient: 'H' });
  vL.push({ cx: W - 64, cy: vidaBeyazY, half: 0, R: R_V, orient: 'H' });
  // Kirmizi (yan alt)
  if (vidaKirmizi) {
    dxf.addCircle(ox + 64, oy + 109, R_V, lvk);
    dxf.addCircle(ox + W - 64, oy + 109, R_V, lvk);
    vL.push({ cx: 64,    cy: 109, half: 0, R: R_V, orient: 'H' });
    vL.push({ cx: W - 64, cy: 109, half: 0, R: R_V, orient: 'H' });
  }

  // Mavi (alt yan) - sadece N
  var vidaXAlt = addedVidaPos(109, W - 109, B);
  if (tip === 'N') {
    dxf.addCircle(ox + 109, oy + 64, R_V, lvm);
    dxf.addCircle(ox + W - 109, oy + 64, R_V, lvm);
    vL.push({ cx: 109,     cy: 64, half: 0, R: R_V, orient: 'H' });
    vL.push({ cx: W - 109, cy: 64, half: 0, R: R_V, orient: 'H' });
    vidaXAlt.forEach(function (x) {
      dxf.addCircle(ox + x, oy + 64, R_V, lvm);
      vL.push({ cx: x, cy: 64, half: 0, R: R_V, orient: 'H' });
    });
  }
  // Sari (ust yan) - N ve B (B2'de yok)
  if (tip !== 'B2') {
    dxf.addCircle(ox + 109, oy + H - 64, R_V, lvs);
    dxf.addCircle(ox + W - 109, oy + H - 64, R_V, lvs);
    vL.push({ cx: 109,     cy: H - 64, half: 0, R: R_V, orient: 'H' });
    vL.push({ cx: W - 109, cy: H - 64, half: 0, R: R_V, orient: 'H' });
    vidaXAlt.forEach(function (x) {
      dxf.addCircle(ox + x, oy + H - 64, R_V, lvs);
      vL.push({ cx: x, cy: H - 64, half: 0, R: R_V, orient: 'H' });
    });
  }

  // Degisken percin - IC kaynakli offsetler (DIS+IC ayni miktarda kayar)
  if (!percinOffsets) percinOffsets = computePasPercinOffsets(B, K, '50', 'BOGAZ', tip);
  var lp = 'PAS_BG_PERCIN';
  percinOffsets.bottom.forEach(function (off) {
    dxf.addCircle(ox + SP + off, oy + 10.8, R_P, lp);
  });
  percinOffsets.top.forEach(function (off) {
    dxf.addCircle(ox + SP + off, oy + H - 10.8, R_P, lp);
  });
  percinOffsets.left.forEach(function (off) {
    dxf.addCircle(ox + 10.8, oy + SP + off, R_P, lp);
  });
  percinOffsets.right.forEach(function (off) {
    dxf.addCircle(ox + W - 10.8, oy + SP + off, R_P, lp);
  });

  // Kodlama
  addKod(dxf, ox, oy, W - 90.5, H - 10.8, kod, 'PAS_BG_KODLAMA');
}

// --- IC BOGAZ PASLANMAZ (50'lik): W=B+31, H=K+31
function drawIcBogazPas(dxf, ox, oy, B, K, bogazTip, kod, percinOffsets) {
  var W = B + 31, H = K + 31;
  var R_P = 2.3;
  var tip = (bogazTip || 'N').toUpperCase();

  // Mavi yatay / Kirmizi dikey (IC SABIT pas ile ayni)
  dxf.addLine(ox + 36, oy + 0, ox + W - 36, oy + 0, 'PAS_IC_BG_MAVI');
  dxf.addLine(ox + 36, oy + H, ox + W - 36, oy + H, 'PAS_IC_BG_MAVI');
  dxf.addLine(ox + 0, oy + 36, ox + 0, oy + H - 36, 'PAS_IC_BG_KIRMIZI');
  dxf.addLine(ox + W, oy + 36, ox + W, oy + H - 36, 'PAS_IC_BG_KIRMIZI');

  // Bukum (L-fold + R1 ark)
  var lb = 'PAS_IC_BG_BUKUM';
  dxf.addLine(ox + 36, oy + 0, ox + 36, oy + 35, lb);
  dxf.addArc(ox + 36, oy + 36, 1, 270, 180, lb);
  dxf.addLine(ox + 35, oy + 36, ox + 0, oy + 36, lb);
  dxf.addLine(ox + W, oy + 36, ox + W - 35, oy + 36, lb);
  dxf.addArc(ox + W - 36, oy + 36, 1, 0, 270, lb);
  dxf.addLine(ox + W - 36, oy + 35, ox + W - 36, oy + 0, lb);
  dxf.addLine(ox + 0, oy + H - 36, ox + 35, oy + H - 36, lb);
  dxf.addArc(ox + 36, oy + H - 36, 1, 180, 90, lb);
  dxf.addLine(ox + 36, oy + H - 35, ox + 36, oy + H, lb);
  dxf.addLine(ox + W - 36, oy + H, ox + W - 36, oy + H - 35, lb);
  dxf.addArc(ox + W - 36, oy + H - 36, 1, 90, 0, lb);
  dxf.addLine(ox + W - 35, oy + H - 36, ox + W, oy + H - 36, lb);

  // Sabit percin O4.2 - PASLANMAZ ofset 116
  var SP = 116;
  var lsp = 'PAS_IC_BG_SABIT_PERCIN';
  dxf.addCircle(ox + 7.5, oy + SP, R_P, lsp);
  dxf.addCircle(ox + 7.5, oy + H - SP, R_P, lsp);
  dxf.addCircle(ox + SP, oy + 7.5, R_P, lsp);
  dxf.addCircle(ox + W - SP, oy + 7.5, R_P, lsp);
  dxf.addCircle(ox + SP, oy + H - 7.5, R_P, lsp);
  dxf.addCircle(ox + W - SP, oy + H - 7.5, R_P, lsp);
  dxf.addCircle(ox + W - 7.5, oy + SP, R_P, lsp);
  dxf.addCircle(ox + W - 7.5, oy + H - SP, R_P, lsp);

  // Vida slotlari (BOGAZ kurallari - DIS'te silinen vidanin IC karsiligi yok)
  var lvs = 'PAS_IC_BG_VIDA';
  var rmAlt = (tip === 'B' || tip === 'B2');
  var rmUst = (tip === 'B2');
  var rmKirmizi = (K < 150 && (tip === 'B' || tip === 'B2'));

  // Sol/sag V slotlari (Beyaz ust + Kirmizi alt)
  if (rmKirmizi) {
    // Beyaz @ H_IC/2 = (K+31)/2 — DIS Beyaz @ H_DIS/2 = (K+98)/2 ile hizali
    addVidaSlotPas(dxf, ox + 9,       oy + H / 2,   'V', lvs);
    addVidaSlotPas(dxf, ox + W - 9,   oy + H / 2,   'V', lvs);
  } else {
    addVidaSlotPas(dxf, ox + 9,       oy + 76,      'V', lvs);   // Kirmizi
    addVidaSlotPas(dxf, ox + 9,       oy + H - 76,  'V', lvs);   // Beyaz
    addVidaSlotPas(dxf, ox + W - 9,   oy + 76,      'V', lvs);
    addVidaSlotPas(dxf, ox + W - 9,   oy + H - 76,  'V', lvs);
  }
  // Alt yan H slotlari (Mavi)
  if (!rmAlt) {
    addVidaSlotPas(dxf, ox + 76,      oy + 9,       'H', lvs);
    addVidaSlotPas(dxf, ox + W - 76,  oy + 9,       'H', lvs);
  }
  // Ust yan H slotlari (Sari)
  if (!rmUst) {
    addVidaSlotPas(dxf, ox + 76,      oy + H - 9,   'H', lvs);
    addVidaSlotPas(dxf, ox + W - 76,  oy + H - 9,   'H', lvs);
  }
  // Eklenen X
  var vidaX = addedVidaPos(76, W - 76, B);
  vidaX.forEach(function (x) {
    if (!rmAlt) addVidaSlotPas(dxf, ox + x, oy + 9,     'H', lvs);
    if (!rmUst) addVidaSlotPas(dxf, ox + x, oy + H - 9, 'H', lvs);
  });

  // Degisken percin - IC kaynakli offsetler (DIS ile birebir ayni)
  if (!percinOffsets) percinOffsets = computePasPercinOffsets(B, K, '50', 'BOGAZ', tip);
  var lp = 'PAS_IC_BG_PERCIN';
  percinOffsets.bottom.forEach(function (off) {
    dxf.addCircle(ox + SP + off, oy + 7.5, R_P, lp);
  });
  percinOffsets.top.forEach(function (off) {
    dxf.addCircle(ox + SP + off, oy + H - 7.5, R_P, lp);
  });
  percinOffsets.left.forEach(function (off) {
    dxf.addCircle(ox + 7.5, oy + SP + off, R_P, lp);
  });
  percinOffsets.right.forEach(function (off) {
    dxf.addCircle(ox + W - 7.5, oy + SP + off, R_P, lp);
  });

  // Kodlama
  addKod(dxf, ox, oy, W - 56, H - 7.5, kod, 'PAS_IC_BG_KODLAMA');
}

// --- PASLANMAZ cizim motoru: secili tarafi (DIS / IC) tek sirada cizer
// DIS: SABIT->paslanmaz dis, BOGAZ->paslanmaz bogaz dis, ACILIR->normal dis.
// IC : SABIT->paslanmaz ic, BOGAZ->paslanmaz bogaz ic, ACILIR->normal ic,
//      UST->normal UST. UST disa gitmez.
function draw50Paslanmaz(dxf, panelList, gapCol, side) {
  if (gapCol === undefined) gapCol = 700;
  var curX = 0;
  for (var idx = 0; idx < panelList.length; idx++) {
    var p = panelList[idx];
    var tip = p.tip, B = p.B, K = p.K, cam = p.cam, kod = p.kod;
    var bt = (p.bogazTip || 'N').toUpperCase();
    // SABIT/BOGAZ icin IC kaynakli percin offsetlerini bir kez hesapla,
    // hem DIS hem IC ayni offset'leri kullansin (delikler hizadan cikmasin)
    var pcOff = null;
    if (tip === 'SABIT') pcOff = computePasPercinOffsets(B, K, '50');
    else if (tip === 'BOGAZ') pcOff = computePasPercinOffsets(B, K, '50', 'BOGAZ', bt);
    var w = 0;
    if (side === 'DIS') {
      switch (tip) {
        case 'SABIT':  drawDisSabitPas(dxf, curX, 0, B, K, kod, pcOff); w = B + 98; break;
        case 'ACILIR': drawDisAcilir(dxf, curX, 0, B, K, cam || 'H', kod); w = B + 98; break;
        case 'BOGAZ':  drawBogazDisPas(dxf, curX, 0, B, K, bt, kod, pcOff); w = B + 98; break;
        case 'UST':    w = 0; break; // UST disa gitmez
      }
    } else {
      switch (tip) {
        case 'SABIT':  drawIcSabitPas(dxf, curX, 0, B, K, kod, pcOff); w = B + 31; break;
        case 'ACILIR': drawIcAcilir(dxf, curX, 0, B, K, cam || 'H', kod); w = B + 29; break;
        case 'BOGAZ':  drawIcBogazPas(dxf, curX, 0, B, K, bt, kod, pcOff); w = B + 31; break;
        case 'UST':    drawUst(dxf, curX, 0, B, K, kod); w = B + 31; break;
      }
    }
    if (w > 0) curX += w + gapCol;
  }
}

// =====================================================================
// 60'LIK PASLANMAZ SABIT PANEL (referans: 60'LIK PASLANMAZ DIŞ/İÇ.dxf)
// Normal 60'lık SABIT ile farklar:
//   DIS: sabit percin kose ofseti simetrik 40.285 (normal 40.29/40.70)
//   IC : sabit percin kose ofseti simetrik 19.785 (normal 20)
//   IC : dis paneldeki vida'ya karsilik gelen oval slotlar (R5, half=2.5)
//   YESIL eklenen percin: BASIT esit bolme (vida bolucu DEGIL) - 50'likten fark
//   Per/cin-vida 5-10mm clearance kurali aktif (DIS'ta pratikte tetiklenmez,
//   IC'de perpD=1.5mm oldugu icin gerekirse devreye girer)
// Notasyon: ins (ox, oy) = INNER panel sol-alt (normal drawDis60/drawIc60 ile ayni)
// =====================================================================

function drawDis60Pas(dxf, ox, oy, B, K, kod, percinOffsets) {
  var lb = 'PAS_60_DP_BUKUM';
  // Bukum (20 cizgi - normal drawFoldDis ile birebir)
  drawFoldDis(dxf, ox, oy, B, K, lb);

  // Sabit percin O4.2 - simetrik ofset 40.285 (paslanmaz simetri)
  var CN = 40.285;
  var lsp = 'PAS_60_DP_SABIT_PERCIN';
  dxf.addCircle(ox + CN,     oy - 51.7,     2.3, lsp);
  dxf.addCircle(ox + B - CN, oy - 51.7,     2.3, lsp);
  dxf.addCircle(ox + CN,     oy + K + 51.7, 2.3, lsp);
  dxf.addCircle(ox + B - CN, oy + K + 51.7, 2.3, lsp);
  dxf.addCircle(ox - 51.7,     oy + CN,     2.3, lsp);
  dxf.addCircle(ox - 51.7,     oy + K - CN, 2.3, lsp);
  dxf.addCircle(ox + B + 51.7, oy + CN,     2.3, lsp);
  dxf.addCircle(ox + B + 51.7, oy + K - CN, 2.3, lsp);

  // Sabit vida O16.2 + eklenen vida (800/1600) + clearance listesi
  var lsv = 'PAS_60_DP_SABIT_VIDA';
  var lv  = 'PAS_60_DP_VIDA';
  var vidaXs = addedVidaPos(60, B - 60, B);
  var vidaYs = addedVidaPos(60, K - 60, K);
  var vL = [];
  // Sabit vida (8 kose - normal 60 SABIT ile ayni)
  [[60, 15], [B - 60, 15], [15, 60], [B - 15, 60],
   [60, K - 15], [B - 60, K - 15], [15, K - 60], [B - 15, K - 60]
  ].forEach(function (p) {
    dxf.addCircle(ox + p[0], oy + p[1], 8.1, lsv);
    vL.push({ cx: p[0], cy: p[1], half: 0, R: 8.1, orient: 'H' });
  });
  // Eklenen vida
  vidaXs.forEach(function (x) {
    dxf.addCircle(ox + x, oy + 15, 8.1, lv);
    dxf.addCircle(ox + x, oy + K - 15, 8.1, lv);
    vL.push({ cx: x, cy: 15, half: 0, R: 8.1, orient: 'H' });
    vL.push({ cx: x, cy: K - 15, half: 0, R: 8.1, orient: 'H' });
  });
  vidaYs.forEach(function (y) {
    dxf.addCircle(ox + 15, oy + y, 8.1, lv);
    dxf.addCircle(ox + B - 15, oy + y, 8.1, lv);
    vL.push({ cx: 15, cy: y, half: 0, R: 8.1, orient: 'H' });
    vL.push({ cx: B - 15, cy: y, half: 0, R: 8.1, orient: 'H' });
  });

  // Degisken percin - IC kaynakli offsetler (DIS ile birebir ayni)
  if (!percinOffsets) percinOffsets = computePasPercinOffsets(B, K, '60');
  var lp = 'PAS_60_DP_PERCIN';
  percinOffsets.bottom.forEach(function (off) {
    dxf.addCircle(ox + CN + off, oy - 51.7, 2.3, lp);
  });
  percinOffsets.top.forEach(function (off) {
    dxf.addCircle(ox + CN + off, oy + K + 51.7, 2.3, lp);
  });
  percinOffsets.left.forEach(function (off) {
    dxf.addCircle(ox - 51.7, oy + CN + off, 2.3, lp);
  });
  percinOffsets.right.forEach(function (off) {
    dxf.addCircle(ox + B + 51.7, oy + CN + off, 2.3, lp);
  });

  // Kodlama
  addKod60(dxf, ox + B - 49.70, oy + K + 49.95, kod, 'PAS_60_DP_KODLAMA');
}

function drawIc60Pas(dxf, ox, oy, B, K, kod, percinOffsets) {
  var BI = B - 41, KI = K - 41;
  var lb = 'PAS_60_IC_BUKUM';
  // Bukum (normal drawFoldIcSabit ile birebir)
  drawFoldIcSabit(dxf, ox, oy, BI, KI, lb);

  // Sabit percin O4.2 - simetrik ofset 19.785
  var CN = 19.785;
  var lsp = 'PAS_60_IC_SABIT_PERCIN';
  dxf.addCircle(ox + CN,      oy - 28.5,      2.3, lsp);
  dxf.addCircle(ox + BI - CN, oy - 28.5,      2.3, lsp);
  dxf.addCircle(ox + CN,      oy + KI + 28.5, 2.3, lsp);
  dxf.addCircle(ox + BI - CN, oy + KI + 28.5, 2.3, lsp);
  dxf.addCircle(ox - 28.5,      oy + CN,      2.3, lsp);
  dxf.addCircle(ox - 28.5,      oy + KI - CN, 2.3, lsp);
  dxf.addCircle(ox + BI + 28.5, oy + CN,      2.3, lsp);
  dxf.addCircle(ox + BI + 28.5, oy + KI - CN, 2.3, lsp);

  // Vida slotlari + eklenen + clearance listesi
  // IC slot konumlari (inner coords): kose 8 + eklenen 800/1600
  //   Sol/sag kenar (x=-27 / x=BI+27): orient V, y=40 ve y=KI-40
  //   Alt/ust kenar (y=-27 / y=KI+27): orient H, x=40 ve x=BI-40
  var lvs = 'PAS_60_IC_VIDA';
  var vL = [];
  function _icSlot(cx, cy, or) {
    addVidaSlotPas(dxf, ox + cx, oy + cy, or, lvs);
    vL.push({ cx: cx, cy: cy, half: 2.5, R: 5, orient: or });
  }
  // Sabit kose 8
  _icSlot(-27, 40, 'V'); _icSlot(-27, KI - 40, 'V');
  _icSlot(BI + 27, 40, 'V'); _icSlot(BI + 27, KI - 40, 'V');
  _icSlot(40, -27, 'H'); _icSlot(BI - 40, -27, 'H');
  _icSlot(40, KI + 27, 'H'); _icSlot(BI - 40, KI + 27, 'H');
  // Eklenen (800/1600 kurali) - band [40, BI-40] / [40, KI-40]
  var vidaXs = addedVidaPos(40, BI - 40, B);
  var vidaYs = addedVidaPos(40, KI - 40, K);
  vidaXs.forEach(function (x) {
    _icSlot(x, -27, 'H');
    _icSlot(x, KI + 27, 'H');
  });
  vidaYs.forEach(function (y) {
    _icSlot(-27, y, 'V');
    _icSlot(BI + 27, y, 'V');
  });

  // Degisken percin - IC kaynakli offsetler (DIS ile birebir ayni)
  if (!percinOffsets) percinOffsets = computePasPercinOffsets(B, K, '60');
  var lp = 'PAS_60_IC_PERCIN';
  percinOffsets.bottom.forEach(function (off) {
    dxf.addCircle(ox + CN + off, oy - 28.5, 2.3, lp);
  });
  percinOffsets.top.forEach(function (off) {
    dxf.addCircle(ox + CN + off, oy + KI + 28.5, 2.3, lp);
  });
  percinOffsets.left.forEach(function (off) {
    dxf.addCircle(ox - 28.5, oy + CN + off, 2.3, lp);
  });
  percinOffsets.right.forEach(function (off) {
    dxf.addCircle(ox + BI + 28.5, oy + CN + off, 2.3, lp);
  });

  // Kodlama
  addKod60(dxf, ox + B - 70, oy + K - 14.25, kod, 'PAS_60_IC_KODLAMA');
}

// 60'LIK PASLANMAZ BOGAZ PANEL
// Normal BOGAZ ile vida pozisyonlari + bogazTip B/B2/N + K<150 kurallari AYNI.
// SABIT 60 paslanmaz farklari:
//   DIS: Pembe sabit percin kose ofseti simetrik 40.285
//   IC : Pembe sabit percin kose ofseti simetrik 19.785
//   IC : dis paneldeki vidaya karsilik oval slotlar (R5, half=2.5)
//        - DIS'te silinen vidanin IC karsiligi slot da silinir
//        - K<150 (TUM tipler): sol/sag tek slot @ KI/2 (drawBogazDis60 mantigi)
//   Degisken percin: BASIT esit + clearance + IC kaynakli ofset
//   BOGAZ'da Y-ekseni eklenen vida YOKTUR
// =====================================================================

// --- DIS BOGAZ PASLANMAZ 60'lık: ins = INNER sol-alt
function drawBogazDis60Pas(dxf, ox, oy, B, K, bogazTip, kod, percinOffsets) {
  var tip = (bogazTip || 'N').toUpperCase();
  var lb = 'PAS_60_BG_BUKUM';
  drawFoldDis(dxf, ox, oy, B, K, lb);

  // Sabit percin O4.2 - paslanmaz simetrik ofset 40.285
  var CN = 40.285;
  var lsp = 'PAS_60_BG_SABIT_PERCIN';
  dxf.addCircle(ox + CN,     oy - 51.7,     2.3, lsp);
  dxf.addCircle(ox + B - CN, oy - 51.7,     2.3, lsp);
  dxf.addCircle(ox + CN,     oy + K + 51.7, 2.3, lsp);
  dxf.addCircle(ox + B - CN, oy + K + 51.7, 2.3, lsp);
  dxf.addCircle(ox - 51.7,     oy + CN,     2.3, lsp);
  dxf.addCircle(ox - 51.7,     oy + K - CN, 2.3, lsp);
  dxf.addCircle(ox + B + 51.7, oy + CN,     2.3, lsp);
  dxf.addCircle(ox + B + 51.7, oy + K - CN, 2.3, lsp);

  // Vida kurallari (normal drawBogazDis60 ile ayni mantik)
  var rmYanCorner60 = K < 150;
  var lvk = 'PAS_60_BG_VIDA_KIRMIZI';
  var lvb = 'PAS_60_BG_VIDA_BEYAZ';
  var lvm = 'PAS_60_BG_VIDA_MAVI';
  var lvs = 'PAS_60_BG_VIDA_SARI';
  var vL = [];

  // Sol/sag yan (Kirmizi alt + Beyaz ust)
  if (rmYanCorner60) {
    // K<150: sadece Beyaz @ K/2 (Kirmizi yok)
    dxf.addCircle(ox + 15,     oy + K / 2, 8.1, lvb);
    dxf.addCircle(ox + B - 15, oy + K / 2, 8.1, lvb);
    vL.push({ cx: 15,     cy: K / 2, half: 0, R: 8.1, orient: 'H' });
    vL.push({ cx: B - 15, cy: K / 2, half: 0, R: 8.1, orient: 'H' });
  } else {
    dxf.addCircle(ox + 15,     oy + 60,     8.1, lvk);     // Kirmizi alt
    dxf.addCircle(ox + B - 15, oy + 60,     8.1, lvk);
    dxf.addCircle(ox + 15,     oy + K - 60, 8.1, lvb);     // Beyaz ust
    dxf.addCircle(ox + B - 15, oy + K - 60, 8.1, lvb);
    vL.push({ cx: 15,     cy: 60,     half: 0, R: 8.1, orient: 'H' });
    vL.push({ cx: B - 15, cy: 60,     half: 0, R: 8.1, orient: 'H' });
    vL.push({ cx: 15,     cy: K - 60, half: 0, R: 8.1, orient: 'H' });
    vL.push({ cx: B - 15, cy: K - 60, half: 0, R: 8.1, orient: 'H' });
  }

  // Mavi (alt yan) - sadece N
  var vidaXAlt = addedVidaPos(60, B - 60, B);
  if (tip === 'N') {
    dxf.addCircle(ox + 60,     oy + 15, 8.1, lvm);
    dxf.addCircle(ox + B - 60, oy + 15, 8.1, lvm);
    vL.push({ cx: 60,     cy: 15, half: 0, R: 8.1, orient: 'H' });
    vL.push({ cx: B - 60, cy: 15, half: 0, R: 8.1, orient: 'H' });
    vidaXAlt.forEach(function (x) {
      dxf.addCircle(ox + x, oy + 15, 8.1, lvm);
      vL.push({ cx: x, cy: 15, half: 0, R: 8.1, orient: 'H' });
    });
  }
  // Sari (ust yan) - N ve B (B2'de yok)
  if (tip !== 'B2') {
    dxf.addCircle(ox + 60,     oy + K - 15, 8.1, lvs);
    dxf.addCircle(ox + B - 60, oy + K - 15, 8.1, lvs);
    vL.push({ cx: 60,     cy: K - 15, half: 0, R: 8.1, orient: 'H' });
    vL.push({ cx: B - 60, cy: K - 15, half: 0, R: 8.1, orient: 'H' });
    vidaXAlt.forEach(function (x) {
      dxf.addCircle(ox + x, oy + K - 15, 8.1, lvs);
      vL.push({ cx: x, cy: K - 15, half: 0, R: 8.1, orient: 'H' });
    });
  }

  // Degisken percin - IC kaynakli offsetler (DIS+IC ayni miktarda kayar)
  if (!percinOffsets) percinOffsets = computePasPercinOffsets(B, K, '60', 'BOGAZ', tip);
  var lp = 'PAS_60_BG_PERCIN';
  percinOffsets.bottom.forEach(function (off) {
    dxf.addCircle(ox + CN + off, oy - 51.7, 2.3, lp);
  });
  percinOffsets.top.forEach(function (off) {
    dxf.addCircle(ox + CN + off, oy + K + 51.7, 2.3, lp);
  });
  percinOffsets.left.forEach(function (off) {
    dxf.addCircle(ox - 51.7, oy + CN + off, 2.3, lp);
  });
  percinOffsets.right.forEach(function (off) {
    dxf.addCircle(ox + B + 51.7, oy + CN + off, 2.3, lp);
  });

  // Kodlama
  addKod60(dxf, ox + B - 49.70, oy + K + 49.95, kod, 'PAS_60_BG_KODLAMA');
}

// --- IC BOGAZ PASLANMAZ 60'lık: ins = INNER BI sol-alt (BI=B-41, KI=K-41)
function drawIc60BogazPas(dxf, ox, oy, B, K, bogazTip, kod, percinOffsets) {
  var BI = B - 41, KI = K - 41;
  var tip = (bogazTip || 'N').toUpperCase();
  var lb = 'PAS_60_IC_BG_BUKUM';
  drawFoldIcSabit(dxf, ox, oy, BI, KI, lb);

  // Sabit percin O4.2 - simetrik ofset 19.785
  var CN = 19.785;
  var lsp = 'PAS_60_IC_BG_SABIT_PERCIN';
  dxf.addCircle(ox + CN,      oy - 28.5,      2.3, lsp);
  dxf.addCircle(ox + BI - CN, oy - 28.5,      2.3, lsp);
  dxf.addCircle(ox + CN,      oy + KI + 28.5, 2.3, lsp);
  dxf.addCircle(ox + BI - CN, oy + KI + 28.5, 2.3, lsp);
  dxf.addCircle(ox - 28.5,      oy + CN,      2.3, lsp);
  dxf.addCircle(ox - 28.5,      oy + KI - CN, 2.3, lsp);
  dxf.addCircle(ox + BI + 28.5, oy + CN,      2.3, lsp);
  dxf.addCircle(ox + BI + 28.5, oy + KI - CN, 2.3, lsp);

  // Vida slotlari (BOGAZ kurallari)
  var lvs = 'PAS_60_IC_BG_VIDA';
  var rmAlt = (tip === 'B' || tip === 'B2');
  var rmUst = (tip === 'B2');
  var rmYanCorner60 = K < 150;

  // Sol/sag V slotlari
  if (rmYanCorner60) {
    addVidaSlotPas(dxf, ox - 27,      oy + KI / 2, 'V', lvs);
    addVidaSlotPas(dxf, ox + BI + 27, oy + KI / 2, 'V', lvs);
  } else {
    addVidaSlotPas(dxf, ox - 27,      oy + 40,        'V', lvs);
    addVidaSlotPas(dxf, ox - 27,      oy + KI - 40,   'V', lvs);
    addVidaSlotPas(dxf, ox + BI + 27, oy + 40,        'V', lvs);
    addVidaSlotPas(dxf, ox + BI + 27, oy + KI - 40,   'V', lvs);
  }
  // Alt yan H slotlari (Mavi)
  if (!rmAlt) {
    addVidaSlotPas(dxf, ox + 40,      oy - 27,        'H', lvs);
    addVidaSlotPas(dxf, ox + BI - 40, oy - 27,        'H', lvs);
  }
  // Ust yan H slotlari (Sari)
  if (!rmUst) {
    addVidaSlotPas(dxf, ox + 40,      oy + KI + 27,   'H', lvs);
    addVidaSlotPas(dxf, ox + BI - 40, oy + KI + 27,   'H', lvs);
  }
  // Eklenen X
  var vidaXs = addedVidaPos(40, BI - 40, B);
  vidaXs.forEach(function (x) {
    if (!rmAlt) addVidaSlotPas(dxf, ox + x, oy - 27,        'H', lvs);
    if (!rmUst) addVidaSlotPas(dxf, ox + x, oy + KI + 27,   'H', lvs);
  });

  // Degisken percin - IC kaynakli offsetler (DIS ile birebir ayni)
  if (!percinOffsets) percinOffsets = computePasPercinOffsets(B, K, '60', 'BOGAZ', tip);
  var lp = 'PAS_60_IC_BG_PERCIN';
  percinOffsets.bottom.forEach(function (off) {
    dxf.addCircle(ox + CN + off, oy - 28.5, 2.3, lp);
  });
  percinOffsets.top.forEach(function (off) {
    dxf.addCircle(ox + CN + off, oy + KI + 28.5, 2.3, lp);
  });
  percinOffsets.left.forEach(function (off) {
    dxf.addCircle(ox - 28.5, oy + CN + off, 2.3, lp);
  });
  percinOffsets.right.forEach(function (off) {
    dxf.addCircle(ox + BI + 28.5, oy + CN + off, 2.3, lp);
  });

  // Kodlama
  addKod60(dxf, ox + B - 70, oy + K - 14.25, kod, 'PAS_60_IC_BG_KODLAMA');
}

// 60'lık paslanmaz cizim motoru (50'lik draw50Paslanmaz'in analogu).
// Her panel icin ins = inner panel sol-alt; outer envelope -62.5/-36 dista.
// Layout'ta her piece icin curX'i piece outer GENISLIGI kadar ilerletiyoruz.
function draw60Paslanmaz(dxf, panelList, gapCol, side) {
  if (gapCol === undefined) gapCol = 400;
  var curX = 0;
  for (var idx = 0; idx < panelList.length; idx++) {
    var p = panelList[idx];
    var tip = p.tip, B = p.B, K = p.K, cam = p.cam, kod = p.kod;
    var bt = (p.bogazTip || 'N').toUpperCase();
    // SABIT/BOGAZ icin IC kaynakli percin offsetleri (DIS+IC ayni kaydırma)
    var pcOff = null;
    if (tip === 'SABIT') pcOff = computePasPercinOffsets(B, K, '60');
    else if (tip === 'BOGAZ') pcOff = computePasPercinOffsets(B, K, '60', 'BOGAZ', bt);
    var w = 0;
    if (side === 'DIS') {
      switch (tip) {
        case 'SABIT':
          // ins = inner sol-alt = curX + 62.5 (outer flansin sagi)
          drawDis60Pas(dxf, curX + 62.5, 62.5, B, K, kod, pcOff);
          w = B + 125; break;
        case 'ACILIR':
          drawDisAcilir60(dxf, curX + 62.5, 62.5, B, K, kod, '0');
          if (cam === 'E') addCam60(dxf, curX + 62.5 + B / 2, 62.5 + K / 2, '0');
          w = B + 125; break;
        case 'BOGAZ':
          drawBogazDis60Pas(dxf, curX + 62.5, 62.5, B, K, bt, kod, pcOff);
          w = B + 125; break;
        case 'UST': w = 0; break;
      }
    } else { // IC
      switch (tip) {
        case 'SABIT':
          // ins = inner BI sol-alt = curX + 36 (BI rect outer envelope dis-flansi)
          drawIc60Pas(dxf, curX + 36, 36, B, K, kod, pcOff);
          w = B + 31; break;
        case 'ACILIR':
          // drawIcAcilir60 ins = BI rect sol-alt
          drawIcAcilir60(dxf, curX + 36, 36, B, K, kod, '0');
          if (cam === 'E') {
            var BIa = B - 43;
            addCam60(dxf, curX + 36 + BIa / 2, 36 + (K - 43) / 2, '0');
          }
          w = B + 29; break;
        case 'BOGAZ':
          drawIc60BogazPas(dxf, curX + 36, 36, B, K, bt, kod, pcOff);
          w = B + 31; break;
        case 'UST':
          drawUst60(dxf, curX + 36, 36, B, K, kod, '0');
          w = B + 31; break;
      }
    }
    if (w > 0) curX += w + gapCol;
  }
}

  // Alt-Sol
  dxf.addLine(ox + 0, oy + 36, ox + 0, oy + 23, layer);

  dxf.addArc(ox + 36, oy + 36, 1, 270, 180, layer);

  // Ust-Sol
  dxf.addLine(ox + 0, oy + H - 36, ox + 0, oy + H - 23, layer);

  dxf.addLine(ox + 5, oy + H - 18, ox + 18, oy + H - 18, layer);
  dxf.addLine(ox + 18, oy + H - 18, ox + 18, oy + H - 36, layer);
  dxf.addLine(ox + 18, oy + H - 36, ox + 35, oy + H - 36, layer);
  dxf.addArc(ox + 36, oy + H - 36, 1, 180, 90, layer);
  dxf.addLine(ox + 36, oy + H - 35, ox + 36, oy + H, layer);
  // Alt-Sag
  dxf.addLine(ox + W, oy + 36, ox + W, oy + 23, layer);
  dxf.addArc(ox + W - 5, oy + 23, 5, 270, 360, layer);
  dxf.addLine(ox + W - 5, oy + 18, ox + W - 18, oy + 18, layer);
  dxf.addLine(ox + W - 18, oy + 18, ox + W - 18, oy + 36, layer);
  dxf.addLine(ox + W - 18, oy + 36, ox + W - 35, oy + 36, layer);
  dxf.addArc(ox + W - 36, oy + 36, 1, 0, 270, layer);
  dxf.addLine(ox + W - 36, oy + 35, ox + W - 36, oy + 0, layer);
  // Ust-Sag
  dxf.addLine(ox + W, oy + H - 36, ox + W, oy + H - 23, layer);
  dxf.addArc(ox + W - 5, oy + H - 23, 5, 0, 90, layer);
  dxf.addLine(ox + W - 5, oy + H - 18, ox + W - 18, oy + H - 18, layer);
  dxf.addLine(ox + W - 18, oy + H - 18, ox + W - 18, oy + H - 36, layer);
  dxf.addLine(ox + W - 18, oy + H - 36, ox + W - 35, oy + H - 36, layer);
  dxf.addArc(ox + W - 36, oy + H - 36, 1, 90, 0, layer);
  dxf.addLine(ox + W - 36, oy + H - 35, ox + W - 36, oy + H, layer);
}

  var tip = bogazTip.toUpperCase();
  var vidaBeyazY, vidaKirmizi;
  if (K < 150 && (tip === 'B' || tip === 'B2')) {
    vidaBeyazY = H / 2;
    vidaKirmizi = false;
  } else {
    vidaBeyazY = H - 109;
    vidaKirmizi = true;
  }

  // Yatay siralardaki vida X konumlari
  var vidaXsAlt = []; // Mavi (sadece N)
  if (tip === 'N') {
    vidaXsAlt = [109, W - 109];
    if (B >= 800 && B < 1600) vidaXsAlt.push(W / 2);
    else if (B >= 1600) {
      vidaXsAlt.push(109 + (W - 218) / 3);
      vidaXsAlt.push(109 + 2 * (W - 218) / 3);
    }
  }
  var vidaXsUst = []; // Sari (N ve B, B2'de yok)
  if (tip !== 'B2') {
    vidaXsUst = [109, W - 109];
    if (B >= 800 && B < 1600) vidaXsUst.push(W / 2);
    else if (B >= 1600) {
      vidaXsUst.push(109 + (W - 218) / 3);
      vidaXsUst.push(109 + 2 * (W - 218) / 3);
    }
  }
  // Dikey sutundaki vida Y konumlari (Beyaz + Kirmizi)
  var vidaYs = [vidaBeyazY];
  if (vidaKirmizi) vidaYs.push(109);

  // Degisken percin
  var lp = 'BG_PERCIN';
  var nLeft = addPercin(dxf, ox, oy, 10.8, 90.5, 10.8, H - 90.5, R_P, 'V', 390, lp, vidaYs);
  var nRight = addPercin(dxf, ox, oy, W - 10.8, 90.5, W - 10.8, H - 90.5, R_P, 'V', 390, lp, vidaYs);
  var nBottom = addPercin(dxf, ox, oy, 90.5, 10.8, W - 90.5, 10.8, R_P, 'H', 390, lp, vidaXsAlt);
  var nTop = addPercin(dxf, ox, oy, 90.5, H - 10.8, W - 90.5, H - 10.8, R_P, 'H', 390, lp, vidaXsUst);

  // Beyaz vida
  dxf.addCircle(ox + 64, oy + vidaBeyazY, R_V, 'BG_VIDA_BEYAZ');
  dxf.addCircle(ox + W - 64, oy + vidaBeyazY, R_V, 'BG_VIDA_BEYAZ');

  // Kirmizi vida
  if (vidaKirmizi) {
    dxf.addCircle(ox + 64, oy + 109, R_V, 'BG_VIDA_KIRMIZI');
    dxf.addCircle(ox + W - 64, oy + 109, R_V, 'BG_VIDA_KIRMIZI');
  }

  // Mavi vida (sadece N)
  if (tip === 'N') {
    dxf.addCircle(ox + 109, oy + 64, R_V, 'BG_VIDA_MAVI');
    dxf.addCircle(ox + W - 109, oy + 64, R_V, 'BG_VIDA_MAVI');
    addVida(dxf, ox, oy, 'H', 109, 64, W - 109, 64, B, R_V, 'BG_VIDA_MAVI');
  }

  // Sari vida (N ve B, B2'de yok)
  if (tip !== 'B2') {
    dxf.addCircle(ox + 109, oy + H - 64, R_V, 'BG_VIDA_SARI');
    dxf.addCircle(ox + W - 109, oy + H - 64, R_V, 'BG_VIDA_SARI');
    addVida(dxf, ox, oy, 'H', 109, H - 64, W - 109, H - 64, B, R_V, 'BG_VIDA_SARI');
  }

  // Kodlama
  addKod(dxf, ox, oy, W - 90.5, H - 10.8, kod, 'BG_KODLAMA');

  // Vida cakismasi nedeniyle artan percin sayisi ic kapaga da aktarilsin diye dondurulur
  return { left: nLeft, right: nRight, bottom: nBottom, top: nTop };
}

// -------------------------------------------------------
// ANA FONKSIYON: 50'lik panel ciz
// -------------------------------------------------------
function draw50(dxf, panelList, satirN, gapCol, gapRow) {
  if (satirN === undefined) satirN = 4;
  if (gapCol === undefined) gapCol = 200;
  if (gapRow === undefined) gapRow = 300;

  var curX = 0, curY = 0, rowH = 0, colI = 0;

  for (var idx = 0; idx < panelList.length; idx++) {
    var panel = panelList[idx];
    var tip = panel.tip;
    var B = panel.B;
    var K = panel.K;
    var cam = panel.cam;
    var bogazTip = panel.bogazTip;
    var kod = panel.kod;
    var pairW = 0, pairH = 0;

    switch (tip) {
      case 'SABIT': {
        var Wdis = B + 98;
        var pN = drawDisSabit(dxf, curX, curY, B, K, kod);
        drawIcSabit(dxf, curX + Wdis + 400, curY + 33.5, B, K, kod, pN);
        pairW = Wdis + 400 + B + 31;
        pairH = K + 98;
        break;
      }
      case 'ACILIR': {
        var Wdis = B + 98;
        drawDisAcilir(dxf, curX, curY, B, K, cam || 'H', kod);
        drawIcAcilir(dxf, curX + Wdis + 400, curY + 34.5, B, K, cam || 'H', kod);
        pairW = Wdis + 400 + B + 29;
        pairH = K + 98;
        break;
      }
      case 'UST': {
        drawUst(dxf, curX, curY, B, K, kod);
        pairW = B + 31;
        pairH = K + 31;
        break;
      }
      case 'BOGAZ': {
        var Wdis = B + 98;
        var bt = bogazTip || 'N';
        var pN = drawBogazDis(dxf, curX, curY, B, K, bt, kod);
        drawIcSabit(dxf, curX + Wdis + 400, curY + 33.5, B, K, kod, pN);
        pairW = Wdis + 400 + B + 31;
        pairH = K + 98;
        break;
      }
    }

    if (pairH > rowH) rowH = pairH;
    curX += pairW + gapCol;
    colI++;

    if (colI >= satirN) {
      colI = 0;
      curX = 0;
      curY -= rowH + gapRow;
      rowH = 0;
    }
  }
}

// Yatay percin sirasi
// vidaXs: paralel siradaki vidalarin mutlak X konumlari. Cakisma varsa percin 13mm kayar.
function addPH(dxf, x0, x1, y, yofs, cn, cf, layer, vidaXs) {
  dxf.addCircle(x0 + cn, y + yofs, 2.3, layer);
  dxf.addCircle(x1 - cf, y + yofs, 2.3, layer);
  var sp = (x1 - x0) - cn - cf;
  if (sp > 0.001) {
    var n = Math.ceil(sp / 390);
    if (n > 1) {
      var st = sp / n;
      vidaXs = vidaXs || [];
      for (var i = 1; i < n; i++) {
        var px = x0 + cn + i * st;
        var shift = 0;
        for (var j = 0; j < vidaXs.length; j++) {
          if (Math.abs(px - vidaXs[j]) < 1) { shift = 13; break; } // hiza tol. 1mm (asimetrik uc ofseti)
        }
        dxf.addCircle(px + shift, y + yofs, 2.3, layer);
      }
    }
  }
}

// Dikey percin sutunu
// vidaYs: paralel sutundaki vidalarin mutlak Y konumlari. Cakisma varsa percin 13mm kayar.
function addPV(dxf, x, y0, y1, xofs, cn, cf, layer, vidaYs) {
  dxf.addCircle(x + xofs, y0 + cn, 2.3, layer);
  dxf.addCircle(x + xofs, y1 - cf, 2.3, layer);
  var sp = (y1 - y0) - cn - cf;
  if (sp > 0.001) {
    var n = Math.ceil(sp / 390);
    if (n > 1) {
      var st = sp / n;
      vidaYs = vidaYs || [];
      for (var i = 1; i < n; i++) {
        var py = y0 + cn + i * st;
        var shift = 0;
        for (var j = 0; j < vidaYs.length; j++) {
          if (Math.abs(py - vidaYs[j]) < 1) { shift = 13; break; } // hiza tol. 1mm (asimetrik uc ofseti)
        }
        dxf.addCircle(x + xofs, py + shift, 2.3, layer);
      }
    }
  }
}

// Kodlama texti (60'lık)
function addKod60(dxf, px, py, txt, layer) {
  if (txt && txt.length > 0) {
    dxf.addText(px, py, 3.5, txt, layer);
  }
}

// -------------------------------------------------------
// DIS PANEL BUKUM (20 cizgi)
// -------------------------------------------------------
function drawFoldDis(dxf, ox, oy, B, K, layer) {
  var L = function(x1, y1, x2, y2) { dxf.addLine(x1, y1, x2, y2, layer); };
  L(ox, oy, ox, oy - 42.5);
  L(ox, oy - 42.5, ox + 20, oy - 62.5);
  L(ox + 20, oy - 62.5, ox + B - 20, oy - 62.5);
  L(ox + B - 20, oy - 62.5, ox + B, oy - 42.5);
  L(ox + B, oy - 42.5, ox + B, oy);
  L(ox + B, oy, ox + B + 42.5, oy);
  L(ox + B + 42.5, oy, ox + B + 62.5, oy + 20);
  L(ox + B + 62.5, oy + 20, ox + B + 62.5, oy + K - 20);
  L(ox + B + 62.5, oy + K - 20, ox + B + 42.5, oy + K);
  L(ox + B + 42.5, oy + K, ox + B, oy + K);
  L(ox + B, oy + K, ox + B, oy + K + 42.5);
  L(ox + B, oy + K + 42.5, ox + B - 20, oy + K + 62.5);
  L(ox + B - 20, oy + K + 62.5, ox + 20, oy + K + 62.5);
  L(ox + 20, oy + K + 62.5, ox, oy + K + 42.5);
  L(ox, oy + K + 42.5, ox, oy + K);
  L(ox, oy + K, ox - 42.5, oy + K);
  L(ox - 42.5, oy + K, ox - 62.5, oy + K - 20);
  L(ox - 62.5, oy + K - 20, ox - 62.5, oy + 20);
  L(ox - 62.5, oy + 20, ox - 42.5, oy);
  L(ox - 42.5, oy, ox, oy);
}

// -------------------------------------------------------
// IC PANEL BUKUM (24 cizgi + 8 arc)
// -------------------------------------------------------
function drawFoldIc(dxf, ox, oy, BI, KI, layer) {
  var L = function(x1, y1, x2, y2) { dxf.addLine(x1, y1, x2, y2, layer); };
  var A = function(cx, cy, r, sa, ea) { dxf.addArc(cx, cy, r, sa, ea, layer); };

  // Alt fold (36mm)
  L(ox, oy - 1, ox, oy - 36);
  L(ox, oy - 36, ox + BI, oy - 36);
  L(ox + BI, oy - 36, ox + BI, oy - 1);
  // Ust fold
  L(ox, oy + KI + 1, ox, oy + KI + 36);
  L(ox, oy + KI + 36, ox + BI, oy + KI + 36);
  L(ox + BI, oy + KI + 36, ox + BI, oy + KI + 1);
  // Sol flange ana + uzantilar
  L(ox - 36, oy, ox - 36, oy + KI);
  L(ox - 36, oy, ox - 36, oy - 13);
  L(ox - 36, oy + KI, ox - 36, oy + KI + 13);
  // Sol alt tab
  A(ox - 31, oy - 13, 5, 180, 270);
  L(ox - 31, oy - 18, ox - 18, oy - 18);
  L(ox - 18, oy - 18, ox - 18, oy);
  L(ox - 18, oy, ox - 1, oy);
  A(ox, oy, 1, 270, 180);
  // Sol ust tab
  A(ox - 31, oy + KI + 13, 5, 90, 180);
  L(ox - 31, oy + KI + 18, ox - 18, oy + KI + 18);
  L(ox - 18, oy + KI + 18, ox - 18, oy + KI);
  L(ox - 18, oy + KI, ox - 1, oy + KI);
  A(ox, oy + KI, 1, 180, 90);
  // Sag flange
  L(ox + BI + 36, oy, ox + BI + 36, oy + KI);
  L(ox + BI + 36, oy, ox + BI + 36, oy - 13);
  L(ox + BI + 36, oy + KI, ox + BI + 36, oy + KI + 13);
  // Sag alt tab
  A(ox + BI + 31, oy - 13, 5, 270, 0);
  L(ox + BI + 31, oy - 18, ox + BI + 18, oy - 18);
  L(ox + BI + 18, oy - 18, ox + BI + 18, oy);
  L(ox + BI + 18, oy, ox + BI + 1, oy);
  A(ox + BI, oy, 1, 0, 270);
  // Sag ust tab
  A(ox + BI + 31, oy + KI + 13, 5, 0, 90);
  L(ox + BI + 31, oy + KI + 18, ox + BI + 18, oy + KI + 18);
  L(ox + BI + 18, oy + KI + 18, ox + BI + 18, oy + KI);
  L(ox + BI + 18, oy + KI, ox + BI + 1, oy + KI);
  A(ox + BI, oy + KI, 1, 90, 0);
}

// -------------------------------------------------------
// IC PANEL BUKUM - SABIT/BOGAZ (kulak yok, UST stili)
// -------------------------------------------------------
function drawFoldIcSabit(dxf, ox, oy, BI, KI, layer) {
  var L = function(x1, y1, x2, y2) { dxf.addLine(x1, y1, x2, y2, layer); };
  var A = function(cx, cy, r, sa, ea) { dxf.addArc(cx, cy, r, sa, ea, layer); };

  // Alt fold
  L(ox, oy - 1, ox, oy - 36);
  L(ox + BI, oy - 1, ox + BI, oy - 36);
  L(ox, oy - 36, ox + BI, oy - 36);
  // Ust fold
  L(ox, oy + KI + 1, ox, oy + KI + 36);
  L(ox + BI, oy + KI + 1, ox + BI, oy + KI + 36);
  L(ox, oy + KI + 36, ox + BI, oy + KI + 36);
  // Sol flange
  L(ox - 36, oy, ox - 36, oy + KI);
  // Sag flange
  L(ox + BI + 36, oy, ox + BI + 36, oy + KI);
  // Kose yatay baglantilari
  L(ox - 36, oy, ox - 18, oy);
  L(ox - 36, oy + KI, ox - 18, oy + KI);
  L(ox + BI + 18, oy, ox + BI + 36, oy);
  L(ox + BI + 18, oy + KI, ox + BI + 36, oy + KI);
  // Connector
  L(ox - 18, oy, ox - 1, oy);
  L(ox - 18, oy + KI, ox - 1, oy + KI);
  L(ox + BI + 1, oy, ox + BI + 18, oy);
  L(ox + BI + 1, oy + KI, ox + BI + 18, oy + KI);
  // R1 ic kose arc'lari
  A(ox, oy, 1, 270, 180);
  A(ox + BI, oy, 1, 0, 270);
  A(ox, oy + KI, 1, 180, 90);
  A(ox + BI, oy + KI, 1, 90, 0);
}

// -------------------------------------------------------
// UST PANEL BUKUM (tab kose yok, sadece R1 ic kose)
// -------------------------------------------------------
function drawFoldUst(dxf, ox, oy, BI, KI, layer) {
  var L = function(x1, y1, x2, y2) { dxf.addLine(x1, y1, x2, y2, layer); };
  var A = function(cx, cy, r, sa, ea) { dxf.addArc(cx, cy, r, sa, ea, layer); };

  // Alt fold
  L(ox, oy - 1, ox, oy - 36);
  L(ox + BI, oy + 1, ox + BI, oy - 36);
  L(ox, oy - 36, ox + BI, oy - 36);
  // Ust fold
  L(ox, oy + KI + 1, ox, oy + KI + 36);
  L(ox + BI, oy + KI + 1, ox + BI, oy + KI + 36);
  L(ox, oy + KI + 36, ox + BI, oy + KI + 36);
  // Sol flange
  L(ox - 36, oy, ox - 36, oy + KI);
  // Sag flange
  L(ox + BI + 36, oy, ox + BI + 36, oy + KI);
  // Kose yatay baglantilari
  L(ox - 36, oy, ox - 18, oy);
  L(ox - 36, oy + KI, ox - 18, oy + KI);
  L(ox + BI + 18, oy, ox + BI + 36, oy);
  L(ox + BI + 18, oy + KI, ox + BI + 36, oy + KI);
  // Connector
  L(ox - 18, oy, ox - 1, oy);
  L(ox - 18, oy + KI, ox - 1, oy + KI);
  L(ox + BI + 1, oy, ox + BI + 18, oy);
  L(ox + BI + 1, oy + KI, ox + BI + 18, oy + KI);
  // R1 ic kose arc'lari
  A(ox, oy, 1, 270, 180);
  A(ox + BI, oy, 1, 0, 270);
  A(ox, oy + KI, 1, 180, 90);
  A(ox + BI, oy + KI, 1, 90, 0);
}

// -------------------------------------------------------
// SABIT DIS PANEL (60'lık)
// -------------------------------------------------------
function drawDis60(dxf, ox, oy, B, K, kod, layer) {
  var ly = layer || '0';
  drawFoldDis(dxf, ox, oy, B, K, ly);
  // Vida konumlari (vidayla ayni hizaya gelen percin 13mm kayar; hiza tol. 1mm)
  var vidaXs = [ox + 60, ox + B - 60];
  if (B >= 800 && B < 1600) vidaXs.push(ox + B / 2);
  else if (B >= 1600) {
    vidaXs.push(ox + 60 + (B - 120) / 3);
    vidaXs.push(ox + 60 + 2 * (B - 120) / 3);
  }
  var vidaYs = [oy + 60, oy + K - 60];
  if (K >= 800 && K < 1600) vidaYs.push(oy + K / 2);
  else if (K >= 1600) {
    vidaYs.push(oy + 60 + (K - 120) / 3);
    vidaYs.push(oy + 60 + 2 * (K - 120) / 3);
  }
  // Percin
  addPH(dxf, ox, ox + B, oy, -51.7, 40.29, 40.70, ly, vidaXs);
  addPH(dxf, ox, ox + B, oy + K, 51.7, 40.29, 40.70, ly, vidaXs);
  addPV(dxf, ox, oy, oy + K, -51.7, 40.29, 40.70, ly, vidaYs);
  addPV(dxf, ox + B, oy, oy + K, 51.7, 40.29, 40.70, ly, vidaYs);
  // Sabit vida
  dxf.addCircle(ox + 60, oy + 15, 8.1, ly);
  dxf.addCircle(ox + B - 60, oy + 15, 8.1, ly);
  dxf.addCircle(ox + 15, oy + 60, 8.1, ly);
  dxf.addCircle(ox + B - 15, oy + 60, 8.1, ly);
  dxf.addCircle(ox + 60, oy + K - 15, 8.1, ly);
  dxf.addCircle(ox + B - 60, oy + K - 15, 8.1, ly);
  dxf.addCircle(ox + 15, oy + K - 60, 8.1, ly);
  dxf.addCircle(ox + B - 15, oy + K - 60, 8.1, ly);
  // B yonu ek vida
  if (B >= 800 && B < 1600) {
    dxf.addCircle(ox + B / 2, oy + 15, 8.1, ly);
    dxf.addCircle(ox + B / 2, oy + K - 15, 8.1, ly);
  } else if (B >= 1600) {
    dxf.addCircle(ox + 60 + (B - 120) / 3, oy + 15, 8.1, ly);
    dxf.addCircle(ox + 60 + 2 * (B - 120) / 3, oy + 15, 8.1, ly);
    dxf.addCircle(ox + 60 + (B - 120) / 3, oy + K - 15, 8.1, ly);
    dxf.addCircle(ox + 60 + 2 * (B - 120) / 3, oy + K - 15, 8.1, ly);
  }
  // K yonu ek vida
  if (K >= 800 && K < 1600) {
    dxf.addCircle(ox + 15, oy + K / 2, 8.1, ly);
    dxf.addCircle(ox + B - 15, oy + K / 2, 8.1, ly);
  } else if (K >= 1600) {
    dxf.addCircle(ox + 15, oy + 60 + (K - 120) / 3, 8.1, ly);
    dxf.addCircle(ox + 15, oy + 60 + 2 * (K - 120) / 3, 8.1, ly);
    dxf.addCircle(ox + B - 15, oy + 60 + (K - 120) / 3, 8.1, ly);
    dxf.addCircle(ox + B - 15, oy + 60 + 2 * (K - 120) / 3, 8.1, ly);
  }
  // Kodlama
  addKod60(dxf, ox + B - 49.70, oy + K + 49.95, kod, ly);
}
